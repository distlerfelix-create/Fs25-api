<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passwort Reset</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  background:#000;
  color:#00ff22;
  font-family:Arial,sans-serif;
}

.app{
  max-width:700px;
  margin:auto;
  padding:20px;
}

.back{
  background:#222;
  color:white;
  border:1px solid #555;
  padding:14px 22px;
  border-radius:12px;
  margin-bottom:30px;
  font-size:18px;
}

h1{
  color:white;
  text-align:center;
  font-size:38px;
  font-family:Georgia,serif;
}

.card{
  background:#111;
  border:1px solid #008000;
  border-radius:14px;
  padding:20px;
  margin-bottom:18px;
}

.titel{
  color:#00ff22;
  font-size:24px;
  font-weight:bold;
}

.info{
  color:white;
  margin-top:10px;
  line-height:1.5;
  font-size:18px;
  white-space:pre-line;
}

.orange{
  color:#ffaa33;
}

input{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:10px;
  border:1px solid #008000;
  background:#000;
  color:white;
  font-size:17px;
}

button{
  width:100%;
  margin-top:10px;
  padding:15px;
  border:none;
  border-radius:12px;
  font-size:18px;
  font-weight:bold;
}

.green{
  background:#008800;
  color:white;
}

.red{
  background:#aa0000;
  color:white;
}

.msg{
  color:#ffaa33;
  text-align:center;
  margin-top:10px;
  white-space:pre-line;
}

.leer{
  color:white;
  text-align:center;
  margin-top:40px;
}
</style>
</head>

<body>

<div class="app">

<button class="back" onclick="location.href='admin.html'">← Zurück</button>

<h1>PASSWORT RESET</h1>

<div id="liste">Lade...</div>

</div>

<script>
const SUPABASE_URL = "https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY = "sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";

const USER_ID = localStorage.getItem("user_id");
const USERNAME = localStorage.getItem("username") || "Admin";

if(!USER_ID){
  location.href = "login.html";
}

let users = [];
let resets = [];

async function api(tabelle){
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/" + tabelle + "?select=*",
    {
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY
      }
    }
  );

  if(!res.ok){
    throw new Error(await res.text());
  }

  return await res.json();
}

async function patch(tabelle,id,daten){
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/" + tabelle + "?id=eq." + id,
    {
      method:"PATCH",
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY,
        "Content-Type":"application/json",
        "Prefer":"return=minimal"
      },
      body:JSON.stringify(daten)
    }
  );

  if(!res.ok){
    throw new Error(await res.text());
  }
}

async function pruefeAdmin(){
  const daten = await api("Users");
  const user = daten.find(u => String(u.id) === String(USER_ID));

  if(!user || user.Admin !== true){
    document.getElementById("liste").innerHTML =
      "<div class='leer'>Kein Admin-Zugriff.</div>";
    return false;
  }

  users = daten;
  return true;
}

function text(wert){
  return wert === null || wert === undefined || wert === "" ? "-" : wert;
}

async function laden(){
  const box = document.getElementById("liste");

  try{
    const ok = await pruefeAdmin();
    if(!ok) return;

    resets = await api("Passwort_Reset");

    anzeigen();

  }catch(err){
    box.innerHTML = "<div class='leer'>Fehler:<br><br>" + err.message + "</div>";
  }
}

function anzeigen(){
  const box = document.getElementById("liste");

  const offen = resets.filter(r => r.Status === "Offen");

  if(offen.length === 0){
    box.innerHTML = "<div class='leer'>Keine offenen Passwort-Anträge.</div>";
    return;
  }

  box.innerHTML = "";

  offen.forEach(r => {
    const user = users.find(u =>
      String(u["PSN-Username"]).toLowerCase() ===
      String(r.Username).toLowerCase()
    );

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="titel">${text(r.Spielername)}</div>

      <div class="info">
        <span class="orange">PSN:</span> ${text(r.Username)}<br>
        <span class="orange">Nachricht:</span><br>${text(r.Nachricht)}<br>
        <span class="orange">Benutzer gefunden:</span> ${user ? "Ja" : "Nein"}<br>
        <span class="orange">Status:</span> ${text(r.Status)}
      </div>

      <input id="pass_${r.id}" placeholder="Neues Passwort">

      <button class="green" onclick="passwortSetzen(${r.id})">
        Passwort setzen & erledigen
      </button>

      <button class="red" onclick="ablehnen(${r.id})">
        Antrag ablehnen
      </button>

      <div id="msg_${r.id}" class="msg"></div>
    `;

    box.appendChild(div);
  });
}

async function passwortSetzen(id){
  const meldung = document.getElementById("msg_" + id);
  const neuesPasswort = document.getElementById("pass_" + id).value.trim();

  meldung.innerText = "";

  if(!neuesPasswort){
    meldung.innerText = "Bitte neues Passwort eingeben.";
    return;
  }

  const reset = resets.find(r => String(r.id) === String(id));

  if(!reset){
    meldung.innerText = "Antrag nicht gefunden.";
    return;
  }

  const user = users.find(u =>
    String(u["PSN-Username"]).toLowerCase() ===
    String(reset.Username).toLowerCase()
  );

  if(!user){
    meldung.innerText = "Benutzer wurde nicht gefunden.";
    return;
  }

  try{
    await patch("Users", user.id, {
      Passwort:neuesPasswort
    });

    await patch("Passwort_Reset", id, {
      Status:"Erledigt",
      Bearbeitet_von:USERNAME
    });

    meldung.innerText =
      "Passwort wurde gesetzt. Bitte dem Spieler privat mitteilen.";

    await laden();

  }catch(err){
    meldung.innerText = "Fehler:\n" + err.message;
  }
}

async function ablehnen(id){
  if(!confirm("Passwort-Antrag wirklich ablehnen?")){
    return;
  }

  try{
    await patch("Passwort_Reset", id, {
      Status:"Abgelehnt",
      Bearbeitet_von:USERNAME
    });

    await laden();

  }catch(err){
    alert("Fehler:\n" + err.message);
  }
}

laden();
</script>

</body>
</html>
