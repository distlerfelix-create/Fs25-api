<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Höfe</title>

<style>
*{box-sizing:border-box;}
body{margin:0;background:#000;color:#00ff22;font-family:Arial,sans-serif;}
.app{max-width:700px;margin:auto;padding:20px;}
.back{background:#222;color:white;border:1px solid #555;padding:14px 22px;border-radius:12px;margin-bottom:30px;font-size:18px;}
h1{color:white;text-align:center;font-size:38px;font-family:Georgia,serif;}
.card{background:#111;border:1px solid #008000;border-radius:14px;padding:20px;margin-bottom:18px;}
.titel{color:#00ff22;font-size:24px;font-weight:bold;}
.info{color:white;margin-top:10px;font-size:18px;}
input{width:100%;padding:14px;margin-top:12px;border-radius:10px;border:1px solid #008000;background:#000;color:white;font-size:17px;}
button{width:100%;margin-top:10px;padding:15px;border:none;border-radius:12px;font-size:18px;font-weight:bold;}
.green{background:#008800;color:white;}
.red{background:#aa0000;color:white;}
.msg{color:#ffaa33;text-align:center;margin-top:10px;white-space:pre-line;}
.leer{color:white;text-align:center;margin-top:40px;}
</style>
</head>

<body>
<div class="app">

<button class="back" onclick="location.href='admin.html'">← Zurück</button>

<h1>HÖFE</h1>

<div id="liste">Lade...</div>

</div>

<script>
const SUPABASE_URL = "https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY = "sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";

const USER_ID = localStorage.getItem("user_id");
if(!USER_ID){ location.href = "login.html"; }

let users = [];
let hoefe = [];
let felder = [];

async function api(tabelle){
  const res = await fetch(SUPABASE_URL + "/rest/v1/" + tabelle + "?select=*", {
    headers:{apikey:SUPABASE_KEY, Authorization:"Bearer " + SUPABASE_KEY}
  });
  if(!res.ok) throw new Error(await res.text());
  return await res.json();
}

async function post(tabelle,daten){
  const res = await fetch(SUPABASE_URL + "/rest/v1/" + tabelle, {
    method:"POST",
    headers:{
      apikey:SUPABASE_KEY,
      Authorization:"Bearer " + SUPABASE_KEY,
      "Content-Type":"application/json",
      Prefer:"return=minimal"
    },
    body:JSON.stringify(daten)
  });
  if(!res.ok) throw new Error(await res.text());
}

async function patch(tabelle,id,daten){
  const res = await fetch(SUPABASE_URL + "/rest/v1/" + tabelle + "?id=eq." + id, {
    method:"PATCH",
    headers:{
      apikey:SUPABASE_KEY,
      Authorization:"Bearer " + SUPABASE_KEY,
      "Content-Type":"application/json",
      Prefer:"return=minimal"
    },
    body:JSON.stringify(daten)
  });
  if(!res.ok) throw new Error(await res.text());
}

async function loeschen(tabelle,id){
  const res = await fetch(SUPABASE_URL + "/rest/v1/" + tabelle + "?id=eq." + id, {
    method:"DELETE",
    headers:{
      apikey:SUPABASE_KEY,
      Authorization:"Bearer " + SUPABASE_KEY,
      Prefer:"return=minimal"
    }
  });
  if(!res.ok) throw new Error(await res.text());
}

async function laden(){
  const box = document.getElementById("liste");

  try{
    users = await api("Users");
    hoefe = await api("Hoefe");
    felder = await api("Felder");

    const admin = users.find(u => String(u.id) === String(USER_ID));
    if(!admin || admin.Admin !== true){
      box.innerHTML = "<div class='leer'>Kein Admin-Zugriff.</div>";
      return;
    }

    anzeigen();

  }catch(err){
    box.innerHTML = "<div class='leer'>Fehler:<br><br>" + err.message + "</div>";
  }
}

function anzeigen(){
  const box = document.getElementById("liste");

  let html = `
    <div class="card">
      <div class="titel">Neuen Hof erstellen</div>
      <input id="neuerHof" placeholder="Hofname">
      <button class="green" onclick="hofErstellen()">Hof erstellen</button>
      <div id="msg_neu" class="msg"></div>
    </div>
  `;

  hoefe.forEach(h=>{
    const userAnzahl = users.filter(u => String(u.Hof_id) === String(h.id)).length;
    const feldAnzahl = felder.filter(f => String(f.Hof_id) === String(h.id)).length;

    html += `
      <div class="card">
        <div class="titel">${h.Name || "-"}</div>

        <div class="info">
          Benutzer: ${userAnzahl}<br>
          Felder: ${feldAnzahl}
        </div>

        <input id="hof_${h.id}" value="${h.Name || ""}" placeholder="Hofname">

        <button class="green" onclick="hofSpeichern(${h.id})">Speichern</button>
        <button class="red" onclick="hofLoeschen(${h.id})">Löschen</button>

        <div id="msg_${h.id}" class="msg"></div>
      </div>
    `;
  });

  if(hoefe.length === 0){
    html += "<div class='leer'>Keine Höfe vorhanden.</div>";
  }

  box.innerHTML = html;
}

async function hofErstellen(){
  const msg = document.getElementById("msg_neu");
  const name = document.getElementById("neuerHof").value.trim();

  msg.innerText = "";

  if(!name){
    msg.innerText = "Bitte Hofname eingeben.";
    return;
  }

  try{
    await post("Hoefe",{Name:name});
    await laden();
  }catch(err){
    msg.innerText = "Fehler:\n" + err.message;
  }
}

async function hofSpeichern(id){
  const msg = document.getElementById("msg_" + id);
  const name = document.getElementById("hof_" + id).value.trim();

  msg.innerText = "";

  if(!name){
    msg.innerText = "Bitte Hofname eingeben.";
    return;
  }

  try{
    await patch("Hoefe", id, {Name:name});

    const betroffeneUser = users.filter(u => String(u.Hof_id) === String(id));
    for(const u of betroffeneUser){
      await patch("Users", u.id, {Hof:name});
    }

    const betroffeneFelder = felder.filter(f => String(f.Hof_id) === String(id));
    for(const f of betroffeneFelder){
      await patch("Felder", f.id, {Besitzer:name});
    }

    await laden();

  }catch(err){
    msg.innerText = "Fehler:\n" + err.message;
  }
}

async function hofLoeschen(id){
  const msg = document.getElementById("msg_" + id);

  const userAnzahl = users.filter(u => String(u.Hof_id) === String(id)).length;
  const feldAnzahl = felder.filter(f => String(f.Hof_id) === String(id)).length;

  if(userAnzahl > 0 || feldAnzahl > 0){
    msg.innerText =
      "Löschen nicht möglich.\n" +
      "Benutzer oder Felder sind noch diesem Hof zugeordnet.";
    return;
  }

  if(!confirm("Hof wirklich löschen?")){
    return;
  }

  try{
    await loeschen("Hoefe", id);
    await laden();
  }catch(err){
    msg.innerText = "Fehler:\n" + err.message;
  }
}

laden();
</script>

</body>
</html>
