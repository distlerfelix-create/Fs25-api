<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{box-sizing:border-box;}
body{margin:0;background:#000;color:#00ff22;font-family:Arial,sans-serif;}
.app{width:100%;max-width:430px;margin:auto;padding:60px 20px;text-align:center;}
h1{color:white;font-family:Georgia,serif;font-size:42px;margin-bottom:40px;}
input{width:100%;padding:16px;margin:10px 0;border-radius:12px;border:1px solid #008000;background:#111;color:white;font-size:18px;}
button{width:100%;margin-top:18px;padding:18px;background:#008800;color:white;border:none;border-radius:14px;font-size:22px;font-weight:bold;box-shadow:0 0 12px rgba(0,255,0,0.35);}
.dark{background:#333;}
.red{background:#880000;}
.fehler{color:red;margin-top:20px;font-weight:bold;}
.hinweis{color:#ffaa33;margin-top:25px;font-size:14px;line-height:1.5;}
.links{margin-top:25px;color:white;font-size:14px;line-height:1.8;}
.links a{color:#00ff22;text-decoration:none;font-weight:bold;}
</style>
</head>

<body>
<div class="app">

<h1>LOGIN</h1>

<input id="username" placeholder="PSN-Username">
<input id="passwort" type="password" placeholder="Passwort">

<button onclick="login()">Einloggen</button>
<button class="dark" onclick="location.href='registrieren.html'">Neu registrieren</button>
<button class="red" onclick="location.href='passwort_reset.html'">Passwort vergessen</button>

<div id="fehler" class="fehler"></div>

<div class="hinweis">
  Zugang nur für freigeschaltete Spieler.
</div>

<div class="links">
  <a href="regeln.html">Serverregeln</a><br>
  <a href="dsgvo.html">Datenschutz / DSGVO</a>
</div>

</div>

<script>
const SUPABASE_URL = "https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY = "sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";

async function login(){
  const username = document.getElementById("username").value.trim();
  const passwort = document.getElementById("passwort").value.trim();
  const fehler = document.getElementById("fehler");

  fehler.innerText = "";

  if(username === "" || passwort === ""){
    fehler.innerText = "Bitte Username und Passwort eingeben.";
    return;
  }

  const url =
    SUPABASE_URL +
    "/rest/v1/Users?select=*&PSN-Username=eq." +
    encodeURIComponent(username) +
    "&Passwort=eq." +
    encodeURIComponent(passwort) +
    "&Aktiviert=eq.true";

  const res = await fetch(url,{
    headers:{
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    }
  });

  const data = await res.json();

  if(!data || data.length === 0){
    fehler.innerText = "Login fehlgeschlagen oder Benutzer nicht aktiviert.";
    return;
  }

  const user = data[0];

  localStorage.setItem("user_id", user.id);
  localStorage.setItem("username", user["PSN-Username"]);
  localStorage.setItem("vorname", user.Vorname || "");
  localStorage.setItem("hof", user.Hof || "");
  localStorage.setItem("hof_id", user.Hof_id || "");
  localStorage.setItem("admin", user.Admin === true ? "true" : "false");

  location.href = "index.html";
}
</script>

</body>
</html>
