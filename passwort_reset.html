<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passwort vergessen</title>

<style>
*{box-sizing:border-box;}
body{margin:0;background:#000;color:#00ff22;font-family:Arial,sans-serif;}
.app{width:100%;max-width:520px;margin:auto;padding:35px 20px;text-align:center;}
.card{background:#111;border:1px solid #008000;border-radius:16px;padding:22px;box-shadow:0 0 12px rgba(0,255,0,0.25);}
h1{color:white;font-family:Georgia,serif;font-size:36px;margin-bottom:25px;}
label{display:block;text-align:left;color:#ffaa33;margin-top:16px;font-size:18px;}
input,textarea{width:100%;padding:16px;margin-top:8px;border-radius:12px;border:1px solid #008000;background:#000;color:white;font-size:18px;}
textarea{min-height:120px;}
button{width:100%;margin-top:22px;padding:18px;background:#008800;color:white;border:none;border-radius:14px;font-size:22px;font-weight:bold;}
.back{background:#333;}
.info{color:#ffaa33;font-size:14px;text-align:left;line-height:1.45;margin-top:18px;}
.fehler{color:#ff4444;margin-top:18px;font-weight:bold;}
.erfolg{color:#00ff22;margin-top:18px;font-weight:bold;}
</style>
</head>

<body>
<div class="app">

<h1>PASSWORT VERGESSEN</h1>

<div class="card">

<div class="info">
  Wenn du dein Passwort vergessen hast, sende hier eine Anfrage.
  Ein Admin prüft die Anfrage und meldet sich bei dir.
</div>

<label>PSN-Username</label>
<input id="username" placeholder="z. B. Disti1701">

<label>Spielername / Vorname</label>
<input id="spielername" placeholder="z. B. Felix">

<label>Nachricht / Grund</label>
<textarea id="nachricht" placeholder="z. B. Passwort vergessen, bitte zurücksetzen."></textarea>

<button onclick="absenden()">Anfrage absenden</button>
<button class="back" onclick="location.href='login.html'">Zurück zum Login</button>

<div id="meldung"></div>

</div>
</div>

<script>
const SUPABASE_URL = "https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY = "sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";

const ADMIN_CHAT_ID = 6694745579;

async function post(tabelle,daten){
  const res = await fetch(SUPABASE_URL + "/rest/v1/" + tabelle, {
    method:"POST",
    headers:{
      "apikey":SUPABASE_KEY,
      "Authorization":"Bearer " + SUPABASE_KEY,
      "Content-Type":"application/json",
      "Prefer":"return=minimal"
    },
    body:JSON.stringify(daten)
  });

  if(!res.ok){
    throw new Error(await res.text());
  }
}

async function absenden(){
  const meldung = document.getElementById("meldung");
  meldung.className = "";
  meldung.innerText = "";

  const username = document.getElementById("username").value.trim();
  const spielername = document.getElementById("spielername").value.trim();
  const nachricht = document.getElementById("nachricht").value.trim();

  if(!username || !spielername || !nachricht){
    meldung.className = "fehler";
    meldung.innerText = "Bitte alle Felder ausfüllen.";
    return;
  }

  try{
    await post("Passwort_Reset", {
      User_name:username,
      Spieler_name:spielername,
      Nachricht:nachricht,
      Status:"Offen",
      Bearbeitet_von:null
    });

    await post("Telegram_queue", {
      Titel:"🔑 Passwort-Reset Anfrage",
      Nachricht:
        "Neue Passwort-Reset Anfrage:\\n\\n" +
        "User: " + username + "\\n" +
        "Spieler: " + spielername + "\\n\\n" +
        "Nachricht:\\n" + nachricht + "\\n\\n" +
        "Bitte im Adminbereich prüfen.",
      Typ:"Passwort_Reset",
      User_id:null,
      Hof_id:null,
      Organisation_id:null,
      Chat_id:ADMIN_CHAT_ID,
      Gesendet:false,
      Erstellt_am:new Date().toISOString(),
      Status:"Offen",
      Fehler:null
    });

    meldung.className = "erfolg";
    meldung.innerText = "Anfrage wurde gesendet. Bitte auf Rückmeldung warten.";

    setTimeout(() => {
      location.href = "login.html";
    }, 2500);

  }catch(err){
    meldung.className = "fehler";
    meldung.innerText = "Fehler: " + err.message;
  }
}
</script>

</body>
</html>
