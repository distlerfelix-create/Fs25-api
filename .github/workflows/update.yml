name: Update FS25 Status

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch FS25 XML and update status.json
        run: |
          python3 << 'PY'
          import re, json, urllib.request

          url = "http://195.179.227.75:8940/feed/dedicated-server-stats.xml?code=Gmo9y3myyiXWqmKP"

          xml = urllib.request.urlopen(url, timeout=20).read().decode("utf-8", errors="ignore")

          def find(pattern, default=""):
              m = re.search(pattern, xml)
              return m.group(1) if m else default

          day_time = int(find(r'dayTime="([0-9]+)"', "0"))
          hour = day_time // 3600000
          minute = (day_time % 3600000) // 60000

          data = {
              "monat": "Dezember",
              "zeit": f"{hour}:{minute:02d}",
              "servername": find(r'<Server[^>]* name="([^"]+)"'),
              "map": find(r'mapName="([^"]+)"'),
              "spielerOnline": int(find(r'<Slots[^>]*numUsed="([0-9]+)"', "0"))
          }

          with open("status.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          PY

      - name: Commit updated status
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add status.json
          git commit -m "Update FS25 status" || exit 0
          git push
