name: Update FS25 Status

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch FS25 XML and update status.json
        run: |
          python3 << 'PY'
          import re
          import json
          import urllib.request
          from datetime import datetime

          url = "http://195.179.227.75:8940/feed/dedicated-server-stats.xml?code=Gmo9y3myyiXWqmKP"

          try:
              xml = urllib.request.urlopen(url, timeout=20).read().decode("utf-8", errors="ignore")
              online = True
          except:
              xml = ""
              online = False

          def find(pattern, default=""):
              m = re.search(pattern, xml)
              return m.group(1) if m else default

          day_time = int(find(r'dayTime="([0-9]+)"', "0"))

          hour = day_time // 3600000
          minute = (day_time % 3600000) // 60000

          monate = [
              "Januar",
              "Februar",
              "März",
              "April",
              "Mai",
              "Juni",
              "Juli",
              "August",
              "September",
              "Oktober",
              "November",
              "Dezember"
          ]

          month_index = int(find(r'currentMonotonicMonth="([0-9]+)"', "0"))

          if 0 <= month_index < len(monate):
              monat = monate[month_index]
          else:
              monat = "Unbekannt"

          spieler = int(find(r'<Slots[^>]*numUsed="([0-9]+)"', "0"))

          data = {
              "serverOnline": online,
              "status": "🟢 Online" if online else "🔴 Offline",

              "servername": find(r'<Server[^>]* name="([^"]+)"'),
              "map": find(r'mapName="([^"]+)"'),

              "monat": monat,
              "zeit": f"{hour}:{minute:02d}",

              "spielerOnline": spieler,

              "letztesUpdate": datetime.now().strftime("%d.%m.%Y %H:%M")
          }

          with open("status.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          PY

      - name: Commit updated status
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add status.json
          git commit -m "Update FS25 status" || exit 0
          git push
