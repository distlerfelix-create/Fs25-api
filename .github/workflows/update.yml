import re
import json
import urllib.request
from datetime import datetime

url = "http://195.179.227.75:8940/feed/dedicated-server-stats.xml?code=Gmo9y3myyiXWqmKP"

try:
    xml = urllib.request.urlopen(url, timeout=20).read().decode("utf-8", errors="ignore")
    online = True
except:
    xml = ""
    online = False

def find(pattern, default=""):
    m = re.search(pattern, xml)
    return m.group(1) if m else default

season = int(find(r'season="([0-9]+)"', "10"))

monate = [
    "März", "April", "Mai", "Juni", "Juli", "August",
    "September", "Oktober", "November", "Dezember",
    "Januar", "Februar"
]

monat = monate[season] if 0 <= season < len(monate) else "Unbekannt"

day_time = int(find(r'dayTime="([0-9]+)"', "0"))
hour = day_time // 3600000
minute = (day_time % 3600000) // 60000

spieler = int(find(r'<Slots[^>]*numUsed="([0-9]+)"', "0"))

data = {
    "serverOnline": online,
    "status": "🟢 Online" if online else "🔴 Offline",
    "servername": find(r'<Server[^>]* name="([^"]+)"'),
    "map": find(r'mapName="([^"]+)"'),
    "monat": monat,
    "zeit": f"{hour}:{minute:02d}",
    "spielerOnline": spieler,
    "letztesUpdate": datetime.now().strftime("%d.%m.%Y %H:%M")
}

with open("status.json", "w", encoding="utf-8") as f:
    json.dump(data, f, ensure_ascii=False, indent=2)
