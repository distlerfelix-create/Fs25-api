name: Send Telegram Queue

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Send open Telegram messages
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 << 'PY'
          import os
          import json
          import urllib.request

          supabase_url = os.environ["SUPABASE_URL"]
          supabase_key = os.environ["SUPABASE_KEY"]
          bot_token = os.environ["TELEGRAM_BOT_TOKEN"]
          default_chat_id = os.environ["TELEGRAM_CHAT_ID"]

          headers = {
              "apikey": supabase_key,
              "Authorization": "Bearer " + supabase_key,
              "Content-Type": "application/json"
          }

          def request_json(url, method="GET", data=None):
              body = None
              if data is not None:
                  body = json.dumps(data).encode("utf-8")

              req = urllib.request.Request(
                  url,
                  data=body,
                  headers=headers,
                  method=method
              )

              with urllib.request.urlopen(req, timeout=30) as res:
                  text = res.read().decode("utf-8")
                  return json.loads(text) if text else None

          def patch_queue(row_id, data):
              url = f"{supabase_url}/rest/v1/Telegram_queue?id=eq.{row_id}"
              request_json(url, method="PATCH", data=data)

          url = (
              f"{supabase_url}/rest/v1/Telegram_queue"
              "?select=*&Status=eq.Offen&order=id.asc&limit=5"
          )

          rows = request_json(url)

          if not rows:
              print("Keine offenen Telegram-Nachrichten.")
              raise SystemExit(0)

          for row in rows:
              row_id = row["id"]
              chat_id = row.get("Chat_id") or default_chat_id
              titel = row.get("Titel") or "FS25 RP"
              nachricht = row.get("Nachricht") or ""

              text = f"{titel}\n\n{nachricht}"

              try:
                  send_url = (
                      "https://api.telegram.org/bot"
                      + bot_token
                      + "/sendMessage"
                  )

                  payload = {
                      "chat_id": chat_id,
                      "text": text
                  }

                  req = urllib.request.Request(
                      send_url,
                      data=json.dumps(payload).encode("utf-8"),
                      headers={"Content-Type": "application/json"},
                      method="POST"
                  )

                  with urllib.request.urlopen(req, timeout=30) as res:
                      telegram_response = res.read().decode("utf-8")
                      print(telegram_response)

                  patch_queue(row_id, {
                      "Status": "Gesendet",
                      "Gesendet": True,
                      "Fehler": None
                  })

              except Exception as e:
                  patch_queue(row_id, {
                      "Status": "Fehler",
                      "Gesendet": False,
                      "Fehler": str(e)
                  })

                  print("Fehler:", e)
          PY
