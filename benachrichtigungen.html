<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benachrichtigungen</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  overflow-x:hidden;
  background:#000;
  color:#00ff22;
  font-family:Arial,sans-serif;
}

.app{
  width:100%;
  max-width:600px;
  margin:auto;
  padding:20px 15px 60px;
}

.back{
  background:#222;
  color:white;
  border:1px solid #555;
  padding:12px 20px;
  border-radius:10px;
  margin-bottom:35px;
  font-size:18px;
}

h1{
  color:white;
  text-align:center;
  font-family:Georgia,serif;
  font-size:40px;
  margin:25px 0 35px;
}

@media (max-width:500px){
  h1{
    font-size:26px;
  }
}

.card{
  background:#111;
  border:1px solid #008000;
  border-radius:14px;
  padding:18px;
  margin-bottom:14px;
  width:100%;
  box-shadow:0 0 10px rgba(0,255,0,0.18);
}

.card.neu{
  border:2px solid red;
  box-shadow:0 0 14px rgba(255,0,0,0.45);
}

.card:active{
  background:#003300;
}

.titel{
  color:#00ff22;
  font-size:clamp(22px,5vw,30px);
  font-weight:bold;
}

.text{
  color:white;
  margin-top:10px;
  font-size:clamp(16px,4vw,20px);
  line-height:1.4;
}

.typ{
  color:#ffaa33;
  font-size:clamp(14px,3.5vw,18px);
  margin-top:10px;
}

.badge-neu{
  display:inline-block;
  background:red;
  color:white;
  border-radius:20px;
  padding:3px 10px;
  font-size:14px;
  margin-left:8px;
}

.leer{
  color:white;
  text-align:center;
  margin-top:40px;
  font-size:18px;
}

.popup-bg{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  align-items:center;
  justify-content:center;
  padding:18px;
  z-index:10;
}

.popup{
  background:#111;
  border:2px solid #00aa22;
  border-radius:18px;
  padding:24px;
  width:100%;
  max-width:520px;
  color:white;
  box-shadow:0 0 25px #003300;
}

.popup h2{
  color:#00ff22;
  margin-top:0;
  font-size:clamp(26px,6vw,38px);
}

.popup p{
  font-size:clamp(17px,4vw,22px);
  line-height:1.4;
}

.popup .popup-typ{
  color:#ffaa33;
  margin-top:15px;
  font-size:18px;
}

.popup button{
  width:100%;
  margin-top:25px;
  padding:16px;
  background:#007a00;
  color:white;
  border:none;
  border-radius:12px;
  font-size:20px;
  font-weight:bold;
}

@media (min-width:800px){
  .card{
    padding:24px;
  }
}
</style>
</head>

<body>
<div class="app">

<button class="back" onclick="location.href='index.html'">← Zurück</button>

<h1>BENACHRICHTIGUNGEN</h1>

<div id="liste">Lade...</div>

</div>

<div id="popupBg" class="popup-bg">
  <div class="popup">
    <h2 id="popupTitel"></h2>
    <p id="popupNachricht"></p>
    <div class="popup-typ" id="popupTyp"></div>
    <button onclick="schliessePopup()">Schließen</button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY = "sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";

function zeigePopup(titel,nachricht,typ){
  document.getElementById("popupTitel").innerText = titel;
  document.getElementById("popupNachricht").innerText = nachricht;
  document.getElementById("popupTyp").innerText = "Typ: " + typ;
  document.getElementById("popupBg").style.display = "flex";
}

function schliessePopup(){
  document.getElementById("popupBg").style.display = "none";
}

async function markiereAlsGelesen(id){
  await fetch(
    SUPABASE_URL + "/rest/v1/Benachrichtigungen?id=eq." + id,
    {
      method:"PATCH",
      headers:{
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Content-Type":"application/json",
        "Prefer":"return=minimal"
      },
      body:JSON.stringify({
        Gelesen:true
      })
    }
  );
}

async function ladeBenachrichtigungen(){
  const box = document.getElementById("liste");

  const res = await fetch(
    SUPABASE_URL + "/rest/v1/Benachrichtigungen?select=*&order=id.desc",
    {
      headers:{
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      }
    }
  );

  const data = await res.json();

  if(!data || data.length === 0){
    box.innerHTML = "<div class='leer'>Keine Benachrichtigungen vorhanden.</div>";
    return;
  }

  box.innerHTML = "";

  data.forEach(b => {
    const titel = b.Titel || "Benachrichtigung";
    const nachricht = b.Nachricht || "";
    const typ = b.Typ || "-";
    const istNeu = b.Gelesen !== true;

    const div = document.createElement("div");
    div.className = istNeu ? "card neu" : "card";

    div.onclick = async function(){
      zeigePopup(titel,nachricht,typ);

      if(istNeu){
        await markiereAlsGelesen(b.id);
        div.className = "card";
        ladeBenachrichtigungen();
      }
    };

    div.innerHTML = `
      <div class="titel">
        ${titel}
        ${istNeu ? "<span class='badge-neu'>NEU</span>" : ""}
      </div>
      <div class="text">${nachricht}</div>
      <div class="typ">${typ}</div>
    `;

    box.appendChild(div);
  });
}

ladeBenachrichtigungen();
</script>

</body>
</html>
