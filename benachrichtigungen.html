<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benachrichtigungen</title>

<style>
body{
  margin:0;
  background:#000;
  color:#00ff22;
  font-family:Arial,sans-serif;
}
.app{
  max-width:430px;
  margin:auto;
  padding:25px 18px 60px;
}
h1{
  color:white;
  text-align:center;
  font-family:Georgia,serif;
}
.back{
  background:#222;
  color:white;
  border:1px solid #555;
  padding:12px 18px;
  border-radius:8px;
  margin-bottom:20px;
}
.card{
  background:#111;
  border:1px solid #008000;
  border-radius:10px;
  padding:15px;
  margin-bottom:12px;
}
.titel{
  color:#00ff22;
  font-size:20px;
  font-weight:bold;
}
.text{
  color:white;
  margin-top:8px;
}
.typ{
  color:#ffaa33;
  font-size:13px;
  margin-top:8px;
}
</style>
</head>

<body>
<div class="app">

<button class="back" onclick="location.href='index.html'">← Zurück</button>

<h1>BENACHRICHTIGUNGEN</h1>

<div id="liste">Lade...</div>

</div>

<script>
const SUPABASE_URL = "https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY = "sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";

async function ladeBenachrichtigungen(){
  const box = document.getElementById("liste");

  const res = await fetch(
    SUPABASE_URL + "/rest/v1/Benachrichtigungen?select=*&order=id.desc",
    {
      headers:{
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      }
    }
  );

  const data = await res.json();

  if(!data || data.length === 0){
    box.innerHTML = "<p style='color:white;text-align:center'>Keine Benachrichtigungen vorhanden.</p>";
    return;
  }

  box.innerHTML = "";

  data.forEach(b => {
    const div = document.createElement("div");
    div.className = "card";
    div.onclick = function(){
  alert(
    (b.Titel || "Benachrichtigung") +
    "\n\n" +
    (b.Nachricht || "") +
    "\n\nTyp: " +
    (b.Typ || "-")
  );
};

div.innerHTML = `
  <div class="titel">${b.Titel || "Benachrichtigung"}</div>
  <div class="text">${b.Nachricht || ""}</div>
  <div class="typ">${b.Typ || ""}</div>
`;
    box.appendChild(div);
  });
}

ladeBenachrichtigungen();
</script>

</body>
</html>
