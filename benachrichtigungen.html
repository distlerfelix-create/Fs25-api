<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benachrichtigungen</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  overflow-x:hidden;
  background:#000;
  color:#00ff22;
  font-family:Arial,sans-serif;
}

.app{
  width:100%;
  max-width:600px;
  margin:auto;
  padding:20px 15px 60px;
}

.back{
  background:#222;
  color:white;
  border:1px solid #555;
  padding:12px 20px;
  border-radius:10px;
  margin-bottom:35px;
  font-size:18px;
}

h1{
  color:white;
  text-align:center;
  font-family:Georgia,serif;
  font-size:40px;
  margin:25px 0 35px;
}

@media (max-width:500px){
  h1{font-size:26px;}
}

.card{
  background:#111;
  border:1px solid #008000;
  border-radius:14px;
  padding:18px;
  margin-bottom:14px;
  width:100%;
  box-shadow:0 0 10px rgba(0,255,0,0.18);
}

.card.neu{
  border:2px solid red;
  box-shadow:0 0 14px rgba(255,0,0,0.45);
}

.card.einsatz{
  border:2px solid #ff6600;
  box-shadow:0 0 18px rgba(255,100,0,0.6);
}

.card.erledigt{
  border:2px solid #00cc44;
  box-shadow:0 0 16px rgba(0,255,80,0.45);
  opacity:0.85;
}

.card:active{
  background:#003300;
}

.titel{
  color:#00ff22;
  font-size:clamp(22px,5vw,30px);
  font-weight:bold;
}

.text{
  color:white;
  margin-top:10px;
  font-size:clamp(16px,4vw,20px);
  line-height:1.4;
  white-space:pre-line;
}

.typ{
  color:#ffaa33;
  font-size:clamp(14px,3.5vw,18px);
  margin-top:10px;
}

.badge-neu{
  display:inline-block;
  background:red;
  color:white;
  border-radius:20px;
  padding:3px 10px;
  font-size:14px;
  margin-left:8px;
}

.badge-einsatz{
  display:inline-block;
  background:#ff6600;
  color:white;
  border-radius:20px;
  padding:3px 10px;
  font-size:14px;
  margin-left:8px;
}

.badge-erledigt{
  display:inline-block;
  background:#008800;
  color:white;
  border-radius:20px;
  padding:3px 10px;
  font-size:14px;
  margin-left:8px;
}

.leer{
  color:white;
  text-align:center;
  margin-top:40px;
  font-size:18px;
}

.popup-bg{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  align-items:center;
  justify-content:center;
  padding:18px;
  z-index:10;
}

.popup{
  background:#111;
  border:2px solid #00aa22;
  border-radius:18px;
  padding:24px;
  width:100%;
  max-width:520px;
  color:white;
  box-shadow:0 0 25px #003300;
}

.popup h2{
  color:#00ff22;
  margin-top:0;
  font-size:clamp(26px,6vw,38px);
}

.popup p{
  font-size:clamp(17px,4vw,22px);
  line-height:1.4;
  white-space:pre-line;
}

.popup .popup-typ{
  color:#ffaa33;
  margin-top:15px;
  font-size:18px;
}

.popup button{
  width:100%;
  margin-top:18px;
  padding:16px;
  color:white;
  border:none;
  border-radius:12px;
  font-size:20px;
  font-weight:bold;
}

.btn-green{
  background:#007a00;
}

.btn-red{
  background:#cc3300;
}

.btn-dark{
  background:#333;
}
</style>
</head>

<body>
<div class="app">

<button class="back" onclick="location.href='index.html'">← Zurück</button>

<h1>BENACHRICHTIGUNGEN</h1>

<div id="liste">Lade...</div>

</div>

<div id="popupBg" class="popup-bg">
  <div class="popup">
    <h2 id="popupTitel"></h2>
    <p id="popupNachricht"></p>
    <div class="popup-typ" id="popupTyp"></div>

    <button id="einsatzBeendenBtn" class="btn-red" onclick="einsatzBeenden()" style="display:none">
      Einsatz beendet
    </button>

    <button class="btn-dark" onclick="schliessePopup()">Schließen</button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY = "sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";

const USERNAME = localStorage.getItem("username") || "Disti1701";
const USER_ID = Number(localStorage.getItem("user_id") || 1);
const HOF_ID = Number(localStorage.getItem("hof_id") || 1);

let organisationen = [];
let aktuelleBenachrichtigung = null;

function orgName(id){
  const org = organisationen.find(o => String(o.id) === String(id));
  return org ? org.Name : "Organisation " + id;
}

function zeigePopup(b){
  aktuelleBenachrichtigung = b;

  const titel = b.Titel || "Benachrichtigung";
  const nachricht = b.Nachricht || "";
  const typ = b.Typ || "-";
  const org = b.Organisation_id ? orgName(b.Organisation_id) : "";

  document.getElementById("popupTitel").innerText = titel;
  document.getElementById("popupNachricht").innerText = nachricht;

  document.getElementById("popupTyp").innerText =
    "Typ: " + typ + (org ? " | Organisation: " + org : "");

  const btn = document.getElementById("einsatzBeendenBtn");

  if(b.Typ === "Einsatz" && b.Erledigt !== true){
    btn.style.display = "block";
  }else{
    btn.style.display = "none";
  }

  document.getElementById("popupBg").style.display = "flex";
}

function schliessePopup(){
  document.getElementById("popupBg").style.display = "none";
}

async function patchBenachrichtigung(id,daten){
  await fetch(
    SUPABASE_URL + "/rest/v1/Benachrichtigungen?id=eq." + id,
    {
      method:"PATCH",
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY,
        "Content-Type":"application/json",
        "Prefer":"return=minimal"
      },
      body:JSON.stringify(daten)
    }
  );
}

async function markiereAlsGelesen(id){
  await patchBenachrichtigung(id,{Gelesen:true});
}

async function ladeOrganisationen(){
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/Organisationen?select=*",
    {
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY
      }
    }
  );

  organisationen = await res.json();
}

async function einsatzBeenden(){
  if(!aktuelleBenachrichtigung || !aktuelleBenachrichtigung.Auftrag_id){
    alert("Kein Auftrag verknüpft.");
    return;
  }

  const auftragId = aktuelleBenachrichtigung.Auftrag_id;

  await fetch(
    SUPABASE_URL + "/rest/v1/Auftraege?id=eq." + auftragId,
    {
      method:"PATCH",
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY,
        "Content-Type":"application/json",
        "Prefer":"return=minimal"
      },
      body:JSON.stringify({
        Status:"Erledigt",
        Erledigt_am:new Date().toISOString()
      })
    }
  );

  await fetch(
    SUPABASE_URL + "/rest/v1/Benachrichtigungen?Auftrag_id=eq." + auftragId,
    {
      method:"PATCH",
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY,
        "Content-Type":"application/json",
        "Prefer":"return=minimal"
      },
      body:JSON.stringify({
        Erledigt:true,
        Gelesen:true
      })
    }
  );

  await fetch(
    SUPABASE_URL + "/rest/v1/Benachrichtigungen",
    {
      method:"POST",
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY,
        "Content-Type":"application/json",
        "Prefer":"return=minimal"
      },
      body:JSON.stringify({
        Titel:"✅ Einsatz beendet",
        Nachricht:"Der Einsatz wurde von " + USERNAME + " beendet.",
        Typ:"Einsatz beendet",
        User_id:null,
        Hof_id:null,
        Organisation_id:aktuelleBenachrichtigung.Organisation_id,
        Auftrag_id:auftragId,
        Gelesen:false,
        Erledigt:true,
        Erstellt_am:new Date().toISOString()
      })
    }
  );

  alert("Einsatz wurde beendet.");
  schliessePopup();
  await ladeBenachrichtigungen();
}

async function ladeBenachrichtigungen(){
  const box = document.getElementById("liste");

  await ladeOrganisationen();

  const res = await fetch(
    SUPABASE_URL + "/rest/v1/Benachrichtigungen?select=*&order=id.desc",
    {
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY
      }
    }
  );

  const data = await res.json();

  if(!data || data.length === 0){
    box.innerHTML = "<div class='leer'>Keine Benachrichtigungen vorhanden.</div>";
    return;
  }

  data.sort((a,b)=>{
    const aEinsatz = a.Typ === "Einsatz" && a.Erledigt !== true;
    const bEinsatz = b.Typ === "Einsatz" && b.Erledigt !== true;

    if(aEinsatz && !bEinsatz) return -1;
    if(!aEinsatz && bEinsatz) return 1;

    return b.id - a.id;
  });

  box.innerHTML = "";

  data.forEach(b => {
    const titel = b.Titel || "Benachrichtigung";
    const nachricht = b.Nachricht || "";
    const typ = b.Typ || "-";
    const istNeu = b.Gelesen !== true;
    const istEinsatz = typ === "Einsatz";
    const istErledigt = b.Erledigt === true;
    const org = b.Organisation_id ? orgName(b.Organisation_id) : "";

    const div = document.createElement("div");

    if(istEinsatz && !istErledigt){
      div.className = istNeu ? "card neu einsatz" : "card einsatz";
    }else if(istErledigt || typ === "Einsatz beendet"){
      div.className = "card erledigt";
    }else{
      div.className = istNeu ? "card neu" : "card";
    }

    div.onclick = async function(){
      zeigePopup(b);

      if(istNeu){
        await markiereAlsGelesen(b.id);
        b.Gelesen = true;
        ladeBenachrichtigungen();
      }
    };

    div.innerHTML = `
      <div class="titel">
        ${titel}
        ${istNeu ? "<span class='badge-neu'>NEU</span>" : ""}
        ${istEinsatz && !istErledigt ? "<span class='badge-einsatz'>EINSATZ</span>" : ""}
        ${istErledigt ? "<span class='badge-erledigt'>ERLEDIGT</span>" : ""}
      </div>

      <div class="text">${nachricht}</div>

      <div class="typ">
        ${typ}
        ${org ? " | " + org : ""}
      </div>
    `;

    box.appendChild(div);
  });
}

ladeBenachrichtigungen();
</script>

</body>
</html>
