<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>FS25 Farm Manager</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  background:#1e1e1e;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:20px;
}

.card{
  background:#2b2b2b;
  padding:20px;
  border-radius:20px;
  margin:20px auto;
  max-width:400px;
}

button{
  background:#4CAF50;
  color:white;
  border:none;
  padding:15px 30px;
  border-radius:15px;
  font-size:20px;
}
</style>
</head>

<body>

<h1>🚜 FS25 Farm Manager</h1>

<div class="card">
<h2>Hof</h2>
<p id="hofname">Lade...</p>
</div>

<button onclick="ladeHof()">Neu laden</button>

<script>

const supabaseUrl =
"https://iddfyhsxsdjgestwxcei.supabase.co";

const supabaseKey =
"sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";

const supabase =
window.supabase.createClient(
supabaseUrl,
supabaseKey
);

async function ladeHof(){

document.getElementById("hofname").innerText =
"Verbinde...";

const { data, error } =
await supabase
.from("hoefe")
.select("*");

if(error){
document.getElementById("hofname").innerText =
"FEHLER: " + error.message;
return;
}

if(!data || data.length===0){
document.getElementById("hofname").innerText =
"Keine Daten gefunden";
return;
}

document.getElementById("hofname").innerText =
data[0].Name;
}

ladeHof();

</script>

</body>
</html>
