<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FS25 Farm Manager</title>

<style>
body{
  background:#1e1e1e;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:20px;
}
.card{
  background:#2b2b2b;
  padding:20px;
  border-radius:20px;
  margin:20px auto;
  max-width:400px;
}
button{
  background:#4CAF50;
  color:white;
  border:none;
  padding:15px 30px;
  border-radius:15px;
  font-size:20px;
}
</style>
</head>

<body>

<h1>🚜 FS25 Farm Manager</h1>

<div class="card">
  <h2>Hof</h2>
  <p id="hofname">Starte...</p>
</div>

<button onclick="ladeHof()">Neu laden</button>

<script>
const SUPABASE_URL = "https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY = "sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";

async function ladeHof(){
  const feld = document.getElementById("hofname");
  feld.innerText = "Verbinde mit Supabase...";

  try{
    const antwort = await fetch(
      SUPABASE_URL + "/rest/v1/hoefe?select=*",
      {
        headers:{
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer " + SUPABASE_KEY
        }
      }
    );

    const text = await antwort.text();

    if(!antwort.ok){
      feld.innerText = "FEHLER: " + text;
      return;
    }

    const daten = JSON.parse(text);

    if(daten.length === 0){
      feld.innerText = "Keine Höfe gefunden";
      return;
    }

    feld.innerText = daten[0].Name;

  }catch(fehler){
    feld.innerText = "FEHLER: " + fehler.message;
  }
}

ladeHof();
</script>

</body>
</html>
