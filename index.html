<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FS25 RP Fix1701</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  overflow-x:hidden;
  background:#000;
  color:#00ff22;
  font-family:Arial,sans-serif;
  text-align:center;
}

.app{
  width:100%;
  max-width:700px;
  margin:auto;
  padding:20px;
}

h1{
  color:white;
  font-family:Georgia,serif;
  font-size:40px;
  margin:20px 0 25px;
}

.welcome{
  font-size:clamp(28px,5vw,48px);
  font-weight:bold;
  line-height:1.15;
  margin-top:15px;
}

.status{
  color:white;
  margin-top:35px;
  font-size:clamp(18px,2vw,24px);
  line-height:1.35;
}

.status span{
  color:#00ff22;
}

.admin{
  display:none;
  width:100%;
  background:#ff1111;
  color:white;
  border:none;
  border-radius:14px;
  padding:18px;
  font-size:24px;
  font-weight:bold;
  margin:30px 0;
  box-shadow:0 0 12px rgba(255,0,0,0.45);
}

.menu button{
  width:100%;
  background:#008800;
  color:white;
  border:none;
  padding:18px;
  font-size:clamp(20px,2.5vw,28px);
  font-weight:bold;
  margin:6px 0;
  border-radius:14px;
  letter-spacing:2px;
  box-shadow:0 0 10px rgba(0,255,0,0.25);
}

.menu button:active{
  background:#00aa00;
}

.section-title{
  color:red;
  text-align:left;
  margin-top:50px;
  font-family:Georgia,serif;
  font-size:18px;
  font-weight:bold;
}

.org{
  display:flex;
  align-items:center;
  gap:15px;
  border-bottom:1px solid #555;
  padding:14px 0;
  color:#00ff22;
  font-size:18px;
  text-align:left;
}

.dot{
  width:38px;
  height:38px;
  min-width:38px;
  background:#ddd;
  border-radius:50%;
  box-shadow:0 0 8px rgba(255,255,255,0.4);
}

.notice{
  margin-top:25px;
  color:#ffaa33;
  font-size:14px;
}

.loading{
  color:white;
}

.badge{
  background:red;
  color:white;
  border-radius:20px;
  padding:2px 9px;
  font-size:18px;
  margin-left:8px;
}

@media (max-width:500px){
  .app{
    max-width:430px;
    padding:20px 16px 60px;
  }

  h1{
    font-size:38px;
  }

  .admin{
    font-size:20px;
  }
}
</style>
</head>

<body>
<div class="app">

<h1>HOME</h1>

<div class="welcome">
  Willkommen<br>
  <span id="vorname">...</span><br>
  auf deinem Hof:<br>
  <span id="hofname">...</span>
</div>

<div class="status">
  <b>SERVER STATUS:</b><br>
  Spieler Online: <span id="spieler">...</span><br>
  Monat: <span id="monat">...</span><br>
  Tag: <span id="tag">...</span><br>
  Zeit: <span id="zeit">...</span><br>
  Serverstatus: <span id="server">...</span><br>
  GitHubupdate: <span id="githubupdate">...</span><br>
</div>

<button id="adminButton" class="admin">🛡️ ADMIN</button>

<div class="menu">
  <button onclick="location.href='benachrichtigungen.html'">
    BENACHRICHTIGUNGEN <span id="badge" class="badge" style="display:none">0</span>
  </button>
  <button onclick="location.href='nachrichten.html'">NACHRICHTEN</button>
  <button>MARKTPLATZ</button>
  <button>BESTELLUNGEN</button>
  <button>AUFTRÄGE</button>
  <button>FELDER</button>
  <button>MITGLIEDER</button>
  <button>ORGANISATIONEN</button>
</div>

<div class="section-title">DU BIST MITGLIED BEI:</div>

<div id="organisationen">
  <div class="loading">Lade Organisationen...</div>
</div>

<div class="notice">REGELWERK FÜR SERVER</div>

</div>

<script>
const SUPABASE_URL = "https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY = "sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";

const AKTUELLER_USERNAME = "Disti1701";

async function api(tabelle){
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/" + tabelle + "?select=*",
    {
      headers:{
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      }
    }
  );

  if(!res.ok){
    throw new Error(await res.text());
  }

  return await res.json();
}

function wert(obj, namen, fallback=""){
  for(const n of namen){
    if(obj && obj[n] !== undefined && obj[n] !== null){
      return obj[n];
    }
  }
  return fallback;
}

async function ladeHome(){
  try{
    const users = await api("Users");
    const hoefe = await api("Hoefe");
    const serverstatus = await api("Serverstatus");
    const organisationen = await api("Organisationen");
    const benachrichtigungen = await api("Benachrichtigungen");

    let user =
      users.find(u => wert(u,["username","Username","PSN-Username"]) === AKTUELLER_USERNAME)
      || users[0];

    let hofId = wert(user,["hof_id","Hof_id","Hof_ID"],1);

    let hof =
      hoefe.find(h => String(wert(h,["id"])) === String(hofId))
      || hoefe[0];

    let status = serverstatus[0] || {};

    document.getElementById("vorname").innerText =
      wert(user,["vorname","Vorname"],"Felix");

    document.getElementById("hofname").innerText =
      wert(hof,["Name","name"],"BGA F&M");

    document.getElementById("spieler").innerText =
      wert(status,["spieler_online","Spieler_online","spielerOnline"],"0");

    document.getElementById("monat").innerText =
      wert(status,["monat","Monat"],"-");

    document.getElementById("tag").innerText =
      wert(status,["tag","Tag"],"-");

    document.getElementById("zeit").innerText =
      wert(status,["zeit","Zeit"],"-");

    let online = wert(status,["server_online","Server_online","serverOnline"],false);

    document.getElementById("server").innerText =
      online === true ? "🟢 Online" : "🔴 Offline";

    document.getElementById("githubupdate").innerText =
      wert(status,["github_update","Github_update","letztes_update","Letztes_update"],"-");

    let ungelesen = benachrichtigungen.filter(b =>
      wert(b,["gelesen","Gelesen"],false) === false
    ).length;


    if(ungelesen > 0){
      document.getElementById("badge").style.display = "inline-block";
      document.getElementById("badge").innerText = ungelesen;
    }

    let istAdmin = wert(user,["admin","Admin"],false);
    if(istAdmin === true){
      document.getElementById("adminButton").style.display = "block";
    }

    let orgBox = document.getElementById("organisationen");
    orgBox.innerHTML = "";

    organisationen.forEach(org => {
      const div = document.createElement("div");
      div.className = "org";
      div.innerHTML =
        '<div class="dot"></div><div>' +
        wert(org,["Name","name"],"Organisation") +
        '</div>';
      orgBox.appendChild(div);
    });

  }catch(err){
    document.getElementById("hofname").innerText =
      "Fehler beim Laden";
    alert(err.message);
  }
}

ladeHome();
</script>

</body>
</html>
