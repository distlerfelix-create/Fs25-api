<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FS25 RP Fix1701</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  overflow-x:hidden;
  background:#000;
  color:#00ff22;
  font-family:Arial,sans-serif;
  text-align:center;
}

.app{
  width:100%;
  max-width:700px;
  margin:auto;
  padding:20px;
}

h1{
  color:white;
  font-family:Georgia,serif;
  font-size:40px;
  margin:20px 0 25px;
}

.welcome{
  font-size:clamp(28px,5vw,44px);
  font-weight:bold;
  line-height:1.15;
  margin-top:15px;
}

.card{
  background:#111;
  border:1px solid #008000;
  border-radius:14px;
  padding:18px;
  margin:18px 0;
  box-shadow:0 0 10px rgba(0,255,0,0.18);
}

.stats{
  color:white;
  font-size:19px;
  line-height:1.6;
}

.stats span{
  color:#00ff22;
  font-weight:bold;
}

.admin{
  display:none;
  width:100%;
  background:#ff1111;
  color:white;
  border:none;
  border-radius:14px;
  padding:18px;
  font-size:24px;
  font-weight:bold;
  margin:20px 0;
  box-shadow:0 0 12px rgba(255,0,0,0.45);
}

.menu button{
  width:100%;
  background:#008800;
  color:white;
  border:none;
  padding:18px;
  font-size:clamp(20px,2.5vw,28px);
  font-weight:bold;
  margin:6px 0;
  border-radius:14px;
  letter-spacing:1px;
  box-shadow:0 0 10px rgba(0,255,0,0.25);
}

.menu button:active{
  background:#00aa00;
}

.badge{
  background:red;
  color:white;
  border-radius:20px;
  padding:2px 9px;
  font-size:18px;
  margin-left:8px;
}

.section-title{
  color:red;
  text-align:left;
  margin-top:35px;
  font-family:Georgia,serif;
  font-size:18px;
  font-weight:bold;
}

.org{
  background:#111;
  border:1px solid #006600;
  border-radius:12px;
  padding:12px;
  margin:8px 0;
  color:white;
  text-align:left;
}

.org span{
  color:#ffaa33;
}

.logout{
  background:#333!important;
}

.notice{
  margin-top:25px;
  color:#ffaa33;
  font-size:14px;
}
</style>
</head>

<body>
<div class="app">

<h1>HOME</h1>

<div class="welcome">
  Willkommen<br>
  <span id="vorname">...</span><br>
  auf deinem Hof:<br>
  <span id="hofname">...</span>
</div>

<div class="card stats">
  🔔 Neue Benachrichtigungen: <span id="anzahlBenachrichtigungen">0</span><br>
  🚨 Offene Einsätze: <span id="anzahlEinsaetze">0</span><br>
  🌾 Erntereife Felder: <span id="anzahlFelder">0</span><br>
  🏪 Aktive Angebote: <span id="anzahlAngebote">0</span><br>
  👥 Spieler: <span id="anzahlSpieler">0</span>
</div>

<div class="card stats">
  <b>SERVER STATUS</b><br>
  Spieler Online: <span id="spieler">...</span><br>
  Monat: <span id="monat">...</span><br>
  Tag: <span id="tag">...</span><br>
  Zeit: <span id="zeit">...</span><br>
  Status: <span id="server">...</span><br>
  GitHubupdate: <span id="githubupdate">...</span>
</div>

<button id="adminButton" class="admin">🛡️ ADMIN</button>

<div class="menu">
  <button onclick="location.href='benachrichtigungen.html'">BENACHRICHTIGUNGEN <span id="badge" class="badge" style="display:none">0</span></button>
  <button onclick="location.href='nachrichten.html'">NACHRICHTEN</button>
  <button onclick="location.href='felder.html'">FELDVERWALTUNG</button>
  <button onclick="location.href='marktplatz.html'">MARKTPLATZ</button>
  <button onclick="location.href='organisationen.html'">ORGANISATIONEN</button>
  <button onclick="location.href='einsatz_erstellen.html'">🚨 EINSATZ ERSTELLEN</button>
  <button onclick="location.href='profil.html'">PROFIL</button>
  <button class="logout" onclick="logout()">LOGOUT</button>
</div>

<div class="section-title">DEINE ORGANISATIONEN:</div>
<div id="organisationen">Lade...</div>

<div class="notice">FS25 RP SERVER</div>

</div>

<script>
const SUPABASE_URL = "https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY = "sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";

const USER_ID = localStorage.getItem("user_id");

if(!USER_ID){
  location.href = "login.html";
}

async function api(tabelle){
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/" + tabelle + "?select=*",
    {
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY
      }
    }
  );

  if(!res.ok){
    throw new Error(await res.text());
  }

  return await res.json();
}

function wert(obj,namen,fallback=""){
  for(const n of namen){
    if(obj && obj[n] !== undefined && obj[n] !== null){
      return obj[n];
    }
  }
  return fallback;
}

async function ladeHome(){
  try{
    const users = await api("Users");
    const hoefe = await api("Hoefe");
    const serverstatus = await api("Serverstatus");
    const benachrichtigungen = await api("Benachrichtigungen");
    const felder = await api("Felder");
    const angebote = await api("Angebote");
    const auftraege = await api("Auftraege");
    const organisationen = await api("Organisationen");
    const userOrgs = await api("User_organisationen");

    const user = users.find(u => String(u.id) === String(USER_ID));

    if(!user){
      localStorage.clear();
      location.href = "login.html";
      return;
    }

    const hof = hoefe.find(h => String(h.id) === String(user.Hof_id));

    document.getElementById("vorname").innerText = user.Vorname || "-";
    document.getElementById("hofname").innerText = user.Hof || (hof ? hof.Name : "-");

    const ungelesen = benachrichtigungen.filter(b =>
      b.Gelesen !== true &&
      b.Archiviert !== true
    ).length;

    document.getElementById("anzahlBenachrichtigungen").innerText = ungelesen;

    if(ungelesen > 0){
      document.getElementById("badge").style.display = "inline-block";
      document.getElementById("badge").innerText = ungelesen;
    }

    const offeneEinsaetze = auftraege.filter(a =>
      a.Auftragstyp === "Einsatz" &&
      a.Status !== "Erledigt"
    ).length;

    document.getElementById("anzahlEinsaetze").innerText = offeneEinsaetze;

    const erntereif = felder.filter(f => f.Erntebereit === true).length;
    document.getElementById("anzahlFelder").innerText = erntereif;

    const aktiveAngebote = angebote.filter(a => a.Aktiv === true).length;
    document.getElementById("anzahlAngebote").innerText = aktiveAngebote;

    document.getElementById("anzahlSpieler").innerText = users.length;

    const status = serverstatus[0] || {};

    document.getElementById("spieler").innerText = wert(status,["spieler_online","Spieler_online"],"0");
    document.getElementById("monat").innerText = wert(status,["monat","Monat"],"-");
    document.getElementById("tag").innerText = wert(status,["tag","Tag"],"-");
    document.getElementById("zeit").innerText = wert(status,["zeit","Zeit"],"-");

    const online = wert(status,["server_online","Server_online"],false);
    document.getElementById("server").innerText = online === true ? "🟢 Online" : "🔴 Offline";

    document.getElementById("githubupdate").innerText =
      wert(status,["github_update","Github_update","letztes_update","Letztes_update"],"-");

    if(user.Admin === true){
      document.getElementById("adminButton").style.display = "block";
    }

    const orgBox = document.getElementById("organisationen");
    orgBox.innerHTML = "";

    const meineOrgs = userOrgs.filter(o =>
      String(o.User_id) === String(USER_ID) &&
      o.Aktiv === true
    );

    if(meineOrgs.length === 0){
      orgBox.innerHTML = "<div class='org'>Keine Organisationen.</div>";
    }else{
      meineOrgs.forEach(e => {
        const org = organisationen.find(o => String(o.id) === String(e.Organisation_id));
        const div = document.createElement("div");
        div.className = "org";
        div.innerHTML =
          "<b>" + (org ? org.Name : "Organisation") + "</b><br>" +
          "<span>Rolle: " + (e.Rolle || "-") + "</span>";
        orgBox.appendChild(div);
      });
    }

  }catch(err){
    alert(err.message);
  }
}

function logout(){
  localStorage.clear();
  location.href = "login.html";
}

ladeHome();
</script>

</body>
</html>
