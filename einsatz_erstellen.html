<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Einsatz erstellen</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  background:#000;
  color:#00ff22;
  font-family:Arial,sans-serif;
}

.app{
  width:100%;
  max-width:700px;
  margin:auto;
  padding:20px;
}

.back{
  background:#222;
  color:white;
  border:1px solid #555;
  padding:14px 22px;
  border-radius:12px;
  margin-bottom:35px;
  font-size:18px;
}

h1{
  color:white;
  text-align:center;
  font-family:Georgia,serif;
  font-size:38px;
}

.card{
  background:#111;
  border:1px solid #008000;
  border-radius:14px;
  padding:20px;
  margin-bottom:18px;
}

input, textarea{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:10px;
  border:1px solid #008000;
  background:#000;
  color:white;
  font-size:17px;
}

textarea{
  min-height:120px;
}

.org{
  display:flex;
  align-items:center;
  gap:10px;

  width:100%;
  margin-top:10px;
  padding:12px 15px;

  background:#000;
  border:1px solid #006600;
  border-radius:10px;

  color:white;
  font-size:18px;
}

.org input{
  width:auto;
  margin-right:10px;
}

button{
  width:100%;
  margin-top:14px;
  padding:16px;
  border:none;
  border-radius:12px;
  font-size:18px;
  font-weight:bold;
}

.green{
  background:#008800;
  color:white;
}

.msg{
  color:#ffaa33;
  text-align:center;
  margin-top:15px;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="app">

<button class="back" onclick="history.back()">← Zurück</button>

<h1>EINSATZ ERSTELLEN</h1>

<div class="card">
  <input id="titel" placeholder="Titel, z.B. Verkehrsunfall">
  <textarea id="beschreibung" placeholder="Beschreibung des Einsatzes"></textarea>
  <input id="belohnung" type="number" placeholder="Belohnung / Vergütung">

  <h2>Organisationen</h2>
  <div id="orgListe">Lade Organisationen...</div>

  <button class="green" onclick="einsatzErstellen()">Einsatz erstellen</button>

  <div id="meldung" class="msg"></div>
</div>

</div>

<script>
const SUPABASE_URL = "https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY = "sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";

const USERNAME = localStorage.getItem("username") || "Disti1701";
const HOF = localStorage.getItem("hof") || "BGA F&M";
const USER_ID = Number(localStorage.getItem("user_id") || 1);
const HOF_ID = Number(localStorage.getItem("hof_id") || 1);

if(!localStorage.getItem("user_id")){
  location.href = "login.html";
}

let organisationen = [];

async function ladeOrganisationen(){
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/Organisationen?select=*&order=id.asc",
    {
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY
      }
    }
  );

  organisationen = await res.json();

  const box = document.getElementById("orgListe");
  box.innerHTML = "";

  organisationen.forEach(org => {
    const div = document.createElement("div");
    div.className = "org";

    div.innerHTML = `
<label style="display:flex;align-items:center;gap:10px;width:100%;">
  <input type="checkbox" value="${org.id}">
  <span>${org.Name}</span>
</label>
`;

    box.appendChild(div);
  });
}

async function einsatzErstellen(){
  const titel = document.getElementById("titel").value.trim();
  const beschreibung = document.getElementById("beschreibung").value.trim();
  const belohnung = Number(document.getElementById("belohnung").value || 0);
  const meldung = document.getElementById("meldung");

  meldung.innerText = "";

  const ausgewaehlt = Array.from(
    document.querySelectorAll("#orgListe input:checked")
  ).map(x => Number(x.value));

  if(!titel || !beschreibung){
    meldung.innerText = "Bitte Titel und Beschreibung ausfüllen.";
    return;
  }

  if(ausgewaehlt.length === 0){
    meldung.innerText = "Bitte mindestens eine Organisation auswählen.";
    return;
  }

  const res = await fetch(
    SUPABASE_URL + "/rest/v1/Auftraege",
    {
      method:"POST",
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY,
        "Content-Type":"application/json",
        "Prefer":"return=representation"
      },
      body:JSON.stringify({
        Titel:titel,
        Beschreibung:beschreibung,
        Typ:"Einsatz",
        Auftragstyp:"Einsatz",
        Sichtbarkeit:"organisation",
        Ziel_id:null,
        Hof:HOF,
        Organisation:"Mehrere",
        Status:"Offen",
        Erstellt_von:USERNAME,
        Belohnung:belohnung,
        Erstellt_am:new Date().toISOString()
      })
    }
  );

  if(!res.ok){
    meldung.innerText = await res.text();
    return;
  }

  const auftrag = (await res.json())[0];

  for(const orgId of ausgewaehlt){
    await fetch(
      SUPABASE_URL + "/rest/v1/Einsatz_Organisationen",
      {
        method:"POST",
        headers:{
          "apikey":SUPABASE_KEY,
          "Authorization":"Bearer " + SUPABASE_KEY,
          "Content-Type":"application/json",
          "Prefer":"return=minimal"
        },
        body:JSON.stringify({
          Auftrag_id:auftrag.id,
          Organisation_id:orgId
        })
      }
    );

    const org = organisationen.find(o => Number(o.id) === Number(orgId));

    await fetch(
      SUPABASE_URL + "/rest/v1/Benachrichtigungen",
      {
        method:"POST",
        headers:{
          "apikey":SUPABASE_KEY,
          "Authorization":"Bearer " + SUPABASE_KEY,
          "Content-Type":"application/json",
          "Prefer":"return=minimal"
        },
        body:JSON.stringify({
          Titel:"Neuer Einsatz",
          Nachricht:titel + " wurde für " + (org ? org.Name : "eine Organisation") + " erstellt.",
          Typ:"Einsatz",
          User_id:USER_ID,
          Hof_id:HOF_ID,
          Gelesen:false,
          Erstellt_am:new Date().toISOString()
        })
      }
    );
  }

  meldung.innerText = "Einsatz wurde erstellt und Organisationen wurden verständigt.";

  document.getElementById("titel").value = "";
  document.getElementById("beschreibung").value = "";
  document.getElementById("belohnung").value = "";

  document.querySelectorAll("#orgListe input").forEach(x => x.checked = false);
}

ladeOrganisationen();
</script>

</body>
</html>
