<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aufträge</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  background:#000;
  color:#00ff22;
  font-family:Arial,sans-serif;
}

.app{
  max-width:700px;
  margin:auto;
  padding:20px;
}

.back{
  background:#222;
  color:white;
  border:1px solid #555;
  padding:14px 22px;
  border-radius:12px;
  margin-bottom:35px;
  font-size:18px;
}

h1{
  color:white;
  text-align:center;
  font-family:Georgia,serif;
  font-size:38px;
}

.card{
  background:#111;
  border:1px solid #008000;
  border-radius:14px;
  padding:20px;
  margin-bottom:16px;
  box-shadow:0 0 10px rgba(0,255,0,0.18);
}

.card.einsatz{
  border:2px solid #ff6600;
  box-shadow:0 0 18px rgba(255,100,0,0.6);
}

.card.erledigt{
  border:2px solid #008800;
  opacity:0.75;
}

.titel{
  color:#00ff22;
  font-size:28px;
  font-weight:bold;
}

.text{
  color:white;
  margin-top:10px;
  font-size:18px;
  line-height:1.4;
  white-space:pre-line;
}

.meta{
  color:#ffaa33;
  margin-top:12px;
  font-size:16px;
}

.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:20px;
  color:white;
  font-size:14px;
  margin-left:6px;
}

.orange{background:#ff6600;}
.green{background:#008800;}
.gray{background:#333;}

.leer{
  color:white;
  text-align:center;
  margin-top:40px;
  font-size:18px;
}
</style>
</head>

<body>
<div class="app">

<button class="back" onclick="location.href='index.html'">← Zurück</button>

<h1>AUFTRÄGE</h1>

<div id="liste">Lade...</div>

</div>

<script>
const SUPABASE_URL = "https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY = "sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";

async function ladeAuftraege(){
  const box = document.getElementById("liste");

  const res = await fetch(
    SUPABASE_URL + "/rest/v1/Auftraege?select=*&order=id.desc",
    {
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY
      }
    }
  );

  if(!res.ok){
    box.innerHTML = "<div class='leer'>Aufträge konnten nicht geladen werden.</div>";
    return;
  }

  const data = await res.json();

  if(!data || data.length === 0){
    box.innerHTML = "<div class='leer'>Keine Aufträge vorhanden.</div>";
    return;
  }

  data.sort((a,b)=>{
    const aEinsatz = a.Auftragstyp === "Einsatz" || a.Typ === "Einsatz";
    const bEinsatz = b.Auftragstyp === "Einsatz" || b.Typ === "Einsatz";

    const aErledigt = a.Status === "Erledigt";
    const bErledigt = b.Status === "Erledigt";

    if(aEinsatz && !aErledigt && !(bEinsatz && !bErledigt)) return -1;
    if(!(aEinsatz && !aErledigt) && bEinsatz && !bErledigt) return 1;

    if(!aErledigt && bErledigt) return -1;
    if(aErledigt && !bErledigt) return 1;

    return b.id - a.id;
  });

  box.innerHTML = "";

  data.forEach(a => {
    const istEinsatz = a.Auftragstyp === "Einsatz" || a.Typ === "Einsatz";
    const istErledigt = a.Status === "Erledigt";

    const div = document.createElement("div");
    div.className =
      "card" +
      (istEinsatz && !istErledigt ? " einsatz" : "") +
      (istErledigt ? " erledigt" : "");

    div.onclick = function(){
      location.href = "auftrag.html?id=" + a.id;
    };

    div.innerHTML = `
      <div class="titel">
        ${istEinsatz ? "🚨 " : "📋 "}
        ${a.Titel || "Auftrag"}
        ${istEinsatz ? "<span class='badge orange'>EINSATZ</span>" : ""}
        ${istErledigt ? "<span class='badge green'>ERLEDIGT</span>" : ""}
      </div>

      <div class="text">${a.Beschreibung || ""}</div>

      <div class="meta">
        Status: ${a.Status || "-"}<br>
        Typ: ${a.Auftragstyp || a.Typ || "-"}<br>
        Erstellt von: ${a.Erstellt_von || "-"}<br>
        Belohnung: ${a.Belohnung || 0} €
      </div>
    `;

    box.appendChild(div);
  });
}

ladeAuftraege();
</script>

</body>
</html>
