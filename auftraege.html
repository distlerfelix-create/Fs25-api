<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aufträge</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#000;color:#00ff22;font-family:Arial,sans-serif}.app{max-width:760px;margin:auto;padding:20px 15px 70px}.back{background:#222;color:white;border:1px solid #555;padding:14px 22px;border-radius:12px;margin-bottom:25px;font-size:18px}h1{color:white;text-align:center;font-family:Georgia,serif;font-size:38px;margin:20px 0 24px}.card{background:#111;border:1px solid #008000;border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 0 10px rgba(0,255,0,.18)}.card.einsatz{border:2px solid #ff6600;box-shadow:0 0 18px rgba(255,100,0,.55)}.card.abgelehnt{border:2px solid #aa0000;opacity:.82}.card.erledigt{border:2px solid #008800;opacity:.82}.card.archiv{opacity:.62}.titel{color:#00ff22;font-size:27px;font-weight:bold;line-height:1.25}.text{color:white;margin-top:10px;font-size:17px;line-height:1.45;white-space:pre-line}.meta{color:#ffaa33;margin-top:12px;font-size:15px;line-height:1.55}.badges{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}.badge{display:inline-block;padding:5px 10px;border-radius:20px;color:white;font-size:13px;font-weight:bold}.status-offen{background:#008800}.status-angenommen{background:#b59b00}.status-bearbeitung{background:#004488}.status-erledigt{background:#008800}.status-abgelehnt{background:#aa0000}.prio-hoch{background:#aa0000}.prio-mittel{background:#cc7700}.prio-niedrig{background:#008800}.typ-einsatz{background:#ff6600}.typ-auftrag{background:#333}.archiv-badge{background:#555}button{width:100%;margin:0 0 14px;padding:15px;border:none;border-radius:12px;font-size:18px;font-weight:bold;background:#008800;color:white}.leer{color:white;text-align:center;margin-top:40px;font-size:18px}.toolbar{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}.toolbar input,.toolbar select{width:100%;padding:13px;border-radius:10px;border:1px solid #008000;background:#000;color:white;font-size:16px}.toolbar .voll{grid-column:1/-1}.stat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.stat{background:#090909;border:1px solid #006600;border-radius:12px;padding:10px 6px;text-align:center;color:white;font-size:12px;line-height:1.25}.stat b{display:block;color:#00ff22;font-size:24px;margin-bottom:4px}.toggle-row{display:flex;align-items:center;justify-content:space-between;color:white;gap:10px}.toggle-row input{width:28px;height:28px}.info-line{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.info-box{background:#090909;border:1px solid #333;border-radius:10px;padding:10px;color:white;font-size:14px;line-height:1.35}.info-box b{display:block;color:#ffaa33;margin-bottom:3px}@media(max-width:640px){.toolbar{grid-template-columns:1fr}.toolbar .voll{grid-column:auto}.stat-grid{grid-template-columns:repeat(2,1fr)}.info-line{grid-template-columns:1fr}h1{font-size:34px}}
</style>
</head>
<body>
<div class="app">
<button class="back" onclick="location.href='index.html'">← Zurück</button>
<h1>AUFTRÄGE</h1>
<button onclick="location.href='auftrag_erstellen.html'">➕ Auftrag erstellen</button>
<div class="card"><div class="titel">Übersicht</div><div class="stat-grid"><div class="stat"><b id="statOffen">0</b>Offen</div><div class="stat"><b id="statAngenommen">0</b>Angenommen</div><div class="stat"><b id="statBearbeitung">0</b>In Bearbeitung</div><div class="stat"><b id="statErledigt">0</b>Erledigt</div><div class="stat"><b id="statAbgelehnt">0</b>Abgelehnt</div></div></div>
<div class="card"><div class="titel">Filter</div><div class="toolbar"><input id="suche" class="voll" placeholder="Titel, Beschreibung, Hof, Organisation, Bearbeiter..." oninput="anzeigen()"><select id="statusFilter" onchange="anzeigen()"><option value="">Alle Status</option><option value="Offen">Offen</option><option value="Angenommen">Angenommen</option><option value="In Bearbeitung">In Bearbeitung</option><option value="Erledigt">Erledigt</option><option value="Abgelehnt">Abgelehnt</option></select><select id="prioFilter" onchange="anzeigen()"><option value="">Alle Prioritäten</option><option value="Hoch">Hoch</option><option value="Mittel">Mittel</option><option value="Niedrig">Niedrig</option></select><select id="hofFilter" onchange="anzeigen()"><option value="">Alle Höfe</option></select><select id="bearbeiterFilter" onchange="anzeigen()"><option value="">Alle Bearbeiter</option></select><select id="sortierung" onchange="anzeigen()"><option value="neu">Neueste zuerst</option><option value="alt">Älteste zuerst</option><option value="prioritaet">Priorität</option><option value="status">Status</option></select></div><div class="toggle-row"><span>Archivierte Aufträge anzeigen</span><input id="archivFilter" type="checkbox" onchange="anzeigen()"></div></div>
<div id="liste">Lade...</div>
</div>
<script>
const SUPABASE_URL="https://iddfyhsxsdjgestwxcei.supabase.co";const SUPABASE_KEY="sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";const USER_ID=localStorage.getItem("user_id");if(!USER_ID){location.href="login.html";}let auftraege=[],hoefe=[];function headers(){return{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}}async function api(t){const r=await fetch(SUPABASE_URL+"/rest/v1/"+t+"?select=*",{headers:headers()});if(!r.ok)throw new Error(await r.text());return await r.json()}function text(v){return v===null||v===undefined||v===""?"-":v}function datum(v){if(!v)return"-";const d=new Date(v);if(isNaN(d.getTime()))return"-";return d.toLocaleDateString("de-DE")+" "+d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})}function formatZahl(v){return Number(v||0).toLocaleString("de-DE")}function normalisiereStatus(s){s=String(s||"Offen").trim().toLowerCase();if(s==="in arbeit"||s==="in bearbeitung"||s==="bearbeitung")return"In Bearbeitung";if(s==="abgeschlossen"||s==="erledigt")return"Erledigt";if(s==="angenommen")return"Angenommen";if(s==="abgelehnt")return"Abgelehnt";return"Offen"}function normalisierePrioritaet(p){p=String(p||"Mittel").trim().toLowerCase();if(p==="hoch")return"Hoch";if(p==="niedrig")return"Niedrig";return"Mittel"}function statusKlasse(s){s=normalisiereStatus(s);if(s==="Angenommen")return"status-angenommen";if(s==="In Bearbeitung")return"status-bearbeitung";if(s==="Erledigt")return"status-erledigt";if(s==="Abgelehnt")return"status-abgelehnt";return"status-offen"}function statusIcon(s){s=normalisiereStatus(s);if(s==="Angenommen")return"🟡";if(s==="In Bearbeitung")return"🔵";if(s==="Erledigt")return"✅";if(s==="Abgelehnt")return"❌";return"🟢"}function prioKlasse(p){p=normalisierePrioritaet(p);if(p==="Hoch")return"prio-hoch";if(p==="Niedrig")return"prio-niedrig";return"prio-mittel"}function prioIcon(p){p=normalisierePrioritaet(p);if(p==="Hoch")return"🔴";if(p==="Niedrig")return"🟢";return"🟡"}function istEinsatz(a){return a.Auftragstyp==="Einsatz"||a.Typ==="Einsatz"}function istArchiviert(a){return a.Archiviert===true}function hofNameAusAuftrag(a){if(a.Hof&&a.Hof!=="")return a.Hof;const id=a.Hof_id||a.Ziel_id;if(!id)return"-";const h=hoefe.find(x=>String(x.id)===String(id));return h?h.Name:"-"}function erstelltDatum(a){return a.Erstellt_am||a.created_at||null}function prioritaetsWert(p){p=normalisierePrioritaet(p);return p==="Hoch"?3:p==="Mittel"?2:1}function statusWert(s){s=normalisiereStatus(s);return({"Offen":1,"Angenommen":2,"In Bearbeitung":3,"Erledigt":4,"Abgelehnt":5})[s]||99}
function filterOptionenFuellen(){const hs=document.getElementById("hofFilter"),bs=document.getElementById("bearbeiterFilter"),hv=hs.value,bv=bs.value;const hn=[...new Set(auftraege.map(a=>hofNameAusAuftrag(a)).filter(v=>v&&v!=="-"))].sort((a,b)=>a.localeCompare(b,"de"));const bn=[...new Set(auftraege.map(a=>a.Bearbeiter_Name||a.Angenommen_von||"").filter(Boolean))].sort((a,b)=>a.localeCompare(b,"de"));hs.innerHTML='<option value="">Alle Höfe</option>';hn.forEach(n=>{const o=document.createElement("option");o.value=n;o.textContent=n;hs.appendChild(o)});bs.innerHTML='<option value="">Alle Bearbeiter</option>';bn.forEach(n=>{const o=document.createElement("option");o.value=n;o.textContent=n;bs.appendChild(o)});hs.value=hv;bs.value=bv}function statistikAktualisieren(){const a=auftraege.filter(x=>!istArchiviert(x));const z=s=>a.filter(x=>normalisiereStatus(x.Status)===s).length;statOffen.innerText=z("Offen");statAngenommen.innerText=z("Angenommen");statBearbeitung.innerText=z("In Bearbeitung");statErledigt.innerText=z("Erledigt");statAbgelehnt.innerText=z("Abgelehnt")}
function anzeigen(){const box=document.getElementById("liste"),suche=document.getElementById("suche").value.toLowerCase().trim(),sf=statusFilter.value,pf=prioFilter.value,hf=hofFilter.value,bf=bearbeiterFilter.value,arch=archivFilter.checked,sort=sortierung.value;let d=auftraege.filter(a=>{const s=normalisiereStatus(a.Status),p=normalisierePrioritaet(a.Prioritaet),h=hofNameAusAuftrag(a),b=a.Bearbeiter_Name||a.Angenommen_von||"";if(!arch&&istArchiviert(a))return false;if(sf&&s!==sf)return false;if(pf&&p!==pf)return false;if(hf&&h!==hf)return false;if(bf&&b!==bf)return false;return[a.Titel,a.Beschreibung,s,p,h,a.Organisation,a.Erstellt_von,b,a.Auftragstyp,a.Typ].join(" ").toLowerCase().includes(suche)});d.sort((a,b)=>{if(sort==="alt")return new Date(erstelltDatum(a)||0)-new Date(erstelltDatum(b)||0);if(sort==="prioritaet"){const x=prioritaetsWert(b.Prioritaet)-prioritaetsWert(a.Prioritaet);if(x!==0)return x}if(sort==="status"){const x=statusWert(a.Status)-statusWert(b.Status);if(x!==0)return x}const ae=istEinsatz(a)&&!["Erledigt","Abgelehnt"].includes(normalisiereStatus(a.Status)),be=istEinsatz(b)&&!["Erledigt","Abgelehnt"].includes(normalisiereStatus(b.Status));if(ae&&!be)return-1;if(!ae&&be)return 1;const af=["Erledigt","Abgelehnt"].includes(normalisiereStatus(a.Status)),bf2=["Erledigt","Abgelehnt"].includes(normalisiereStatus(b.Status));if(!af&&bf2)return-1;if(af&&!bf2)return 1;return Number(b.id||0)-Number(a.id||0)});if(d.length===0){box.innerHTML="<div class='leer'>Keine passenden Aufträge gefunden.</div>";return}box.innerHTML="";d.forEach(a=>{const s=normalisiereStatus(a.Status),p=normalisierePrioritaet(a.Prioritaet),bearb=a.Bearbeiter_Name||a.Angenommen_von||"-",archiv=istArchiviert(a);const div=document.createElement("div");let k="card";if(istEinsatz(a)&&!["Erledigt","Abgelehnt"].includes(s))k+=" einsatz";if(s==="Erledigt")k+=" erledigt";if(s==="Abgelehnt")k+=" abgelehnt";if(archiv)k+=" archiv";div.className=k;div.onclick=()=>location.href="auftrag.html?id="+a.id;div.innerHTML=`<div class="badges"><span class="badge ${statusKlasse(s)}">${statusIcon(s)} ${s}</span><span class="badge ${prioKlasse(p)}">${prioIcon(p)} ${p}</span><span class="badge ${istEinsatz(a)?"typ-einsatz":"typ-auftrag"}">${istEinsatz(a)?"🚨 Einsatz":"📋 Auftrag"}</span>${archiv?'<span class="badge archiv-badge">📂 Archiv</span>':""}</div><div class="titel">${text(a.Titel)}</div><div class="text">${text(a.Beschreibung)}</div><div class="info-line"><div class="info-box"><b>Bearbeiter</b>${text(bearb)}</div><div class="info-box"><b>Hof</b>${text(hofNameAusAuftrag(a))}</div><div class="info-box"><b>Organisation</b>${text(a.Organisation)}</div><div class="info-box"><b>Belohnung</b>${formatZahl(a.Belohnung)} €</div></div><div class="meta">Erstellt von: ${text(a.Erstellt_von)}<br>Erstellt: ${datum(erstelltDatum(a))}<br>Angenommen: ${datum(a.Angenommen_am)}<br>In Bearbeitung: ${datum(a.In_Bearbeitung_am)}<br>Erledigt: ${datum(a.Erledigt_am)}<br>Abgelehnt: ${datum(a.Abgelehnt_am)}</div>`;box.appendChild(div)})}
async function laden(){const box=document.getElementById("liste");try{const r=await Promise.all([api("Auftraege"),api("Hoefe")]);auftraege=r[0]||[];hoefe=r[1]||[];filterOptionenFuellen();statistikAktualisieren();anzeigen()}catch(e){box.innerHTML="<div class='leer'>Aufträge konnten nicht geladen werden.<br><br>"+e.message+"</div>"}}laden();
</script>
</body>
</html>
