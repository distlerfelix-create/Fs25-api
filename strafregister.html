<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strafregister V2</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#000;color:#00ff22;font-family:Arial,sans-serif}.app{width:100%;max-width:800px;margin:auto;padding:20px 15px 70px}.back{background:#222;color:white;border:1px solid #555;padding:13px 20px;border-radius:12px;margin-bottom:25px;font-size:18px}h1{color:white;text-align:center;font-family:Georgia,serif;font-size:38px;margin:20px 0 25px}.card{background:#111;border:1px solid #008000;border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 0 10px rgba(0,255,0,.18)}.titel{color:#00ff22;font-size:24px;font-weight:bold;margin-bottom:10px}.info{color:white;font-size:17px;line-height:1.45;white-space:pre-line}.meta{color:#ffaa33;font-size:15px;line-height:1.45;margin-top:10px;white-space:pre-line}.section-title{color:red;font-family:Georgia,serif;font-size:20px;font-weight:bold;margin:28px 0 12px}input,select,textarea{width:100%;padding:14px;margin-top:10px;border-radius:10px;border:1px solid #008000;background:#000;color:white;font-size:17px}textarea{min-height:95px;resize:vertical}button{width:100%;margin-top:12px;padding:15px;border:none;border-radius:12px;font-size:18px;font-weight:bold}.green{background:#008800;color:white}.dark{background:#333;color:white}.red{background:#aa0000;color:white}.blue{background:#004488;color:white}.leer{color:white;text-align:center;margin-top:25px;font-size:18px}.msg{color:#ffaa33;text-align:center;margin-top:12px;font-weight:bold;white-space:pre-line}.hidden{display:none!important}.badge{display:inline-block;color:white;border-radius:20px;padding:4px 10px;font-size:14px;margin-bottom:8px}.badge-fahrverbot{background:#cc0000}.badge-geldstrafe{background:#cc7700}.badge-verwarnung{background:#cc9900}.badge-haft{background:#660000}.badge-ausschluss{background:#111;border:1px solid red}.badge-erledigt{background:#008800}.badge-sonstiges{background:#555}.item{background:#090909;border:1px solid #006600;border-radius:12px;padding:14px;margin-bottom:12px}.item.fahrverbot{border:2px solid red;box-shadow:0 0 14px rgba(255,0,0,.35)}.item.geldstrafe{border:2px solid #ffaa33;box-shadow:0 0 14px rgba(255,170,0,.25)}.item.verwarnung{border:2px solid #cc9900}.item.haft{border:2px solid #660000;box-shadow:0 0 14px rgba(255,0,0,.25)}.item.erledigt{opacity:.72;border:1px solid #008800}.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.stat{background:#090909;border:1px solid #006600;border-radius:12px;padding:12px;text-align:center;color:white}.stat b{color:#00ff22;font-size:24px}.popup-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);align-items:center;justify-content:center;padding:16px;z-index:20}.popup{background:#111;border:2px solid #00aa22;border-radius:18px;padding:22px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;color:white;box-shadow:0 0 25px #003300}
</style>
</head>
<body>
<div class="app">
<button class="back" onclick="location.href='index.html'">← Zurück</button>
<h1>STRAFREGISTER</h1>
<div id="zugriff" class="card hidden"><div class="titel">Zugriff verweigert</div><div class="info">Du hast keine Berechtigung für das Strafregister.</div></div>
<div class="card"><div class="titel">Übersicht</div><div class="grid"><div class="stat"><b id="statOffen">0</b><br>Offen</div><div class="stat"><b id="statFahrverbote">0</b><br>Fahrverbote</div><div class="stat"><b id="statGeld">0</b><br>Geldstrafen</div></div><div id="rechteInfo" class="meta"></div></div>
<div id="formularBox" class="card hidden"><div class="titel">🚔 Neuer Eintrag</div><select id="userSelect"><option value="">Spieler auswählen</option></select><input id="aktenzeichen" placeholder="Aktenzeichen, z. B. POL-2026-001"><select id="typ"><option value="Verwarnung">Verwarnung</option><option value="Geldstrafe">Geldstrafe</option><option value="Fahrverbot">Fahrverbot</option><option value="Haftstrafe">Haftstrafe</option><option value="Ausschluss">Ausschluss</option><option value="Platzverweis">Platzverweis</option><option value="Sonstiges">Sonstiges</option></select><input id="betrag" type="number" value="0" placeholder="Betrag / Geldstrafe"><input id="verwarnpunkte" type="number" value="0" placeholder="Verwarnpunkte"><input id="gueltigBis" type="datetime-local"><textarea id="grund" placeholder="Grund / Beschreibung"></textarea><button class="green" onclick="eintragErstellen()">Eintrag erstellen</button><div id="formularMsg" class="msg"></div></div>
<div class="section-title">AKTIVE EINTRÄGE</div><div id="aktiveListe">Lade...</div><div class="section-title">ARCHIV / ERLEDIGT</div><div id="archivListe">Lade...</div>
</div>
<div id="editBg" class="popup-bg"><div class="popup"><div class="titel">Eintrag bearbeiten</div><input id="editAktenzeichen" placeholder="Aktenzeichen"><select id="editTyp"><option value="Verwarnung">Verwarnung</option><option value="Geldstrafe">Geldstrafe</option><option value="Fahrverbot">Fahrverbot</option><option value="Haftstrafe">Haftstrafe</option><option value="Ausschluss">Ausschluss</option><option value="Platzverweis">Platzverweis</option><option value="Sonstiges">Sonstiges</option></select><select id="editStatus"><option value="Offen">Offen</option><option value="In Bearbeitung">In Bearbeitung</option><option value="Abgeschlossen">Abgeschlossen</option><option value="Erledigt">Erledigt</option></select><input id="editBetrag" type="number" placeholder="Betrag"><input id="editVerwarnpunkte" type="number" placeholder="Verwarnpunkte"><input id="editGueltigBis" type="datetime-local"><textarea id="editGrund" placeholder="Grund"></textarea><button class="green" onclick="speichereBearbeitung()">Speichern</button><button class="dark" onclick="schliesseEdit()">Schließen</button><div id="editMsg" class="msg"></div></div></div>
<script>
const SUPABASE_URL="https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY="sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";
const ADMIN_CHAT_ID=6694745579;
const USER_ID=localStorage.getItem("user_id");
const USERNAME=localStorage.getItem("username")||"Unbekannt";
const IST_ADMIN_LOCAL=localStorage.getItem("admin")==="true";
if(!USER_ID){location.href="login.html";}
let users=[],organisationen=[],userOrgs=[],eintraege=[],aktuellerUser=null;
let darfAllesSehen=false,darfErstellen=false,istPolizei=false,editId=null;
function headers(){return {"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json"};}
async function api(t){const r=await fetch(SUPABASE_URL+"/rest/v1/"+t+"?select=*",{headers:headers()});if(!r.ok)throw new Error(await r.text());return await r.json();}
async function post(t,d){const r=await fetch(SUPABASE_URL+"/rest/v1/"+t,{method:"POST",headers:{...headers(),"Prefer":"return=minimal"},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());}
async function patch(t,id,d){const r=await fetch(SUPABASE_URL+"/rest/v1/"+t+"?id=eq."+id,{method:"PATCH",headers:{...headers(),"Prefer":"return=minimal"},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());}
function text(w){return w===null||w===undefined||w===""?"-":w;}
function userName(u){if(!u)return "-";return u["PSN-Username"]||u.Vorname||("User "+u.id);}
function datum(d){if(!d)return "-";const x=new Date(d);if(isNaN(x.getTime()))return "-";return x.toLocaleDateString("de-DE")+" "+x.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});}
function toDatetimeLocal(d){if(!d)return "";const x=new Date(d);if(isNaN(x.getTime()))return "";x.setMinutes(x.getMinutes()-x.getTimezoneOffset());return x.toISOString().slice(0,16);}
function typWert(e){return e.typ||"Sonstiges";}
function statusWert(e){return e.bearbeitungsstatus||"Offen";}
function istAbgelaufen(e){if(!e.gueltig_bis)return false;const bis=new Date(e.gueltig_bis);return !isNaN(bis.getTime())&&bis<new Date();}
function istErledigt(e){const s=statusWert(e);return e.erledigt===true||e.aktiv===false||istAbgelaufen(e)||s==="Erledigt"||s==="Abgeschlossen";}
function klasseFuerTyp(t,er){if(er)return "item erledigt";if(t==="Fahrverbot")return "item fahrverbot";if(t==="Geldstrafe")return "item geldstrafe";if(t==="Verwarnung")return "item verwarnung";if(t==="Haftstrafe")return "item haft";return "item";}
function badgeFuerTyp(t,er){if(er)return "<span class='badge badge-erledigt'>ERLEDIGT / ABGELAUFEN</span>";if(t==="Fahrverbot")return "<span class='badge badge-fahrverbot'>FAHRVERBOT</span>";if(t==="Geldstrafe")return "<span class='badge badge-geldstrafe'>GELDSTRAFE</span>";if(t==="Verwarnung")return "<span class='badge badge-verwarnung'>VERWARNUNG</span>";if(t==="Haftstrafe")return "<span class='badge badge-haft'>HAFTSTRAFE</span>";if(t==="Ausschluss")return "<span class='badge badge-ausschluss'>AUSSCHLUSS</span>";return "<span class='badge badge-sonstiges'>"+t.toUpperCase()+"</span>";}
function userVonEintrag(e){return users.find(u=>String(u.id)===String(e.user_id));}
function darfEintragSehen(e){if(darfAllesSehen)return true;const ziel=userVonEintrag(e);if(!aktuellerUser||!ziel)return String(e.user_id)===String(USER_ID);return String(ziel.Hof_id)===String(aktuellerUser.Hof_id);}
function pruefeRechte(){aktuellerUser=users.find(u=>String(u.id)===String(USER_ID));const polizei=organisationen.find(o=>String(o.Name).toLowerCase()==="polizei");istPolizei=false;if(polizei){istPolizei=userOrgs.some(o=>String(o.User_id)===String(USER_ID)&&String(o.Organisation_id)===String(polizei.id)&&o.Aktiv===true);}const istAdminDb=aktuellerUser&&aktuellerUser.Admin===true;darfAllesSehen=IST_ADMIN_LOCAL||istAdminDb||istPolizei;darfErstellen=IST_ADMIN_LOCAL||istAdminDb||istPolizei;document.getElementById("rechteInfo").innerText=darfAllesSehen?(istPolizei?"Ansicht: Polizei / alle Einträge":"Ansicht: Admin / alle Einträge"):"Ansicht: Eigener Hof / alle Hofmitglieder";}
function fuelleUserSelect(){const s=document.getElementById("userSelect");s.innerHTML="<option value=''>Spieler auswählen</option>";users.filter(u=>u.Aktiviert!==false).forEach(u=>{const o=document.createElement("option");o.value=u.id;o.textContent=userName(u)+" | "+text(u.Hof);s.appendChild(o);});}
async function ladeAlles(){try{users=await api("Users");organisationen=await api("Organisationen");userOrgs=await api("User_organisationen");eintraege=await api("strafregister");pruefeRechte();if(!aktuellerUser){document.getElementById("zugriff").classList.remove("hidden");document.getElementById("aktiveListe").innerHTML="";document.getElementById("archivListe").innerHTML="";return;}if(darfErstellen){document.getElementById("formularBox").classList.remove("hidden");fuelleUserSelect();}else{document.getElementById("formularBox").classList.add("hidden");}renderListen();}catch(err){document.getElementById("aktiveListe").innerHTML="<div class='card'><div class='info'>Fehler:<br><br>"+err.message+"</div></div>";}}
function renderListen(){const aBox=document.getElementById("aktiveListe"),rBox=document.getElementById("archivListe");let sichtbar=eintraege.filter(e=>darfEintragSehen(e));sichtbar.sort((a,b)=>new Date(b.created_at||0)-new Date(a.created_at||0));const aktive=sichtbar.filter(e=>!istErledigt(e));const archiv=sichtbar.filter(e=>istErledigt(e));document.getElementById("statOffen").innerText=aktive.length;document.getElementById("statFahrverbote").innerText=aktive.filter(e=>typWert(e)==="Fahrverbot").length;document.getElementById("statGeld").innerText=aktive.filter(e=>typWert(e)==="Geldstrafe").length;aBox.innerHTML="";rBox.innerHTML="";if(aktive.length===0){aBox.innerHTML="<div class='leer'>Keine aktiven Einträge.</div>";}else{aktive.forEach(e=>aBox.appendChild(erstelleKarte(e,false)));}if(archiv.length===0){rBox.innerHTML="<div class='leer'>Keine archivierten Einträge.</div>";}else{archiv.forEach(e=>rBox.appendChild(erstelleKarte(e,true)));}}
function erstelleKarte(e,er){const t=typWert(e);const div=document.createElement("div");div.className=klasseFuerTyp(t,er);const u=e.username||"-",g=e.grund||"-",b=e.betrag??0,p=e.verwarnpunkte??0,org=e.organisation||"-",ev=e.erstellt_von||"-",bv=e.bearbeitet_von||"-",az=e.aktenzeichen||"-",st=statusWert(e);let buttons="";if(darfErstellen){buttons+=`<button class="blue" onclick="oeffneEdit(${e.id})">Bearbeiten</button>`;}if(darfErstellen&&!er){buttons+=`<button class="green" onclick="eintragErledigen(${e.id})">Als erledigt markieren</button>`;buttons+=`<button class="red" onclick="eintragDeaktivieren(${e.id})">Deaktivieren</button>`;}div.innerHTML=`${badgeFuerTyp(t,er)}<div class="titel">${u}</div><div class="info"><b>Aktenzeichen:</b> ${az}<br><b>Status:</b> ${st}<br><b>Grund:</b><br>${g}<br><br><b>Betrag:</b> ${b} €<br><b>Verwarnpunkte:</b> ${p}</div><div class="meta">Organisation: ${org}\nErstellt von: ${ev}\nBearbeitet von: ${bv}\nErstellt am: ${datum(e.created_at)}\nGültig bis: ${datum(e.gueltig_bis)}</div>${buttons}`;return div;}
async function eintragErstellen(){const msg=document.getElementById("formularMsg");msg.innerText="";const userId=document.getElementById("userSelect").value;const typ=document.getElementById("typ").value;const grund=document.getElementById("grund").value.trim();const betrag=Number(document.getElementById("betrag").value||0);const verwarnpunkte=Number(document.getElementById("verwarnpunkte").value||0);const gueltigBis=document.getElementById("gueltigBis").value;let aktenzeichen=document.getElementById("aktenzeichen").value.trim();if(!userId){msg.innerText="Bitte Spieler auswählen.";return;}if(!grund){msg.innerText="Bitte Grund eingeben.";return;}const user=users.find(u=>String(u.id)===String(userId));const username=userName(user);if(!aktenzeichen){aktenzeichen="POL-"+new Date().getFullYear()+"-"+Date.now().toString().slice(-6);}try{await post("strafregister",{user_id:Number(userId),username:username,organisation:"Polizei",typ:typ,grund:grund,betrag:betrag,gueltig_bis:gueltigBis?new Date(gueltigBis).toISOString():null,erstellt_von:USERNAME,aktiv:true,telegram_gesendet:false,erledigt:false,aktenzeichen:aktenzeichen,bearbeitungsstatus:"Offen",bearbeitet_von:null,verwarnpunkte:verwarnpunkte});await post("Telegram_queue",{Titel:"🚔 Neuer Strafregister-Eintrag",Nachricht:"Neuer Eintrag im Strafregister:\n\nAktenzeichen: "+aktenzeichen+"\nSpieler: "+username+"\nTyp: "+typ+"\nBetrag: "+betrag+" €\nVerwarnpunkte: "+verwarnpunkte+"\nGrund: "+grund+"\nErstellt von: "+USERNAME,Typ:"Strafregister",User_id:Number(userId),Hof_id:user&&user.Hof_id?Number(user.Hof_id):null,Organisation_id:1,Chat_id:ADMIN_CHAT_ID,Gesendet:false,Erstellt_am:new Date().toISOString(),Status:"Offen",Fehler:null});msg.innerText="Eintrag wurde erstellt.";document.getElementById("aktenzeichen").value="";document.getElementById("grund").value="";document.getElementById("betrag").value="0";document.getElementById("verwarnpunkte").value="0";document.getElementById("gueltigBis").value="";await ladeAlles();}catch(err){msg.innerText="Fehler:\n"+err.message;}}
function oeffneEdit(id){const e=eintraege.find(x=>Number(x.id)===Number(id));if(!e)return;editId=id;document.getElementById("editAktenzeichen").value=e.aktenzeichen||"";document.getElementById("editTyp").value=e.typ||"Sonstiges";document.getElementById("editStatus").value=e.bearbeitungsstatus||"Offen";document.getElementById("editBetrag").value=e.betrag??0;document.getElementById("editVerwarnpunkte").value=e.verwarnpunkte??0;document.getElementById("editGueltigBis").value=toDatetimeLocal(e.gueltig_bis);document.getElementById("editGrund").value=e.grund||"";document.getElementById("editMsg").innerText="";document.getElementById("editBg").style.display="flex";}
function schliesseEdit(){document.getElementById("editBg").style.display="none";editId=null;}
async function speichereBearbeitung(){const msg=document.getElementById("editMsg");msg.innerText="";if(!editId)return;const status=document.getElementById("editStatus").value;try{await patch("strafregister",editId,{aktenzeichen:document.getElementById("editAktenzeichen").value.trim(),typ:document.getElementById("editTyp").value,grund:document.getElementById("editGrund").value.trim(),betrag:Number(document.getElementById("editBetrag").value||0),verwarnpunkte:Number(document.getElementById("editVerwarnpunkte").value||0),gueltig_bis:document.getElementById("editGueltigBis").value?new Date(document.getElementById("editGueltigBis").value).toISOString():null,bearbeitungsstatus:status,bearbeitet_von:USERNAME,erledigt:status==="Erledigt"||status==="Abgeschlossen",aktiv:!(status==="Erledigt"||status==="Abgeschlossen")});msg.innerText="Gespeichert.";await ladeAlles();setTimeout(schliesseEdit,800);}catch(err){msg.innerText="Fehler:\n"+err.message;}}
async function eintragErledigen(id){if(!confirm("Eintrag wirklich als erledigt markieren?"))return;try{await patch("strafregister",id,{erledigt:true,aktiv:false,bearbeitungsstatus:"Erledigt",bearbeitet_von:USERNAME});await ladeAlles();}catch(err){alert(err.message);}}
async function eintragDeaktivieren(id){if(!confirm("Eintrag wirklich deaktivieren?"))return;try{await patch("strafregister",id,{aktiv:false,bearbeitungsstatus:"Abgeschlossen",bearbeitet_von:USERNAME});await ladeAlles();}catch(err){alert(err.message);}}
ladeAlles();
</script>
</body>
</html>
