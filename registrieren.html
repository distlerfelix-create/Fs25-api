<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrieren</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  background:#000;
  color:#00ff22;
  font-family:Arial,sans-serif;
}

.app{
  max-width:700px;
  margin:auto;
  padding:20px;
}

.back{
  background:#222;
  color:white;
  border:1px solid #555;
  padding:14px 22px;
  border-radius:12px;
  margin-bottom:35px;
  font-size:18px;
}

h1{
  color:white;
  text-align:center;
  font-family:Georgia,serif;
  font-size:38px;
}

.card{
  background:#111;
  border:1px solid #008000;
  border-radius:14px;
  padding:20px;
  box-shadow:0 0 10px rgba(0,255,0,0.18);
}

label{
  color:#ffaa33;
  display:block;
  margin-top:14px;
  font-size:16px;
}

input{
  width:100%;
  padding:14px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #008000;
  background:#000;
  color:white;
  font-size:18px;
}

button{
  width:100%;
  margin-top:20px;
  padding:16px;
  border:none;
  border-radius:12px;
  background:#008800;
  color:white;
  font-size:20px;
  font-weight:bold;
}

.msg{
  margin-top:18px;
  color:#ffaa33;
  text-align:center;
  font-weight:bold;
  white-space:pre-line;
}
</style>
</head>

<body>
<div class="app">

<button class="back" onclick="location.href='login.html'">← Zurück</button>

<h1>REGISTRIEREN</h1>

<div class="card">
  <label>PSN-Username</label>
  <input id="username" placeholder="z.B. Disti1701">

  <label>Vorname / Spielername</label>
  <input id="spielername" placeholder="z.B. Felix">

  <label>Passwort</label>
  <input id="passwort" type="password" placeholder="Passwort">

  <label>Passwort wiederholen</label>
  <input id="passwort2" type="password" placeholder="Passwort wiederholen">

  <label>Discord Name</label>
  <input id="discord" placeholder="optional">

  <label>Telegram ID / Name</label>
  <input id="telegram" placeholder="optional">

  <button onclick="registrieren()">Registrierung absenden</button>

  <div id="meldung" class="msg"></div>
</div>

</div>

<script>
const SUPABASE_URL = "https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY = "sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";

async function registrieren(){
  const meldung = document.getElementById("meldung");

  const username = document.getElementById("username").value.trim();
  const spielername = document.getElementById("spielername").value.trim();
  const passwort = document.getElementById("passwort").value.trim();
  const passwort2 = document.getElementById("passwort2").value.trim();
  const discord = document.getElementById("discord").value.trim();
  const telegram = document.getElementById("telegram").value.trim();

  meldung.innerText = "";

  if(!username || !spielername || !passwort){
    meldung.innerText = "Bitte PSN-Username, Spielername und Passwort ausfüllen.";
    return;
  }

  if(passwort !== passwort2){
    meldung.innerText = "Die Passwörter stimmen nicht überein.";
    return;
  }

  if(passwort.length < 4){
    meldung.innerText = "Das Passwort muss mindestens 4 Zeichen haben.";
    return;
  }

  meldung.innerText = "Registrierung wird gesendet...";

  const pruefen = await fetch(
    SUPABASE_URL +
    "/rest/v1/Registrierungen?Username=eq." +
    encodeURIComponent(username) +
    "&select=*",
    {
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY
      }
    }
  );

  const vorhanden = await pruefen.json();

  if(vorhanden && vorhanden.length > 0){
    meldung.innerText = "Für diesen Username gibt es bereits eine Registrierung.";
    return;
  }

  const res = await fetch(
    SUPABASE_URL + "/rest/v1/Registrierungen",
    {
      method:"POST",
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY,
        "Content-Type":"application/json",
        "Prefer":"return=minimal"
      },
      body:JSON.stringify({
        Username:username,
        Passwort:passwort,
        Spielername:spielername,
        Discord:discord,
        Telegram:telegram,
        Status:"Offen"
      })
    }
  );

  if(!res.ok){
    meldung.innerText = "Fehler:\n" + await res.text();
    return;
  }

  meldung.innerText =
    "Registrierung gesendet.\nEin Admin muss dich noch freischalten.";

  document.getElementById("username").value = "";
  document.getElementById("spielername").value = "";
  document.getElementById("passwort").value = "";
  document.getElementById("passwort2").value = "";
  document.getElementById("discord").value = "";
  document.getElementById("telegram").value = "";
}
</script>

</body>
</html>
