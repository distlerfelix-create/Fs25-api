<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nachrichten</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  overflow-x:hidden;
  background:#000;
  color:#00ff22;
  font-family:Arial,sans-serif;
}

.app{
  width:100%;
  max-width:700px;
  margin:auto;
  padding:20px;
}

.back{
  background:#222;
  color:white;
  border:1px solid #555;
  padding:14px 22px;
  border-radius:12px;
  margin-bottom:35px;
  font-size:18px;
}

h1{
  color:white;
  text-align:center;
  font-family:Georgia,serif;
  font-size:40px;
  margin:25px 0 35px;
}

.card{
  background:#111;
  border:1px solid #008000;
  border-radius:14px;
  padding:20px;
  margin-bottom:16px;
  box-shadow:0 0 10px rgba(0,255,0,0.18);
}

.titel{
  color:#00ff22;
  font-size:28px;
  font-weight:bold;
}

.inhalt{
  color:white;
  margin-top:12px;
  font-size:20px;
  line-height:1.4;
}

.meta{
  color:#ffaa33;
  margin-top:14px;
  font-size:15px;
}

.leer{
  color:white;
  text-align:center;
  margin-top:40px;
  font-size:18px;
}
</style>
</head>

<body>
<div class="app">

<button class="back" onclick="location.href='index.html'">← Zurück</button>

<h1>NACHRICHTEN</h1>

<div id="liste">Lade...</div>

</div>

<script>
const SUPABASE_URL = "https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY = "sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";

async function ladeNachrichten(){
  const box = document.getElementById("liste");

  const res = await fetch(
    SUPABASE_URL + "/rest/v1/Nachrichten?select=*&order=id.desc",
    {
      headers:{
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      }
    }
  );

  const data = await res.json();

  if(!data || data.length === 0){
    box.innerHTML = "<div class='leer'>Keine Nachrichten vorhanden.</div>";
    return;
  }

  box.innerHTML = "";

  data.forEach(n => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="titel">${n.Titel || "Nachricht"}</div>
      <div class="inhalt">${n.Inhalt || ""}</div>
      <div class="meta">Von: ${n.Erstellt_von || "-"}<br>${n.Erstellt_am || ""}</div>
    `;

    box.appendChild(div);
  });
}

ladeNachrichten();
</script>

</body>
</html>
