<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auftrag erstellen</title>

<style>
*{box-sizing:border-box}
body{margin:0;background:#000;color:#00ff22;font-family:Arial,sans-serif}
.app{max-width:700px;margin:auto;padding:20px}
.back{background:#222;color:white;border:1px solid #555;padding:14px 22px;border-radius:12px;margin-bottom:30px;font-size:18px}
h1{color:white;text-align:center;font-family:Georgia,serif;font-size:36px}
.card{background:#111;border:1px solid #008000;border-radius:14px;padding:20px;margin-bottom:18px;box-shadow:0 0 10px rgba(0,255,0,.18)}
.titel{color:#00ff22;font-size:24px;font-weight:bold;margin-bottom:10px}
label{display:block;color:#ffaa33;margin-top:14px;font-weight:bold}
input,textarea,select{width:100%;padding:14px;margin-top:8px;border-radius:10px;border:1px solid #008000;background:#000;color:white;font-size:18px}
textarea{min-height:140px;resize:vertical}
button{width:100%;margin-top:14px;padding:16px;border:none;border-radius:12px;font-size:19px;font-weight:bold}
.green{background:#008800;color:white}
.dark{background:#333;color:white}
.msg{color:#ffaa33;text-align:center;margin-top:14px;font-weight:bold;white-space:pre-line}
.leer{color:white;text-align:center;margin-top:40px;font-size:18px}
.info{color:white;line-height:1.5;font-size:17px}
</style>
</head>

<body>
<div class="app">

<button class="back" onclick="location.href='auftraege.html'">← Zurück</button>

<h1>AUFTRAG ERSTELLEN</h1>

<div id="inhalt" class="card"><div class="info">Lade...</div></div>

</div>

<script>
const SUPABASE_URL="https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY="sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";
const USER_ID=localStorage.getItem("user_id");
const USERNAME=localStorage.getItem("username")||"Unbekannt";

if(!USER_ID){location.href="login.html";}

let user=null,users=[],hoefe=[],organisationen=[],userOrgs=[];

function headers(){
  return {"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json"};
}

async function api(t){
  const r=await fetch(SUPABASE_URL+"/rest/v1/"+t+"?select=*",{headers:headers()});
  if(!r.ok)throw new Error(await r.text());
  return await r.json();
}

async function apiOptional(t){
  try{return await api(t);}catch(e){return [];}
}

async function post(t,d,ret=false){
  const r=await fetch(SUPABASE_URL+"/rest/v1/"+t,{
    method:"POST",
    headers:{...headers(),"Prefer":ret?"return=representation":"return=minimal"},
    body:JSON.stringify(d)
  });
  if(!r.ok)throw new Error(await r.text());
  return ret?await r.json():null;
}

function hofName(id){
  const h=hoefe.find(x=>String(x.id)===String(id));
  return h?h.Name:"";
}

function orgName(id){
  const o=organisationen.find(x=>String(x.id)===String(id));
  return o?o.Name:"";
}

function istAktiv(u){
  return u && u.Aktiviert!==false;
}

function chatIdVonUser(u){
  return u.Telegram_id || u.Telegram_chat_id || u.Chat_id || null;
}

function eindeutigeEmpfaenger(liste){
  const map=new Map();
  liste.forEach(u=>{
    const chatId=chatIdVonUser(u);
    if(!u || !u.id || !chatId)return;
    map.set(String(u.id),u);
  });
  return Array.from(map.values());
}

function empfaengerFinden(zielTyp,zielHofId,zielOrgId){
  let empfaenger=[];

  if(zielTyp==="Alle"){
    empfaenger=users.filter(u=>istAktiv(u)&&chatIdVonUser(u));
  }

  if(zielTyp==="Hof"){
    empfaenger=users.filter(u=>
      istAktiv(u)&&
      String(u.Hof_id)===String(zielHofId)&&
      chatIdVonUser(u)
    );
  }

  if(zielTyp==="Organisation"){
    const orgUserIds=userOrgs
      .filter(o=>String(o.Organisation_id)===String(zielOrgId)&&o.Aktiv!==false)
      .map(o=>String(o.User_id));

    empfaenger=users.filter(u=>
      istAktiv(u)&&
      orgUserIds.includes(String(u.id))&&
      chatIdVonUser(u)
    );
  }

  return eindeutigeEmpfaenger(empfaenger);
}

async function telegramQueueFuerEmpfaenger(titel,nachricht,typ,zielTyp,zielHofId,zielOrgId,auftragId){
  const empfaenger=empfaengerFinden(zielTyp,zielHofId,zielOrgId);

  for(const u of empfaenger){
    await post("Telegram_queue",{
      Titel:titel,
      Nachricht:nachricht,
      Typ:typ,
      User_id:Number(u.id),
      Hof_id:u.Hof_id?Number(u.Hof_id):null,
      Organisation_id:zielTyp==="Organisation"?Number(zielOrgId):null,
      Auftrag_id:auftragId||null,
      Chat_id:Number(chatIdVonUser(u)),
      Gesendet:false,
      Erstellt_am:new Date().toISOString(),
      Status:"Offen",
      Fehler:null
    });
  }

  return empfaenger.length;
}

async function laden(){
  const box=document.getElementById("inhalt");
  try{
    users=await api("Users");
    hoefe=await api("Hoefe");
    organisationen=await api("Organisationen");

    userOrgs=await apiOptional("User_organisationen");
    if(userOrgs.length===0){
      userOrgs=await apiOptional("User_Organisationen");
    }

    user=users.find(u=>String(u.id)===String(USER_ID));
    if(!user||user.Aktiviert===false){
      localStorage.clear();
      location.href="login.html";
      return;
    }

    anzeigen();
  }catch(e){
    box.innerHTML="<div class='leer'>Fehler:<br><br>"+e.message+"</div>";
  }
}

function anzeigen(){
  const box=document.getElementById("inhalt");

  let hofOpt='<option value="">Kein Hof / Alle</option>';
  hoefe.forEach(h=>hofOpt+=`<option value="${h.id}">${h.Name}</option>`);

  let orgOpt='<option value="">Keine Organisation / Alle</option>';
  organisationen.forEach(o=>orgOpt+=`<option value="${o.id}">${o.Name}</option>`);

  box.innerHTML=`
    <div class="titel">Neuer Auftrag / Einsatz</div>

    <label>Art</label>
    <select id="art">
      <option value="Auftrag">Auftrag</option>
      <option value="Einsatz">Einsatz</option>
    </select>

    <label>Titel</label>
    <input id="titel" placeholder="z. B. Transportauftrag, Einsatz, Erntehilfe">

    <label>Beschreibung</label>
    <textarea id="beschreibung" placeholder="Was soll gemacht werden?"></textarea>

    <label>Belohnung / Betrag</label>
    <input id="belohnung" type="number" value="0">

    <label>Sichtbarkeit / Ziel</label>
    <select id="zielTyp" onchange="zielAnzeige()">
      <option value="Alle">Alle</option>
      <option value="Hof">Bestimmter Hof</option>
      <option value="Organisation">Bestimmte Organisation</option>
    </select>

    <div id="hofBlock" style="display:none">
      <label>Hof</label>
      <select id="zielHof">${hofOpt}</select>
    </div>

    <div id="orgBlock" style="display:none">
      <label>Organisation</label>
      <select id="zielOrg">${orgOpt}</select>
    </div>

    <button class="green" onclick="auftragErstellen()">Erstellen</button>
    <button class="dark" onclick="location.href='auftraege.html'">Zurück zur Übersicht</button>
    <div id="meldung" class="msg"></div>
  `;
}

function zielAnzeige(){
  const z=document.getElementById("zielTyp").value;
  document.getElementById("hofBlock").style.display=z==="Hof"?"block":"none";
  document.getElementById("orgBlock").style.display=z==="Organisation"?"block":"none";
}

async function auftragErstellen(){
  const m=document.getElementById("meldung");
  m.innerText="";

  const art=document.getElementById("art").value;
  const titel=document.getElementById("titel").value.trim();
  const beschreibung=document.getElementById("beschreibung").value.trim();
  const belohnung=Number(document.getElementById("belohnung").value||0);
  const zielTyp=document.getElementById("zielTyp").value;
  const zielHofId=document.getElementById("zielHof").value;
  const zielOrgId=document.getElementById("zielOrg").value;

  if(!titel){m.innerText="Bitte Titel eingeben.";return;}
  if(!beschreibung){m.innerText="Bitte Beschreibung eingeben.";return;}
  if(zielTyp==="Hof"&&!zielHofId){m.innerText="Bitte Hof auswählen.";return;}
  if(zielTyp==="Organisation"&&!zielOrgId){m.innerText="Bitte Organisation auswählen.";return;}

  const zielHofName=zielTyp==="Hof"?hofName(zielHofId):"";
  const zielOrgName=zielTyp==="Organisation"?orgName(zielOrgId):"";

  try{
    m.innerText="Erstelle Auftrag...";

    const created=await post("Auftraege",{
      Erstellt_am:new Date().toISOString(),
      Vorlage_id:null,
      Titel:titel,
      Beschreibung:beschreibung,
      Typ:art,
      Status:"Offen",
      Erstellt_von:USERNAME,
      Angenommen_von:null,
      Belohnung:belohnung,
      Erledigt_am:null,
      Sichtbarkeit:zielTyp,
      Hof:zielHofName,
      Organisation:zielOrgName,
      Auftragstyp:art,
      Ziel_id:zielTyp==="Hof"?Number(zielHofId):zielTyp==="Organisation"?Number(zielOrgId):null
    },true);

    const auftrag=created&&created.length>0?created[0]:null;
    const auftragId=auftrag?auftrag.id:null;

    const titelBenachrichtigung=(art==="Einsatz"?"🚨 Neuer Einsatz":"📋 Neuer Auftrag")+": "+titel;

    const nachricht=
      (art==="Einsatz"?"🚨 Neuer Einsatz":"📋 Neuer Auftrag")+"\n\n"+
      "Titel: "+titel+"\n"+
      "Beschreibung: "+beschreibung+"\n"+
      "Erstellt von: "+USERNAME+"\n"+
      "Ziel: "+zielTyp+
      (zielHofName?" - "+zielHofName:"")+
      (zielOrgName?" - "+zielOrgName:"");

    await post("Benachrichtigungen",{
      Titel:titelBenachrichtigung,
      Nachricht:nachricht,
      Typ:art,
      User_id:null,
      Hof_id:zielTyp==="Hof"?Number(zielHofId):null,
      Organisation_id:zielTyp==="Organisation"?Number(zielOrgId):null,
      Auftrag_id:auftragId,
      Gelesen:false,
      Erledigt:false,
      Archiviert:false,
      Telegram_gesendet:false,
      Erstellt_am:new Date().toISOString()
    });

    const anzahlTelegram=await telegramQueueFuerEmpfaenger(
      titelBenachrichtigung,
      nachricht,
      art,
      zielTyp,
      zielHofId,
      zielOrgId,
      auftragId
    );

    m.innerText="Erstellt.\nTelegram-Empfänger: "+anzahlTelegram;

    setTimeout(()=>{
      location.href=auftragId?"auftrag.html?id="+auftragId:"auftraege.html";
    },900);

  }catch(e){
    m.innerText="Fehler:\n"+e.message;
  }
}

laden();
</script>
</body>
</html>
