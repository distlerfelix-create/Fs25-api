<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Feldverwaltung</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#000;color:#00ff22;font-family:Arial,sans-serif}.app{max-width:700px;margin:auto;padding:20px}.back,.filter{width:100%;padding:14px;border:0;border-radius:12px;color:white;font-size:18px;font-weight:bold}.back{width:auto;background:#222;border:1px solid #555;margin-bottom:25px}.filter{background:#004488;margin-bottom:16px}h1{color:white;text-align:center;font-family:Georgia,serif}.search{width:100%;padding:14px;border-radius:10px;border:1px solid #008000;background:#000;color:white;font-size:18px;margin-bottom:10px}.card{background:#111;border:1px solid #008000;border-radius:14px;padding:18px;margin-bottom:16px}.card.ernte{border:2px solid #00cc44}.card.warn{border:2px solid #ffaa00}.titel{font-size:28px;font-weight:bold}.info,.status{color:white;line-height:1.55;margin-top:10px}.orange{color:#ffaa33}.badge{display:inline-block;padding:5px 10px;border-radius:20px;color:white;font-size:13px;font-weight:bold;margin:5px 5px 0 0}.green{background:#008800}.yellow{background:#cc7700}.red{background:#aa0000}.leer{color:white;text-align:center;margin-top:35px}.aktionszeit{color:#ffaa33;font-size:13px;margin:2px 0 7px 24px;line-height:1.3}.status-zeile{margin-top:7px}
</style></head>
<body><div class="app">
<button class="back" onclick="location.href='index.html'">← Zurück</button>
<h1>FELDVERWALTUNG</h1>
<input id="suche" class="search" placeholder="Feld suchen..." oninput="anzeigen()">
<button id="filterBtn" class="filter" onclick="nurEigene=!nurEigene;filterText();anzeigen()">Anzeige: Nur eigene Felder</button>
<div id="liste">Lade...</div>
</div>
<script>
const SUPABASE_URL="https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY="sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";
const USER_ID=localStorage.getItem("user_id"),USER_HOF_ID=localStorage.getItem("hof_id");
if(!USER_ID)location.href="login.html";
let felder=[],fruchtarten=[],users=[],nurEigene=true,status={jahr:1,monat:"März",tag:1,zeit:""};

function headers(){return{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json"}}
async function api(t){const r=await fetch(SUPABASE_URL+"/rest/v1/"+t+"?select=*",{headers:headers()});if(!r.ok)throw new Error(await r.text());return r.json()}
async function patch(id,d){const r=await fetch(SUPABASE_URL+"/rest/v1/Felder?id=eq."+id,{method:"PATCH",headers:{...headers(),Prefer:"return=minimal"},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text())}
async function ladeStatus(){const r=await fetch(SUPABASE_URL+"/rest/v1/Serverstatus?id=eq.1&select=jahr,monat,tag,zeit",{headers:headers(),cache:"no-store"});if(r.ok){const d=await r.json();if(d[0])status=d[0]}}

function monatsNr(m){const x=String(m||"").toLowerCase();return{"januar":1,"februar":2,"märz":3,"maerz":3,"april":4,"mai":5,"juni":6,"juli":7,"august":8,"september":9,"oktober":10,"november":11,"dezember":12}[x]||1}
function zeitwert(j,m,t){return(Number(j||1)-1)*36+(monatsNr(m)-1)*3+(Number(t||1)-1)}
function normFrucht(n){return String(n||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim()}
function mehrjaehrig(n){return["ackergras","feldgras","fieldgrass","gras","klee","luzerne","wiese","pappel","pappeln"].includes(normFrucht(n))}
function winterpause(f){const m=monatsNr(status.monat);return mehrjaehrig(f.Fruchtart)&&(m===12||m===1)}
function frucht(f){return fruchtarten.find(x=>String(x.Name).toLowerCase()===String(f.Fruchtart||"").toLowerCase())}
function wachstumstage(f){
 if(!f.Gesaet_Serverjahr||!f.Gesaet_Servermonat||!f.Gesaet_Servertag)return null;
 const von=zeitwert(f.Gesaet_Serverjahr,f.Gesaet_Servermonat,f.Gesaet_Servertag),bis=zeitwert(status.jahr,status.monat,status.tag);
 if(bis<von)return 0;if(!mehrjaehrig(f.Fruchtart))return bis-von;
 let n=0;for(let i=von;i<bis;i++){const m=Math.floor((i%36)/3)+1;if(m!==12&&m!==1)n++}return n
}
function erntereif(f){const o=frucht(f),dauer=Number(o&&o.Wachstumsdauer_Tage||0),tage=wachstumstage(f);return f.Gesaet===true&&dauer>0&&tage!==null&&tage>=dauer}
function duengen(f){return f["Duengen_nötig"]===true||f.Duengen_noetig===true}
function text(v){return v===null||v===undefined||v===""?"-":v}
function yn(v){return v?"✅":"❌"}
function datumText(jahr,monat,tag,zeit){
 if(!jahr||!monat||!tag)return "";
 return `<div class="aktionszeit">📅 ${monat} · Jahr ${jahr} · Tag ${tag}${zeit?`<br>🕒 ${zeit} Uhr`:""}</div>`;
}

async function automatisieren(){
 for(const f of felder){
  const d={};let save=false;
  if(
    f.Gekalkt===true &&
    f.Gekalkt_Serverjahr &&
    f.Gekalkt_Servermonat &&
    f.Gekalkt_Servertag &&
    zeitwert(status.jahr,status.monat,status.tag) >=
      zeitwert(f.Gekalkt_Serverjahr,f.Gekalkt_Servermonat,f.Gekalkt_Servertag) + 36
  ){d.Gekalkt=false;save=true}
  const e=erntereif(f);if(f.Erntebereit!==e){d.Erntebereit=e;if(!e)d.Ernte_Benachrichtigt=false;save=true}
  if(save){await patch(f.id,d);Object.assign(f,d)}
 }
}
function filterText(){document.getElementById("filterBtn").innerText=nurEigene?"Anzeige: Nur eigene Felder":"Anzeige: Alle Felder"}
function anzeigen(){
 const box=document.getElementById("liste"),s=document.getElementById("suche").value.toLowerCase();
 const daten=felder.filter(f=>(!nurEigene||String(f.Hof_id)===String(USER_HOF_ID))&&[f.Feldnummer,f.Fruchtart,f.Besitzer].join(" ").toLowerCase().includes(s)).sort((a,b)=>Number(a.Feldnummer)-Number(b.Feldnummer));
 if(!daten.length){box.innerHTML="<div class='leer'>Keine Felder gefunden.</div>";return}
 box.innerHTML="";
 daten.forEach(f=>{
  const div=document.createElement("div");div.className="card"+(erntereif(f)?" ernte":"")+((duengen(f)||f.Steine_sammeln_noetig||f.Walzen_noetig)?" warn":"");div.onclick=()=>location.href="feld.html?id="+f.id;
  let badges="";if(winterpause(f))badges+='<span class="badge yellow">❄️ Winterpause</span>';else if(erntereif(f))badges+='<span class="badge green">🌾 Erntereif</span>';if(duengen(f))badges+='<span class="badge yellow">💩 Düngen nötig</span>';if(f.Steine_sammeln_noetig)badges+='<span class="badge yellow">🪨 Steine sammeln</span>';if(f.Walzen_noetig)badges+='<span class="badge yellow">🛞 Walzen nötig</span>';
  div.innerHTML=`<div class="titel">🌱 Feld ${text(f.Feldnummer)}</div>${badges}<div class="info"><span class="orange">Frucht:</span> ${text(f.Fruchtart)}<br><span class="orange">Besitzer:</span> ${text(f.Besitzer)}<br><span class="orange">Serverzeit:</span> Jahr ${status.jahr} · ${status.monat} · Tag ${status.tag}<br><span class="orange">Wachstumstage:</span> ${text(wachstumstage(f))}</div><div class="status">
 <div class="status-zeile">${f.Gekalkt?"✅ Gekalkt":"❌ Kalken notwendig"}</div>${f.Gekalkt?datumText(f.Gekalkt_Serverjahr,f.Gekalkt_Servermonat,f.Gekalkt_Servertag,f.Gekalkt_Serverzeit):""}
 <div class="status-zeile">${f.Gepfluegt?"✅ Gepflügt":"❌ Pflügen notwendig"}</div>${f.Gepfluegt?datumText(f.Gepfluegt_Serverjahr,f.Gepfluegt_Servermonat,f.Gepfluegt_Servertag,f.Gepfluegt_Serverzeit):""}
 <div class="status-zeile">${f.Steine_sammeln_noetig?"❌ Steine sammeln notwendig":"✅ Steine gesammelt"}</div>
 <div class="status-zeile">${f.Gesaet?"✅ Gesät":"❌ Säen notwendig"}</div>${f.Gesaet?datumText(f.Gesaet_Serverjahr,f.Gesaet_Servermonat,f.Gesaet_Servertag,f.Gesaet_Serverzeit):""}
 <div class="status-zeile">${f.Walzen_noetig?"❌ Walzen notwendig":f.Gewalzt?"✅ Gewalzt":"➖ Walzen nicht notwendig"}</div>${f.Gewalzt&&!f.Walzen_noetig?datumText(f.Gewalzt_Serverjahr,f.Gewalzt_Servermonat,f.Gewalzt_Servertag,f.Gewalzt_Serverzeit):""}
 <div class="status-zeile">${duengen(f)?"❌ Düngen notwendig":"✅ Düngung erledigt"}</div>
 </div>`;
  box.appendChild(div)
 })
}
async function laden(){const box=document.getElementById("liste");try{await ladeStatus();[felder,fruchtarten,users]=await Promise.all([api("Felder"),api("Fruchtarten"),api("Users")]);await automatisieren();filterText();anzeigen()}catch(e){box.innerHTML="<div class='leer'>Fehler:<br>"+e.message+"</div>"}}
laden();
</script></body></html>
