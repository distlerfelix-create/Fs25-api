<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feldverwaltung</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  overflow-x:hidden;
  background:#000;
  color:#00ff22;
  font-family:Arial,sans-serif;
}

.app{
  width:100%;
  max-width:700px;
  margin:auto;
  padding:20px;
}

.back{
  background:#222;
  color:white;
  border:1px solid #555;
  padding:14px 22px;
  border-radius:12px;
  margin-bottom:35px;
  font-size:18px;
}

h1{
  color:white;
  text-align:center;
  font-family:Georgia,serif;
  font-size:36px;
  margin:25px 0 25px;
}

.search{
  width:100%;
  padding:15px;
  border-radius:12px;
  border:1px solid #008000;
  background:#000;
  color:white;
  font-size:18px;
  margin-bottom:20px;
}

.card{
  background:#111;
  border:1px solid #008000;
  border-radius:14px;
  padding:20px;
  margin-bottom:16px;
  box-shadow:0 0 10px rgba(0,255,0,0.18);
}

.card:active{
  background:#003300;
}

.card.erntereif{
  border:2px solid #00cc44;
  box-shadow:0 0 18px rgba(0,255,80,0.55);
}

.card.duengen{
  border:2px solid #ffaa00;
  box-shadow:0 0 18px rgba(255,170,0,0.45);
}

.card.unkraut{
  border:2px solid #cc0000;
  box-shadow:0 0 18px rgba(255,0,0,0.45);
}

.feldnummer{
  color:#00ff22;
  font-size:30px;
  font-weight:bold;
}

.info{
  color:white;
  margin-top:10px;
  font-size:19px;
  line-height:1.5;
}

.orange{
  color:#ffaa33;
}

.status{
  margin-top:12px;
  color:white;
  font-size:17px;
  line-height:1.5;
}

.fruchtbox{
  background:#000;
  border:1px dashed #ffaa33;
  border-radius:12px;
  padding:12px;
  margin-top:12px;
  color:white;
  font-size:16px;
  line-height:1.45;
}

.warnung{
  margin-top:14px;
  font-size:20px;
  font-weight:bold;
}

.gruen{color:#00ff22;}
.gelb{color:#ffaa00;}
.rot{color:#ff3333;}

.leer{
  color:white;
  text-align:center;
  margin-top:40px;
  font-size:18px;
}
</style>
</head>

<body>
<div class="app">

<button class="back" onclick="location.href='index.html'">← Zurück</button>

<h1>FELDVERWALTUNG</h1>

<input
  id="suche"
  class="search"
  placeholder="Feld suchen: Nummer, Frucht, Besitzer..."
  oninput="zeigeFelder()"
>

<div id="liste">Lade...</div>

</div>

<script>
const SUPABASE_URL = "https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY = "sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";

let felder = [];
let hoefe = [];
let fruchtarten = [];

async function ladeFelder(){
  const box = document.getElementById("liste");

  const felderRes = await fetch(
    SUPABASE_URL + "/rest/v1/Felder?select=*&order=Feldnummer.asc",
    {
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY
      }
    }
  );

  const hoefeRes = await fetch(
    SUPABASE_URL + "/rest/v1/Hoefe?select=*",
    {
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY
      }
    }
  );

  const fruchtRes = await fetch(
    SUPABASE_URL + "/rest/v1/Fruchtarten?select=*",
    {
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY
      }
    }
  );

  if(!felderRes.ok || !hoefeRes.ok || !fruchtRes.ok){
    box.innerHTML = "<div class='leer'>Felder konnten nicht geladen werden.</div>";
    return;
  }

  felder = await felderRes.json();
  hoefe = await hoefeRes.json();
  fruchtarten = await fruchtRes.json();

  zeigeFelder();
}

function jaNein(wert){
  return wert === true ? "✅" : "❌";
}

function text(wert){
  return wert === null || wert === undefined || wert === "" ? "-" : wert;
}

function zahl(wert){
  const n = Number(String(wert || "0").replace(",","."));
  return Number.isFinite(n) ? n : 0;
}

function datumDeutsch(d){
  if(!d) return "-";

  const x = new Date(d);

  if(isNaN(x.getTime())){
    return "-";
  }

  return x.toLocaleDateString("de-DE");
}

function hofName(hofId){
  const hof = hoefe.find(h => String(h.id) === String(hofId));
  return hof ? hof.Name : "-";
}

function fruchtObj(name){
  return fruchtarten.find(f =>
    String(f.Name).toLowerCase() === String(name || "").toLowerCase()
  );
}

function ernteDatum(gesaetAm, fruchtName){
  const frucht = fruchtObj(fruchtName);

  if(!gesaetAm || !frucht || !frucht.Wachstumsdauer_Tage){
    return "-";
  }

  const d = new Date(gesaetAm);

  if(isNaN(d.getTime())){
    return "-";
  }

  d.setDate(d.getDate() + Number(frucht.Wachstumsdauer_Tage || 0));

  return datumDeutsch(d);
}

function erwarteterErtrag(groesse, fruchtName){
  const frucht = fruchtObj(fruchtName);

  if(!frucht){
    return "-";
  }

  const ha = zahl(groesse);
  const ertrag = Number(frucht.Ertrag_pro_Hektar || 0);

  if(!ha || !ertrag){
    return "-";
  }

  return Math.round(ha * ertrag).toLocaleString("de-DE");
}

function erwarteterWert(groesse, fruchtName){
  const frucht = fruchtObj(fruchtName);

  if(!frucht){
    return "-";
  }

  const ha = zahl(groesse);
  const ertrag = Number(frucht.Ertrag_pro_Hektar || 0);
  const preis = Number(frucht.Verkaufspreis || 0);

  if(!ha || !ertrag || !preis){
    return "-";
  }

  return Math.round(ha * ertrag * preis).toLocaleString("de-DE");
}

function fruchtInfo(f){
  const frucht = fruchtObj(f.Fruchtart);

  if(!frucht){
    return `
      <div class="fruchtbox">
        <span class="orange">Fruchtinfo:</span><br>
        Keine Detaildaten zur Fruchtart vorhanden.
      </div>
    `;
  }

  return `
    <div class="fruchtbox">
      <span class="orange">Fruchtinfo:</span><br>
      Anpflanzzeit: ${text(frucht.Anpflanzzeit)}<br>
      Erntezeit: ${text(frucht.Erntezeit)}<br>
      Wachstumsdauer: ${text(frucht.Wachstumsdauer_Tage)} Tage<br>
      Ertrag pro Hektar: ${text(frucht.Ertrag_pro_Hektar)}<br>
      Verkaufspreis: ${text(frucht.Verkaufspreis)}<br>
      Erwarteter Ertrag: ${erwarteterErtrag(f.Feldgroesse, f.Fruchtart)}<br>
      Erwarteter Wert: ${erwarteterWert(f.Feldgroesse, f.Fruchtart)}<br>
      Ernte ab ca.: ${erneDatumSicher(f)}
    </div>
  `;
}

function erneDatumSicher(f){
  return ernteDatum(f.Gesaet_am, f.Fruchtart);
}

function duengenNoetig(f){
  return f["Duengen_nötig"] === true || f.Duengen_noetig === true;
}

function statusKlasse(f){
  if(f.Erntebereit === true) return "erntereif";
  if(f.Unkraut === true) return "unkraut";
  if(duengenNoetig(f)) return "duengen";
  return "";
}

function warnungen(f){
  let html = "";

  if(f.Erntebereit === true){
    html += `<div class="warnung gruen">🌾 Erntereif</div>`;
  }

  if(duengenNoetig(f)){
    html += `<div class="warnung gelb">💩 Düngen nötig</div>`;
  }

  if(f.Unkraut === true){
    html += `<div class="warnung rot">🌿 Unkraut vorhanden</div>`;
  }

  return html;
}

function zeigeFelder(){
  const box = document.getElementById("liste");
  const suchtext = document.getElementById("suche").value.toLowerCase().trim();

  let gefiltert = felder.filter(f => {
    const besitzerName =
      f.Besitzer && f.Besitzer !== ""
        ? f.Besitzer
        : hofName(f.Hof_id);

    const sammeltext = [
      f.Feldnummer,
      f.Fruchtart,
      besitzerName,
      f.Feldgroesse,
      f.Letzte_Aktion
    ].join(" ").toLowerCase();

    return sammeltext.includes(suchtext);
  });

  if(gefiltert.length === 0){
    box.innerHTML = "<div class='leer'>Keine Felder gefunden.</div>";
    return;
  }

  box.innerHTML = "";

  gefiltert.forEach(f => {
    const besitzerName =
      f.Besitzer && f.Besitzer !== ""
        ? f.Besitzer
        : hofName(f.Hof_id);

    const div = document.createElement("div");
    div.className = "card " + statusKlasse(f);

    div.onclick = function(){
      location.href = "feld.html?id=" + f.id;
    };

    div.innerHTML = `
      <div class="feldnummer">🌱 Feld ${text(f.Feldnummer)}</div>

      ${warnungen(f)}

      <div class="info">
        <span class="orange">Frucht:</span> ${text(f.Fruchtart)}<br>
        <span class="orange">Größe:</span> ${text(f.Feldgroesse)} ha<br>
        <span class="orange">Besitzer:</span> ${text(besitzerName)}<br>
        <span class="orange">Wachstum:</span> ${text(f.Wachstumsstufe)}<br>
        <span class="orange">Gesät am:</span> ${datumDeutsch(f.Gesaet_am)}<br>
        <span class="orange">Ernte ab ca.:</span> ${erneDatumSicher(f)}
      </div>

      ${fruchtInfo(f)}

      <div class="status">
        Gekalkt: ${jaNein(f.Gekalkt)} |
        Gedüngt: ${jaNein(f.Geduengt_1x)} / ${jaNein(f.Geduengt_2x)}<br>
        Gesät: ${jaNein(f.Gesaet)} |
        Unkraut: ${jaNein(f.Unkraut)}<br>
        Letzte Aktion: ${text(f.Letzte_Aktion)}
      </div>
    `;

    box.appendChild(div);
  });
}

ladeFelder();
</script>

</body>
</html>
