<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feldverwaltung</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  overflow-x:hidden;
  background:#000;
  color:#00ff22;
  font-family:Arial,sans-serif;
}

.app{
  width:100%;
  max-width:700px;
  margin:auto;
  padding:20px;
}

.back{
  background:#222;
  color:white;
  border:1px solid #555;
  padding:14px 22px;
  border-radius:12px;
  margin-bottom:35px;
  font-size:18px;
}

h1{
  color:white;
  text-align:center;
  font-family:Georgia,serif;
  font-size:36px;
  margin:25px 0 25px;
}

.search{
  width:100%;
  padding:15px;
  border-radius:12px;
  border:1px solid #008000;
  background:#000;
  color:white;
  font-size:18px;
  margin-bottom:20px;
}

.card{
  background:#111;
  border:1px solid #008000;
  border-radius:14px;
  padding:20px;
  margin-bottom:16px;
  box-shadow:0 0 10px rgba(0,255,0,0.18);
}

.card:active{
  background:#003300;
}

.feldnummer{
  color:#00ff22;
  font-size:30px;
  font-weight:bold;
}

.info{
  color:white;
  margin-top:10px;
  font-size:19px;
  line-height:1.5;
}

.orange{
  color:#ffaa33;
}

.status{
  margin-top:12px;
  color:white;
  font-size:17px;
  line-height:1.5;
}

.leer{
  color:white;
  text-align:center;
  margin-top:40px;
  font-size:18px;
}
</style>
</head>

<body>
<div class="app">

<button class="back" onclick="location.href='index.html'">← Zurück</button>

<h1>FELDVERWALTUNG</h1>

<input
  id="suche"
  class="search"
  placeholder="Feld suchen: Nummer, Frucht, Besitzer..."
  oninput="zeigeFelder()"
>

<div id="liste">Lade...</div>

</div>

<script>
const SUPABASE_URL = "https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY = "sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";

let felder = [];

async function ladeFelder(){
  const box = document.getElementById("liste");

  const res = await fetch(
    SUPABASE_URL + "/rest/v1/Felder?select=*&order=Feldnummer.asc",
    {
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY
      }
    }
  );

  if(!res.ok){
    box.innerHTML = "<div class='leer'>Felder konnten nicht geladen werden.</div>";
    return;
  }

  felder = await res.json();
  zeigeFelder();
}

function jaNein(wert){
  return wert === true ? "✅" : "❌";
}

function text(wert){
  return wert === null || wert === undefined || wert === "" ? "-" : wert;
}

function zeigeFelder(){
  const box = document.getElementById("liste");
  const suchtext = document.getElementById("suche").value.toLowerCase().trim();

  let gefiltert = felder.filter(f => {
    const sammeltext = [
      f.Feldnummer,
      f.Fruchtart,
      f.Besitzer,
      f.Feldgroesse,
      f.Letzte_Aktion
    ].join(" ").toLowerCase();

    return sammeltext.includes(suchtext);
  });

  if(gefiltert.length === 0){
    box.innerHTML = "<div class='leer'>Keine Felder gefunden.</div>";
    return;
  }

  box.innerHTML = "";

  gefiltert.forEach(f => {
    const div = document.createElement("div");
    div.className = "card";

    div.onclick = function(){
      location.href = "feld.html?id=" + f.id;
    };

    div.innerHTML = `
      <div class="feldnummer">🌱 Feld ${text(f.Feldnummer)}</div>

      <div class="info">
        <span class="orange">Frucht:</span> ${text(f.Fruchtart)}<br>
        <span class="orange">Größe:</span> ${text(f.Feldgroesse)}<br>
        <span class="orange">Besitzer:</span> ${text(f.Besitzer)}<br>
        <span class="orange">Wachstum:</span> ${text(f.Wachstumsstufe)}
      </div>

      <div class="status">
        Gekalkt: ${jaNein(f.Gekalkt)} |
        Gedüngt: ${jaNein(f.Geduengt_1x)} / ${jaNein(f.Geduengt_2x)}<br>
        Gesät: ${jaNein(f.Gesaet)} |
        Unkraut: ${jaNein(f.Unkraut)}<br>
        Letzte Aktion: ${text(f.Letzte_Aktion)}
      </div>
    `;

    box.appendChild(div);
  });
}

ladeFelder();
</script>

</body>
</html>
