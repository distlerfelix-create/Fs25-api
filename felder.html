<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feldverwaltung</title>
<style>
*{box-sizing:border-box}body{margin:0;overflow-x:hidden;background:#000;color:#00ff22;font-family:Arial,sans-serif}.app{width:100%;max-width:700px;margin:auto;padding:20px}.back{background:#222;color:white;border:1px solid #555;padding:14px 22px;border-radius:12px;margin-bottom:35px;font-size:18px}h1{color:white;text-align:center;font-family:Georgia,serif;font-size:36px;margin:25px 0}.search{width:100%;padding:15px;border-radius:12px;border:1px solid #008000;background:#000;color:white;font-size:18px;margin-bottom:12px}.filter-btn{width:100%;padding:14px;border:none;border-radius:12px;background:#004488;color:white;font-size:18px;font-weight:bold;margin-bottom:18px}.card{background:#111;border:1px solid #008000;border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 0 10px rgba(0,255,0,.18)}.card:active{background:#003300}.card.gruppe{border:2px solid #00aa22;box-shadow:0 0 18px rgba(0,255,0,.32)}.card.erntereif{border:2px solid #00cc44;box-shadow:0 0 18px rgba(0,255,80,.55)}.card.duengen{border:2px solid #ffaa00;box-shadow:0 0 18px rgba(255,170,0,.45)}.card.unkraut{border:2px solid #cc0000;box-shadow:0 0 18px rgba(255,0,0,.45)}.feldnummer{color:#00ff22;font-size:30px;font-weight:bold}.info{color:white;margin-top:10px;font-size:19px;line-height:1.5}.orange{color:#ffaa33}.status{margin-top:12px;color:white;font-size:17px;line-height:1.5}.fruchtbox{background:#000;border:1px dashed #ffaa33;border-radius:12px;padding:12px;margin-top:12px;color:white;font-size:16px;line-height:1.45}.gruppenbox{background:#000;border:1px solid #00aa22;border-radius:12px;padding:12px;margin-top:12px;color:white;font-size:16px;line-height:1.45}.warnung{margin-top:14px;font-size:20px;font-weight:bold}.gruen{color:#00ff22}.gelb{color:#ffaa00}.rot{color:#ff3333}.leer{color:white;text-align:center;margin-top:40px;font-size:18px}
</style>
</head>
<body>
<div class="app">
<button class="back" onclick="location.href='index.html'">← Zurück</button>
<h1>FELDVERWALTUNG</h1>
<input id="suche" class="search" placeholder="Feld suchen: Nummer, Frucht, Besitzer, Gruppe..." oninput="zeigeFelder()">
<button id="filterBtn" class="filter-btn" onclick="filterUmschalten()">Anzeige: Nur eigene Felder</button>
<div id="liste">Lade...</div>
</div>

<script>
const SUPABASE_URL="https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY="sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";
const USER_ID=localStorage.getItem("user_id");
const USER_HOF_ID=localStorage.getItem("hof_id");
if(!USER_ID){location.href="login.html";}

let felder=[],hoefe=[],fruchtarten=[],feldgruppen=[],users=[],aktuellerUser=null,nurEigene=true;

function headers(){return{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json"}}
async function api(t){const r=await fetch(SUPABASE_URL+"/rest/v1/"+t+"?select=*",{headers:headers()});if(!r.ok)throw new Error(await r.text());return await r.json()}
async function apiOptional(t){try{return await api(t)}catch(e){return[]}}

async function ladeFelder(){
 const box=document.getElementById("liste");
 try{
  felder=await api("Felder");
  hoefe=await api("Hoefe");
  fruchtarten=await api("Fruchtarten");
  feldgruppen=await apiOptional("Feldgruppen");
  users=await apiOptional("Users");
  aktuellerUser=users.find(u=>String(u.id)===String(USER_ID))||null;
  felder.sort((a,b)=>Number(a.Feldnummer||0)-Number(b.Feldnummer||0));
  filterButtonAktualisieren();
  zeigeFelder();
 }catch(err){
  box.innerHTML="<div class='leer'>Felder konnten nicht geladen werden.<br><br>"+err.message+"</div>";
 }
}

function filterUmschalten(){nurEigene=!nurEigene;filterButtonAktualisieren();zeigeFelder()}
function filterButtonAktualisieren(){const b=document.getElementById("filterBtn");b.innerText=nurEigene?"Anzeige: Nur eigene Felder":"Anzeige: Alle Felder";b.style.background=nurEigene?"#004488":"#008800"}
function jaNein(w){return w===true?"✅":"❌"}
function text(w){return w===null||w===undefined||w===""?"-":w}
function zahl(w){const n=Number(String(w||"0").replace(",","."));return Number.isFinite(n)?n:0}
function datumDeutsch(d){if(!d)return"-";const x=new Date(d);if(isNaN(x.getTime()))return"-";return x.toLocaleDateString("de-DE")}
function hofName(id){const h=hoefe.find(x=>String(x.id)===String(id));return h?h.Name:"-"}
function feldgruppeName(id){const g=feldgruppen.find(x=>String(x.id)===String(id));return g?g.Name:"Feldgruppe "+id}
function gruppenFelder(id){return felder.filter(f=>String(f.Feldgruppe_id)===String(id)).sort((a,b)=>Number(a.Feldnummer||0)-Number(b.Feldnummer||0))}
function gruppenNummern(id){return gruppenFelder(id).map(f=>f.Feldnummer).join(", ")}
function gruppenGroesse(id){const s=gruppenFelder(id).reduce((sum,f)=>sum+zahl(f.Feldgroesse),0);return s>0?s.toLocaleString("de-DE"):"-"}
function fruchtObj(name){return fruchtarten.find(f=>String(f.Name).toLowerCase()===String(name||"").toLowerCase())}
function ernteDatum(gesaetAm,fruchtName){const fr=fruchtObj(fruchtName);if(!gesaetAm||!fr||!fr.Wachstumsdauer_Tage)return"-";const d=new Date(gesaetAm);if(isNaN(d.getTime()))return"-";d.setDate(d.getDate()+Number(fr.Wachstumsdauer_Tage||0));return datumDeutsch(d)}
function erwarteterErtrag(groesse,fruchtName){const fr=fruchtObj(fruchtName);if(!fr)return"-";const ha=zahl(groesse),ertrag=Number(fr.Ertrag_pro_Hektar||0);if(!ha||!ertrag)return"-";return Math.round(ha*ertrag).toLocaleString("de-DE")}
function erwarteterWert(groesse,fruchtName){const fr=fruchtObj(fruchtName);if(!fr)return"-";const ha=zahl(groesse),ertrag=Number(fr.Ertrag_pro_Hektar||0),preis=Number(fr.Verkaufspreis||0);if(!ha||!ertrag||!preis)return"-";return Math.round(ha*ertrag*preis).toLocaleString("de-DE")}

function fruchtInfo(f,groesseOverride){
 const fr=fruchtObj(f.Fruchtart);
 if(!fr)return `<div class="fruchtbox"><span class="orange">Fruchtinfo:</span><br>Keine Detaildaten zur Fruchtart vorhanden.</div>`;
 const groesse=groesseOverride||f.Feldgroesse;
 return `<div class="fruchtbox">
 <span class="orange">Fruchtinfo:</span><br>
 Anpflanzzeit: ${text(fr.Anpflanzzeit)}<br>
 Erntezeit: ${text(fr.Erntezeit)}<br>
 Wachstumsdauer: ${text(fr.Wachstumsdauer_Tage)} Tage<br>
 Ertrag pro Hektar: ${text(fr.Ertrag_pro_Hektar)}<br>
 Verkaufspreis: ${text(fr.Verkaufspreis)}<br>
 Erwarteter Ertrag: ${erwarteterErtrag(groesse,f.Fruchtart)}<br>
 Erwarteter Wert: ${erwarteterWert(groesse,f.Fruchtart)}<br>
 Ernte ab ca.: ${ernteDatum(f.Gesaet_am,f.Fruchtart)}
 </div>`;
}
function duengenNoetig(f){return f["Duengen_nötig"]===true||f.Duengen_noetig===true}
function statusKlasse(f){if(f.Erntebereit===true)return"erntereif";if(f.Unkraut===true)return"unkraut";if(duengenNoetig(f))return"duengen";return""}
function warnungen(f){let h="";if(f.Erntebereit===true)h+=`<div class="warnung gruen">🌾 Erntereif</div>`;if(duengenNoetig(f))h+=`<div class="warnung gelb">💩 Düngen nötig</div>`;if(f.Unkraut===true)h+=`<div class="warnung rot">🌿 Unkraut vorhanden</div>`;return h}
function sichtbaresFeld(f){if(!f.Feldgruppe_id)return true;return f.Hauptfeld===true}
function feldGehortMir(f){if(!nurEigene)return true;const hofId=aktuellerUser&&aktuellerUser.Hof_id?aktuellerUser.Hof_id:USER_HOF_ID;if(!hofId)return true;return String(f.Hof_id)===String(hofId)}
function suchTextFeld(f){const besitzer=f.Besitzer&&f.Besitzer!==""?f.Besitzer:hofName(f.Hof_id);let g="";if(f.Feldgruppe_id)g=feldgruppeName(f.Feldgruppe_id)+" "+gruppenNummern(f.Feldgruppe_id);return [f.Feldnummer,f.Fruchtart,besitzer,f.Feldgroesse,f.Letzte_Aktion,g].join(" ").toLowerCase()}

function zeigeFelder(){
 const box=document.getElementById("liste");
 const s=document.getElementById("suche").value.toLowerCase().trim();
 let gefiltert=felder.filter(f=>sichtbaresFeld(f)&&feldGehortMir(f)&&suchTextFeld(f).includes(s));
 if(gefiltert.length===0){box.innerHTML="<div class='leer'>Keine Felder gefunden.</div>";return}
 box.innerHTML="";
 gefiltert.forEach(f=>{
  const besitzer=f.Besitzer&&f.Besitzer!==""?f.Besitzer:hofName(f.Hof_id);
  const istGruppe=!!f.Feldgruppe_id;
  const gruppeName=istGruppe?feldgruppeName(f.Feldgruppe_id):"";
  const nummern=istGruppe?gruppenNummern(f.Feldgruppe_id):"";
  const groesse=istGruppe?gruppenGroesse(f.Feldgruppe_id):f.Feldgroesse;
  const count=istGruppe?gruppenFelder(f.Feldgruppe_id).length:1;
  const div=document.createElement("div");
  div.className="card "+statusKlasse(f)+(istGruppe?" gruppe":"");
  div.onclick=()=>{location.href="feld.html?id="+f.id};
  div.innerHTML=`
   <div class="feldnummer">${istGruppe?"🌱 "+text(gruppeName):"🌱 Feld "+text(f.Feldnummer)}</div>
   ${istGruppe?`<div class="gruppenbox"><span class="orange">Feldgruppe:</span><br>Hauptfeld: ${text(f.Feldnummer)}<br>Zugehörige Felder: ${text(nummern)}<br>Anzahl Felder: ${count}</div>`:""}
   ${warnungen(f)}
   <div class="info">
    <span class="orange">Frucht:</span> ${text(f.Fruchtart)}<br>
    <span class="orange">Größe:</span> ${text(groesse)} ha<br>
    <span class="orange">Besitzer:</span> ${text(besitzer)}<br>
    <span class="orange">Wachstum:</span> ${text(f.Wachstumsstufe)}<br>
    <span class="orange">Gesät am:</span> ${datumDeutsch(f.Gesaet_am)}<br>
    <span class="orange">Ernte ab ca.:</span> ${ernteDatum(f.Gesaet_am,f.Fruchtart)}
   </div>
   ${fruchtInfo(f,groesse)}
   <div class="status">
    Gekalkt: ${jaNein(f.Gekalkt)} |
    Gedüngt: ${jaNein(f.Geduengt_1x)} / ${jaNein(f.Geduengt_2x)}<br>
    Gesät: ${jaNein(f.Gesaet)} |
    Unkraut: ${jaNein(f.Unkraut)}<br>
    Letzte Aktion: ${text(f.Letzte_Aktion)}
   </div>`;
  box.appendChild(div);
 });
}

ladeFelder();
</script>
</body>
</html>
