<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<style>
*{box-sizing:border-box;}
body{margin:0;background:#000;color:#00ff22;font-family:Arial,sans-serif;}
.app{max-width:700px;margin:auto;padding:20px;}
.back{background:#222;color:white;border:1px solid #555;padding:14px 22px;border-radius:12px;margin-bottom:30px;font-size:18px;}
h1{color:white;text-align:center;font-family:Georgia,serif;font-size:38px;}
.card{background:#111;border:1px solid #008000;border-radius:14px;padding:20px;margin-bottom:18px;box-shadow:0 0 10px rgba(0,255,0,0.18);}
.titel{color:#00ff22;font-size:24px;font-weight:bold;}
.info{color:white;margin-top:10px;font-size:18px;line-height:1.5;}
.orange{color:#ffaa33;}
select,input{width:100%;padding:14px;margin-top:12px;border-radius:10px;border:1px solid #008000;background:#000;color:white;font-size:17px;}
button{width:100%;margin-top:12px;padding:15px;border:none;border-radius:12px;font-size:18px;font-weight:bold;}
.green{background:#008800;color:white;}
.red{background:#aa0000;color:white;}
.dark{background:#333;color:white;}
.msg{color:#ffaa33;text-align:center;margin-top:12px;font-weight:bold;white-space:pre-line;}
.leer{color:white;text-align:center;margin-top:40px;font-size:18px;}
</style>
</head>

<body>
<div class="app">

<button class="back" onclick="location.href='index.html'">← Zurück</button>

<h1>ADMIN</h1>

<div id="inhalt">Lade...</div>

</div>

<script>
const SUPABASE_URL = "https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY = "sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";

const USER_ID = localStorage.getItem("user_id");
const USERNAME = localStorage.getItem("username") || "Admin";

if(!USER_ID){
  location.href = "login.html";
}

let users = [];
let hoefe = [];
let registrierungen = [];
let aktuellerUser = null;

async function api(tabelle){
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/" + tabelle + "?select=*",
    {
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY
      }
    }
  );

  if(!res.ok){
    throw new Error(await res.text());
  }

  return await res.json();
}

async function post(tabelle,daten){
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/" + tabelle,
    {
      method:"POST",
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY,
        "Content-Type":"application/json",
        "Prefer":"return=minimal"
      },
      body:JSON.stringify(daten)
    }
  );

  if(!res.ok){
    throw new Error(await res.text());
  }
}

async function patch(tabelle,id,daten){
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/" + tabelle + "?id=eq." + id,
    {
      method:"PATCH",
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY,
        "Content-Type":"application/json",
        "Prefer":"return=minimal"
      },
      body:JSON.stringify(daten)
    }
  );

  if(!res.ok){
    throw new Error(await res.text());
  }
}

function text(wert){
  return wert === null || wert === undefined || wert === "" ? "-" : wert;
}

function hofSelectHtml(id, ausgewaehlt){
  let html = `<select id="hof_${id}">`;
  html += `<option value="">Hof auswählen</option>`;

  hoefe.forEach(h => {
    html += `<option value="${h.id}" ${String(h.id) === String(ausgewaehlt) ? "selected" : ""}>${h.Name}</option>`;
  });

  html += `</select>`;
  return html;
}

async function laden(){
  const box = document.getElementById("inhalt");

  try{
    users = await api("Users");
    hoefe = await api("Hoefe");
    registrierungen = await api("Registrierungen");

    aktuellerUser = users.find(u => String(u.id) === String(USER_ID));

    if(!aktuellerUser || aktuellerUser.Admin !== true){
      box.innerHTML = "<div class='leer'>Kein Admin-Zugriff.</div>";
      return;
    }

    anzeigen();

  }catch(err){
    box.innerHTML = "<div class='leer'>Fehler:<br><br>" + err.message + "</div>";
  }
}

function anzeigen(){
  const box = document.getElementById("inhalt");

  const offen = registrierungen.filter(r => r.Status === "Offen");

  let html = "";

  html += `
    <div class="card">
      <div class="titel">Registrierungen</div>
      <div class="info">
        Offene Anträge: <span class="orange">${offen.length}</span>
      </div>
    </div>
  `;

  if(offen.length === 0){
    html += `<div class="card"><div class="info">Keine offenen Registrierungen.</div></div>`;
  }

  offen.forEach(r => {
    html += `
      <div class="card">
        <div class="titel">${text(r.Spielername)}</div>

        <div class="info">
          <span class="orange">PSN:</span> ${text(r.Username)}<br>
          <span class="orange">Telegram:</span> ${text(r.Telegram)}<br>
          <span class="orange">Status:</span> ${text(r.Status)}
        </div>

        ${hofSelectHtml("reg_" + r.id, r.Hof_id)}

        <button class="green" onclick="genehmigen(${r.id})">Genehmigen</button>
        <button class="red" onclick="ablehnen(${r.id})">Ablehnen</button>

        <div id="msg_reg_${r.id}" class="msg"></div>
      </div>
    `;
  });

  html += `
    <div class="card">
      <div class="titel">Benutzerverwaltung</div>
      <div class="info">Benutzer gesamt: ${users.length}</div>
    </div>
  `;

  users.forEach(u => {
    html += `
      <div class="card">
        <div class="titel">${text(u.Vorname)}</div>

        <div class="info">
          <span class="orange">PSN:</span> ${text(u["PSN-Username"])}<br>
          <span class="orange">Hof:</span> ${text(u.Hof)}<br>
          <span class="orange">Telegram:</span> ${text(u.Telegram_id)}<br>
          <span class="orange">Admin:</span> ${u.Admin === true ? "Ja" : "Nein"}<br>
          <span class="orange">Aktiviert:</span> ${u.Aktiviert === true ? "Ja" : "Nein"}
        </div>

        <input id="pass_${u.id}" placeholder="Neues Passwort">
        <input id="telegram_${u.id}" value="${u.Telegram_id || ""}" placeholder="Telegram-ID">

        ${hofSelectHtml("user_" + u.id, u.Hof_id)}

        <button class="green" onclick="benutzerSpeichern(${u.id})">Benutzer speichern</button>
        <button class="dark" onclick="adminUmschalten(${u.id})">${u.Admin === true ? "Admin entfernen" : "Admin setzen"}</button>
        <button class="red" onclick="aktivUmschalten(${u.id})">${u.Aktiviert === true ? "Benutzer deaktivieren" : "Benutzer aktivieren"}</button>

        <div id="msg_user_${u.id}" class="msg"></div>
      </div>
    `;
  });

  box.innerHTML = html;
}

async function genehmigen(regId){
  const meldung = document.getElementById("msg_reg_" + regId);
  const hofId = document.getElementById("hof_reg_" + regId).value;

  meldung.innerText = "";

  if(!hofId){
    meldung.innerText = "Bitte zuerst einen Hof auswählen.";
    return;
  }

  const reg = registrierungen.find(r => String(r.id) === String(regId));
  const hof = hoefe.find(h => String(h.id) === String(hofId));

  if(!reg){
    meldung.innerText = "Registrierung nicht gefunden.";
    return;
  }

  const existiert = users.find(u =>
    String(u["PSN-Username"]).toLowerCase() === String(reg.Username).toLowerCase()
  );

  if(existiert){
    meldung.innerText = "Dieser Benutzer existiert bereits.";
    return;
  }

  try{
    meldung.innerText = "Benutzer wird erstellt...";

    await post("Users", {
      "PSN-Username":reg.Username,
      Vorname:reg.Spielername,
      Passwort:reg.Passwort,
      Telegram_id:reg.Telegram || "",
      Hof_id:Number(hofId),
      Hof:hof ? hof.Name : "",
      Admin:false,
      Aktiviert:true
    });

    await patch("Registrierungen", regId, {
      Status:"Genehmigt",
      Bearbeitet_von:USERNAME,
      Hof_id:Number(hofId)
    });

    meldung.innerText = "Registrierung genehmigt.";
    await laden();

  }catch(err){
    meldung.innerText = "Fehler:\n" + err.message;
  }
}

async function ablehnen(regId){
  if(!confirm("Registrierung wirklich ablehnen?")){
    return;
  }

  const meldung = document.getElementById("msg_reg_" + regId);

  try{
    await patch("Registrierungen", regId, {
      Status:"Abgelehnt",
      Bearbeitet_von:USERNAME
    });

    meldung.innerText = "Registrierung abgelehnt.";
    await laden();

  }catch(err){
    meldung.innerText = "Fehler:\n" + err.message;
  }
}

async function benutzerSpeichern(userId){
  const meldung = document.getElementById("msg_user_" + userId);
  const passwort = document.getElementById("pass_" + userId).value.trim();
  const telegram = document.getElementById("telegram_" + userId).value.trim();
  const hofId = document.getElementById("hof_user_" + userId).value;

  meldung.innerText = "Speichere...";

  const hof = hoefe.find(h => String(h.id) === String(hofId));

  let daten = {
    Telegram_id:telegram,
    Hof_id:hofId ? Number(hofId) : null,
    Hof:hof ? hof.Name : ""
  };

  if(passwort){
    daten.Passwort = passwort;
  }

  try{
    await patch("Users", userId, daten);
    meldung.innerText = "Benutzer gespeichert.";
    await laden();

  }catch(err){
    meldung.innerText = "Fehler:\n" + err.message;
  }
}

async function adminUmschalten(userId){
  const u = users.find(x => String(x.id) === String(userId));

  if(!u){
    return;
  }

  if(String(userId) === String(USER_ID)){
    alert("Du kannst deinen eigenen Adminstatus nicht ändern.");
    return;
  }

  await patch("Users", userId, {
    Admin: !(u.Admin === true)
  });

  await laden();
}

async function aktivUmschalten(userId){
  const u = users.find(x => String(x.id) === String(userId));

  if(!u){
    return;
  }

  if(String(userId) === String(USER_ID)){
    alert("Du kannst dich nicht selbst deaktivieren.");
    return;
  }

  await patch("Users", userId, {
    Aktiviert: !(u.Aktiviert === true)
  });

  await laden();
}

laden();
</script>

</body>
</html>
