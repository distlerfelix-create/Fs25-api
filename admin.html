<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<style>
*{box-sizing:border-box;}
body{margin:0;background:#000;color:#00ff22;font-family:Arial,sans-serif;text-align:center;}
.app{max-width:700px;margin:auto;padding:20px;}
.back{background:#222;color:white;border:1px solid #555;padding:14px 22px;border-radius:12px;margin-bottom:30px;font-size:18px;}
h1{color:white;font-family:Georgia,serif;font-size:42px;}
.card{background:#111;border:1px solid #008000;border-radius:14px;padding:20px;margin-bottom:18px;box-shadow:0 0 10px rgba(0,255,0,0.18);}
button{width:100%;margin:7px 0;padding:17px;border:none;border-radius:14px;background:#008800;color:white;font-size:20px;font-weight:bold;}
button:active{background:#00aa00;}
.red{background:#aa0000;}
.dark{background:#333;}
.info{color:white;font-size:18px;line-height:1.5;}
.leer{color:white;margin-top:40px;font-size:18px;}
</style>
</head>
<body>
<div class="app">
<button class="back" onclick="location.href='index.html'">← Zurück</button>
<h1>ADMIN</h1>
<div id="inhalt">Prüfe Adminrechte...</div>
</div>
<script>
const SUPABASE_URL = "https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY = "sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";
const USER_ID = localStorage.getItem("user_id");
if(!USER_ID){location.href = "login.html";}
async function pruefen(){
  const box = document.getElementById("inhalt");
  const res = await fetch(SUPABASE_URL + "/rest/v1/Users?select=*&id=eq." + USER_ID,{headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer " + SUPABASE_KEY}});
  const data = await res.json();
  const user = data[0];
  if(!user || user.Admin !== true){
    box.innerHTML = "<div class='leer'>Kein Admin-Zugriff.</div>";
    return;
  }
  box.innerHTML = `
    <div class="card"><div class="info">Angemeldet als:<br><b>${user.Vorname || user["PSN-Username"]}</b></div></div>
    <div class="card">
      <button onclick="location.href='admin_registrierungen.html'">REGISTRIERUNGEN</button>
      <button onclick="location.href='admin_passwort.html'">PASSWORT RESET</button>
      <button onclick="location.href='admin_users.html'">BENUTZER</button>
      <button onclick="location.href='admin_hoefe.html'">HÖFE</button>
      <button onclick="location.href='admin_organisationen.html'">ORGANISATIONEN</button>
      <button onclick="location.href='admin_felder.html'">FELDER</button>
      <button onclick="location.href='admin_fruchtarten.html'">🌾 FRUCHTARTEN</button>
      <button onclick="location.href='admin_marktplatz.html'">MARKTPLATZ</button>
      <button onclick="location.href='admin_auftraege.html'">AUFTRÄGE / EINSÄTZE</button>
      <button onclick="location.href='admin_ueberweisungen.html'">💸 ÜBERWEISUNGEN</button>
      <button onclick="location.href='admin_rechnungen.html'">🧾 RECHNUNGEN</button>
      <button onclick="location.href='admin_benachrichtigungen.html'">BENACHRICHTIGUNGEN</button>
      <button onclick="location.href='admin_server.html'">SERVERSTATUS</button>
      <button onclick="location.href='zeitprotokoll.html'">⏱️ ZEITPROTOKOLL</button>
      <button onclick="location.href='admin_telegram.html'">TELEGRAM</button>
      <button onclick="location.href='strafregister.html'">🚔 STRAFREGISTER</button>
    </div>
    <div class="card">
      <button class="dark" onclick="location.href='index.html'">ZUR HOME-SEITE</button>
      <button class="red" onclick="logout()">LOGOUT</button>
    </div>`;
}
function logout(){localStorage.clear();location.href = "login.html";}
pruefen();
</script>
</body>
</html>
