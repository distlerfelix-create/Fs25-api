<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auftrag</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  background:#000;
  color:#00ff22;
  font-family:Arial,sans-serif;
}

.app{
  max-width:700px;
  margin:auto;
  padding:20px;
}

.back{
  background:#222;
  color:white;
  border:1px solid #555;
  padding:14px 22px;
  border-radius:12px;
  margin-bottom:35px;
  font-size:18px;
}

h1{
  color:white;
  text-align:center;
  font-family:Georgia,serif;
  font-size:38px;
}

.card{
  background:#111;
  border:1px solid #008000;
  border-radius:14px;
  padding:20px;
  margin-bottom:18px;
  box-shadow:0 0 10px rgba(0,255,0,0.18);
}

.einsatz{
  border:2px solid #ff6600;
  box-shadow:0 0 18px rgba(255,100,0,0.6);
}

h2{
  color:#00ff22;
  margin-top:0;
}

.label{
  color:#ffaa33;
  margin-top:12px;
}

.value{
  color:white;
  font-size:20px;
  margin-top:4px;
  white-space:pre-line;
}

input, textarea, select{
  width:100%;
  padding:14px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #008000;
  background:#000;
  color:white;
  font-size:18px;
}

textarea{
  min-height:120px;
}

button{
  width:100%;
  margin-top:14px;
  padding:16px;
  border:none;
  border-radius:12px;
  font-size:19px;
  font-weight:bold;
}

.green{background:#008800;color:white;}
.red{background:#aa0000;color:white;}
.dark{background:#333;color:white;}

.msg{
  color:#ffaa33;
  text-align:center;
  margin-top:14px;
  font-weight:bold;
}

.leer{
  color:white;
  text-align:center;
  margin-top:40px;
  font-size:18px;
}
</style>
</head>

<body>
<div class="app">

<button class="back" onclick="location.href='auftraege.html'">← Zurück</button>

<h1 id="seitenTitel">AUFTRAG</h1>

<div id="inhalt">Lade...</div>

</div>

<script>
const SUPABASE_URL = "https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY = "sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";

const USER_ID = localStorage.getItem("user_id");
const USERNAME = localStorage.getItem("username") || "Disti1701";

if(!USER_ID){
  location.href = "login.html";
}

const params = new URLSearchParams(location.search);
const AUFTRAG_ID = params.get("id");

let auftrag = null;
let user = null;
let istAdmin = false;
let bearbeitenOffen = false;

function text(wert){
  return wert === null || wert === undefined || wert === "" ? "-" : wert;
}

async function api(tabelle){
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/" + tabelle + "?select=*",
    {
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY
      }
    }
  );

  if(!res.ok){
    throw new Error(await res.text());
  }

  return await res.json();
}

async function patchAuftrag(daten){
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/Auftraege?id=eq." + AUFTRAG_ID,
    {
      method:"PATCH",
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY,
        "Content-Type":"application/json",
        "Prefer":"return=minimal"
      },
      body:JSON.stringify(daten)
    }
  );

  if(!res.ok){
    throw new Error(await res.text());
  }
}

async function post(tabelle,daten){
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/" + tabelle,
    {
      method:"POST",
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY,
        "Content-Type":"application/json",
        "Prefer":"return=minimal"
      },
      body:JSON.stringify(daten)
    }
  );

  if(!res.ok){
    throw new Error(await res.text());
  }
}

async function laden(){
  const box = document.getElementById("inhalt");

  try{
    const auftraege = await api("Auftraege");
    const users = await api("Users");

    auftrag = auftraege.find(a => String(a.id) === String(AUFTRAG_ID));
    user = users.find(u => String(u.id) === String(USER_ID));

    if(!auftrag){
      box.innerHTML = "<div class='leer'>Auftrag nicht gefunden.</div>";
      return;
    }

    istAdmin = user && user.Admin === true;

    document.getElementById("seitenTitel").innerText =
      (auftrag.Auftragstyp === "Einsatz" || auftrag.Typ === "Einsatz")
      ? "EINSATZ"
      : "AUFTRAG";

    anzeigen();

  }catch(err){
    box.innerHTML = "<div class='leer'>Fehler:<br><br>" + err.message + "</div>";
  }
}

function anzeigen(){
  const box = document.getElementById("inhalt");

  const istEinsatz =
    auftrag.Auftragstyp === "Einsatz" || auftrag.Typ === "Einsatz";

  let html = `
    <div class="card ${istEinsatz ? "einsatz" : ""}">
      <h2>${istEinsatz ? "🚨 Einsatz" : "📋 Auftrag"}</h2>

      <div class="label">Titel</div>
      <div class="value">${text(auftrag.Titel)}</div>

      <div class="label">Beschreibung</div>
      <div class="value">${text(auftrag.Beschreibung)}</div>

      <div class="label">Status</div>
      <div class="value">${text(auftrag.Status)}</div>

      <div class="label">Typ</div>
      <div class="value">${text(auftrag.Auftragstyp || auftrag.Typ)}</div>

      <div class="label">Belohnung</div>
      <div class="value">${text(auftrag.Belohnung)} €</div>

      <div class="label">Erstellt von</div>
      <div class="value">${text(auftrag.Erstellt_von)}</div>

      <div class="label">Hof</div>
      <div class="value">${text(auftrag.Hof)}</div>

      <div class="label">Organisation</div>
      <div class="value">${text(auftrag.Organisation)}</div>
    </div>
  `;

  html += `
    <div class="card">
      <button class="green" onclick="formularUmschalten()">
        ${bearbeitenOffen ? "Bearbeiten schließen" : "Auftrag bearbeiten"}
      </button>

      ${auftrag.Status !== "Erledigt" ? `
        <button class="red" onclick="auftragBeenden()">Auftrag / Einsatz beenden</button>
      ` : ""}

      <button class="dark" onclick="location.href='auftraege.html'">Zur Übersicht</button>
    </div>
  `;

  if(bearbeitenOffen){
    html += formular();
  }

  box.innerHTML = html;
}

function formularUmschalten(){
  bearbeitenOffen = !bearbeitenOffen;
  anzeigen();
}

function formular(){
  return `
    <div class="card">
      <h2>Bearbeiten</h2>

      <div class="label">Titel</div>
      <input id="titel" value="${text(auftrag.Titel)}">

      <div class="label">Beschreibung</div>
      <textarea id="beschreibung">${auftrag.Beschreibung || ""}</textarea>

      <div class="label">Belohnung</div>
      <input id="belohnung" type="number" value="${auftrag.Belohnung || 0}">

      <div class="label">Status</div>
      <select id="status">
        <option ${auftrag.Status === "Offen" ? "selected" : ""}>Offen</option>
        <option ${auftrag.Status === "In Arbeit" ? "selected" : ""}>In Arbeit</option>
        <option ${auftrag.Status === "Erledigt" ? "selected" : ""}>Erledigt</option>
      </select>

      <div class="label">Typ</div>
      <input id="typ" value="${text(auftrag.Auftragstyp || auftrag.Typ)}">

      <button class="green" onclick="speichern()">Speichern</button>

      ${istAdmin ? `<button class="red" onclick="auftragLoeschen()">Auftrag löschen</button>` : ""}

      <div id="meldung" class="msg"></div>
    </div>
  `;
}

async function speichern(){
  const meldung = document.getElementById("meldung");
  meldung.innerText = "Speichere...";

  try{
    const neuerStatus = document.getElementById("status").value;

    await patchAuftrag({
      Titel:document.getElementById("titel").value.trim(),
      Beschreibung:document.getElementById("beschreibung").value.trim(),
      Belohnung:Number(document.getElementById("belohnung").value || 0),
      Status:neuerStatus,
      Auftragstyp:document.getElementById("typ").value.trim()
    });

    meldung.innerText = "Gespeichert.";
    bearbeitenOffen = false;
    await laden();

  }catch(err){
    meldung.innerText = "Fehler: " + err.message;
  }
}

async function auftragBeenden(){
  if(!confirm("Diesen Auftrag / Einsatz wirklich beenden?")){
    return;
  }

  try{
    await patchAuftrag({
      Status:"Erledigt",
      Erledigt_am:new Date().toISOString()
    });

    await fetch(
      SUPABASE_URL + "/rest/v1/Benachrichtigungen?Auftrag_id=eq." + AUFTRAG_ID,
      {
        method:"PATCH",
        headers:{
          "apikey":SUPABASE_KEY,
          "Authorization":"Bearer " + SUPABASE_KEY,
          "Content-Type":"application/json",
          "Prefer":"return=minimal"
        },
        body:JSON.stringify({
          Erledigt:true,
          Gelesen:true
        })
      }
    );

    await post("Benachrichtigungen", {
      Titel:"✅ Einsatz/Auftrag beendet",
      Nachricht:"Der Auftrag wurde von " + USERNAME + " beendet.",
      Typ:"Auftrag",
      User_id:null,
      Hof_id:auftrag.Hof_id || null,
      Organisation_id:auftrag.Organisation_id || null,
      Auftrag_id:AUFTRAG_ID,
      Gelesen:false,
      Erledigt:true,
      Archiviert:false,
      Erstellt_am:new Date().toISOString()
    });

    await post("Telegram_queue", {
      Titel:"✅ " + auftrag.Titel,
Nachricht:"Der Auftrag '" + auftrag.Titel +
"' wurde von " + USERNAME + " beendet.",
      Typ:"Auftrag",
      User_id:null,
      Hof_id:auftrag.Hof_id || null,
      Organisation_id:auftrag.Organisation_id || null,
      Chat_id:null,
      Gesendet:false,
      Erstellt_am:new Date().toISOString()
    });

    await laden();

  }catch(err){
    alert("Fehler: " + err.message);
  }
}

async function auftragLoeschen(){
  if(!confirm("Auftrag wirklich löschen?")){
    return;
  }

  try{
    const res = await fetch(
      SUPABASE_URL + "/rest/v1/Auftraege?id=eq." + AUFTRAG_ID,
      {
        method:"DELETE",
        headers:{
          "apikey":SUPABASE_KEY,
          "Authorization":"Bearer " + SUPABASE_KEY,
          "Prefer":"return=minimal"
        }
      }
    );

    if(!res.ok){
      throw new Error(await res.text());
    }

    location.href = "auftraege.html";

  }catch(err){
    alert("Fehler: " + err.message);
  }
}

laden();
</script>

</body>
</html>
