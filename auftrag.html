<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auftrag</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#000;color:#00ff22;font-family:Arial,sans-serif}
.app{max-width:720px;margin:auto;padding:20px 15px 70px}
.back{background:#222;color:white;border:1px solid #555;padding:14px 22px;border-radius:12px;margin-bottom:28px;font-size:18px}
h1{color:white;text-align:center;font-family:Georgia,serif;font-size:38px}
.card{background:#111;border:1px solid #008000;border-radius:14px;padding:20px;margin-bottom:18px;box-shadow:0 0 10px rgba(0,255,0,.18)}
.einsatz{border:2px solid #ff6600;box-shadow:0 0 18px rgba(255,100,0,.55)}
h2{color:#00ff22;margin-top:0}.label{color:#ffaa33;margin-top:12px}.value{color:white;font-size:19px;margin-top:4px;white-space:pre-line}
input,textarea,select{width:100%;padding:14px;margin-top:8px;border-radius:10px;border:1px solid #008000;background:#000;color:white;font-size:18px}
textarea{min-height:110px;resize:vertical}
button{width:100%;margin-top:12px;padding:15px;border:none;border-radius:12px;font-size:18px;font-weight:bold}
.green{background:#008800;color:white}.blue{background:#004488;color:white}.orange{background:#cc7700;color:white}.red{background:#aa0000;color:white}.dark{background:#333;color:white}
.msg{color:#ffaa33;text-align:center;margin-top:12px;font-weight:bold;white-space:pre-line}.leer{color:white;text-align:center;margin-top:40px;font-size:18px}
.badges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.badge{padding:6px 11px;border-radius:20px;color:white;font-size:13px;font-weight:bold}
.offen{background:#008800}.angenommen{background:#b59b00}.bearbeitung{background:#004488}.erledigt{background:#008800}.abgelehnt{background:#aa0000}.prioHoch{background:#aa0000}.prioMittel{background:#cc7700}.prioNiedrig{background:#008800}
.verlauf-item{background:#090909;border-left:4px solid #008800;border-radius:10px;padding:12px;margin-bottom:10px}.verlauf-item.system{border-left-color:#ffaa33}.verlauf-meta{color:#ffaa33;font-size:13px;margin-bottom:6px}.verlauf-text{color:white;line-height:1.45;white-space:pre-line}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.action-grid button{margin-top:0}.timeline{display:grid;gap:8px}.timeline-item{background:#090909;border:1px solid #333;border-radius:10px;padding:10px;color:white}.timeline-item b{color:#ffaa33}
@media(max-width:560px){.action-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<button class="back" onclick="location.href='auftraege.html'">← Zurück</button>
<h1 id="seitenTitel">AUFTRAG</h1>
<div id="inhalt">Lade...</div>
</div>
<script>
const SUPABASE_URL="https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY="sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";
const USER_ID=localStorage.getItem("user_id");
const USERNAME=localStorage.getItem("username")||"Unbekannt";
if(!USER_ID){location.href="login.html";}
const AUFTRAG_ID=new URLSearchParams(location.search).get("id");

let auftrag=null,user=null,users=[],kommentare=[],istAdmin=false,bearbeitenOffen=false;
function headers(){return{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json"}}
async function api(t){const r=await fetch(SUPABASE_URL+"/rest/v1/"+t+"?select=*",{headers:headers()});if(!r.ok)throw new Error(await r.text());return await r.json()}
async function post(t,d){const r=await fetch(SUPABASE_URL+"/rest/v1/"+t,{method:"POST",headers:{...headers(),"Prefer":"return=minimal"},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text())}
async function patchAuftrag(d){const r=await fetch(SUPABASE_URL+"/rest/v1/Auftraege?id=eq."+AUFTRAG_ID,{method:"PATCH",headers:{...headers(),"Prefer":"return=minimal"},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text())}
function text(v){return v===null||v===undefined||v===""?"-":v}
function datum(v){if(!v)return"-";const d=new Date(v);if(isNaN(d.getTime()))return"-";return d.toLocaleDateString("de-DE")+" "+d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})}
function statusNormal(s){const x=String(s||"Offen").toLowerCase();if(x==="in arbeit"||x==="in bearbeitung")return"In Bearbeitung";if(x==="abgeschlossen"||x==="erledigt")return"Erledigt";if(x==="angenommen")return"Angenommen";if(x==="abgelehnt")return"Abgelehnt";return"Offen"}
function statusKlasse(s){s=statusNormal(s);if(s==="Angenommen")return"angenommen";if(s==="In Bearbeitung")return"bearbeitung";if(s==="Erledigt")return"erledigt";if(s==="Abgelehnt")return"abgelehnt";return"offen"}
function statusIcon(s){s=statusNormal(s);if(s==="Angenommen")return"🟡";if(s==="In Bearbeitung")return"🔵";if(s==="Erledigt")return"✅";if(s==="Abgelehnt")return"❌";return"🟢"}
function prioKlasse(p){if(p==="Hoch")return"prioHoch";if(p==="Niedrig")return"prioNiedrig";return"prioMittel"}
function prioIcon(p){if(p==="Hoch")return"🔴";if(p==="Niedrig")return"🟢";return"🟡"}
function istEinsatz(){return auftrag&&(auftrag.Auftragstyp==="Einsatz"||auftrag.Typ==="Einsatz")}
function userName(){return user?(user.Vorname||user["PSN-Username"]||USERNAME):USERNAME}
async function verlaufEintrag(typ,kommentar){await post("Auftrag_Kommentare",{Auftrag_id:Number(AUFTRAG_ID),User_id:Number(USER_ID),Benutzername:userName(),Typ:typ,Kommentar:kommentar,Erstellt_am:new Date().toISOString()})}
async function wichtigeMeldung(titel,nachricht){
  await post("Benachrichtigungen",{Titel:titel,Nachricht:nachricht,Typ:"Auftrag",User_id:null,Hof_id:null,Organisation_id:null,Gelesen:false,Erledigt:false,Archiviert:false,Telegram_gesendet:false,Erstellt_am:new Date().toISOString()});
  await post("Telegram_queue",{Titel:titel,Nachricht:nachricht,Typ:"Auftrag",User_id:null,Hof_id:null,Organisation_id:null,Chat_id:null,Gesendet:false,Erstellt_am:new Date().toISOString(),Status:"Offen",Fehler:null});
}
async function laden(){
  const box=document.getElementById("inhalt");
  try{
    const [auftraegeDaten,userDaten,kommentarDaten]=await Promise.all([api("Auftraege"),api("Users"),api("Auftrag_Kommentare")]);
    auftrag=auftraegeDaten.find(a=>String(a.id)===String(AUFTRAG_ID));user=userDaten.find(u=>String(u.id)===String(USER_ID));users=userDaten;
    kommentare=(kommentarDaten||[]).filter(k=>String(k.Auftrag_id)===String(AUFTRAG_ID)).sort((a,b)=>new Date(a.Erstellt_am||0)-new Date(b.Erstellt_am||0));
    if(!auftrag){box.innerHTML="<div class='leer'>Auftrag nicht gefunden.</div>";return}
    istAdmin=user&&user.Admin===true;
    document.getElementById("seitenTitel").innerText=istEinsatz()?"EINSATZ":"AUFTRAG";
    anzeigen();
  }catch(e){box.innerHTML="<div class='leer'>Fehler:<br><br>"+e.message+"</div>"}
}
function anzeigen(){
  const s=statusNormal(auftrag.Status),p=auftrag.Prioritaet||"Mittel",box=document.getElementById("inhalt");
  let html=`
  <div class="card ${istEinsatz()?"einsatz":""}">
    <div class="badges"><span class="badge ${statusKlasse(s)}">${statusIcon(s)} ${s}</span><span class="badge ${prioKlasse(p)}">${prioIcon(p)} ${p}</span></div>
    <h2>${istEinsatz()?"🚨 Einsatz":"📋 Auftrag"}</h2>
    <div class="label">Titel</div><div class="value">${text(auftrag.Titel)}</div>
    <div class="label">Beschreibung</div><div class="value">${text(auftrag.Beschreibung)}</div>
    <div class="label">Kategorie</div><div class="value">${text(auftrag.Kategorie||"Sonstiges")}</div>
    <div class="label">Bearbeiter</div><div class="value">${text(auftrag.Bearbeiter_Name||auftrag.Angenommen_von)}</div>
    <div class="label">Belohnung</div><div class="value">${text(auftrag.Belohnung)} €</div>
    <div class="label">Erstellt von</div><div class="value">${text(auftrag.Erstellt_von)}</div>
    <div class="label">Hof</div><div class="value">${text(auftrag.Hof)}</div>
    <div class="label">Organisation</div><div class="value">${text(auftrag.Organisation)}</div>
  </div>
  <div class="card"><h2>Aktionen</h2><div class="action-grid">`;
  if(s==="Offen")html+=`<button class="orange" onclick="statusSetzen('Angenommen')">Annehmen</button><button class="red" onclick="statusSetzen('Abgelehnt')">Ablehnen</button>`;
  if(s==="Angenommen")html+=`<button class="blue" onclick="statusSetzen('In Bearbeitung')">In Bearbeitung</button><button class="red" onclick="statusSetzen('Abgelehnt')">Ablehnen</button>`;
  if(s==="In Bearbeitung")html+=`<button class="green" onclick="statusSetzen('Erledigt')">Erledigt</button><button class="red" onclick="statusSetzen('Abgelehnt')">Ablehnen</button>`;
  if(s==="Erledigt"||s==="Abgelehnt")html+=`<button class="dark" onclick="statusSetzen('Offen')">Wieder öffnen</button>`;
  html+=`</div><button class="dark" onclick="formularUmschalten()">${bearbeitenOffen?"Bearbeiten schließen":"Auftrag bearbeiten"}</button>${istAdmin?`<button class="red" onclick="auftragLoeschen()">Auftrag löschen</button>`:""}</div>`;
  if(bearbeitenOffen)html+=formular();
  html+=timelineHtml()+kommentarHtml();
  box.innerHTML=html;
}
function timelineHtml(){
  return `<div class="card"><h2>🕒 Zeitachse</h2><div class="timeline">
    <div class="timeline-item"><b>📋 Erstellt</b><br>${datum(auftrag.Erstellt_am||auftrag.created_at)} · ${text(auftrag.Erstellt_von)}</div>
    <div class="timeline-item"><b>🟡 Angenommen</b><br>${datum(auftrag.Angenommen_am)} · ${text(auftrag.Bearbeiter_Name||auftrag.Angenommen_von)}</div>
    <div class="timeline-item"><b>🔵 In Bearbeitung</b><br>${datum(auftrag.In_Bearbeitung_am)}</div>
    <div class="timeline-item"><b>✅ Erledigt</b><br>${datum(auftrag.Erledigt_am)}</div>
    <div class="timeline-item"><b>❌ Abgelehnt</b><br>${datum(auftrag.Abgelehnt_am)}</div>
  </div></div>`;
}
function kommentarHtml(){
  let h=`<div class="card"><h2>💬 Verlauf und Kommentare</h2>`;
  if(kommentare.length===0)h+=`<div class="value">Noch keine Einträge.</div>`;
  kommentare.forEach(k=>{h+=`<div class="verlauf-item ${k.Typ==="System"||k.Typ==="Status"?"system":""}"><div class="verlauf-meta">${text(k.Benutzername)} · ${datum(k.Erstellt_am)} · ${text(k.Typ)}</div><div class="verlauf-text">${text(k.Kommentar)}</div></div>`});
  h+=`<textarea id="neuerKommentar" placeholder="Kommentar schreiben..."></textarea><button class="green" onclick="kommentarSenden()">Kommentar senden</button><div id="kommentarMsg" class="msg"></div></div>`;
  return h;
}
function formularUmschalten(){bearbeitenOffen=!bearbeitenOffen;anzeigen()}
function formular(){
  const s=statusNormal(auftrag.Status);
  return `<div class="card"><h2>Bearbeiten</h2>
    <div class="label">Titel</div><input id="titel" value="${String(auftrag.Titel||"").replaceAll('"',"&quot;")}">
    <div class="label">Beschreibung</div><textarea id="beschreibung">${auftrag.Beschreibung||""}</textarea>
    <div class="label">Kategorie</div><input id="kategorie" value="${text(auftrag.Kategorie||"Sonstiges")}">
    <div class="label">Belohnung</div><input id="belohnung" type="number" value="${auftrag.Belohnung||0}">
    <div class="label">Priorität</div><select id="prioritaet"><option ${auftrag.Prioritaet==="Hoch"?"selected":""}>Hoch</option><option ${!auftrag.Prioritaet||auftrag.Prioritaet==="Mittel"?"selected":""}>Mittel</option><option ${auftrag.Prioritaet==="Niedrig"?"selected":""}>Niedrig</option></select>
    <div class="label">Status</div><select id="status"><option ${s==="Offen"?"selected":""}>Offen</option><option ${s==="Angenommen"?"selected":""}>Angenommen</option><option ${s==="In Bearbeitung"?"selected":""}>In Bearbeitung</option><option ${s==="Erledigt"?"selected":""}>Erledigt</option><option ${s==="Abgelehnt"?"selected":""}>Abgelehnt</option></select>
    <button class="green" onclick="speichern()">Speichern</button><div id="meldung" class="msg"></div></div>`;
}
async function speichern(){
  const m=document.getElementById("meldung");m.innerText="Speichere...";
  try{
    const neu=document.getElementById("status").value,alt=statusNormal(auftrag.Status),daten={Titel:document.getElementById("titel").value.trim(),Beschreibung:document.getElementById("beschreibung").value.trim(),Kategorie:document.getElementById("kategorie").value.trim(),Belohnung:Number(document.getElementById("belohnung").value||0),Prioritaet:document.getElementById("prioritaet").value,Status:neu};
    if(neu!==alt)Object.assign(daten,statusDaten(neu));
    await patchAuftrag(daten);if(neu!==alt)await verlaufEintrag("Status",statusKommentar(neu));
    bearbeitenOffen=false;await laden();
  }catch(e){m.innerText="Fehler: "+e.message}
}
function statusDaten(neu){
  const jetzt=new Date().toISOString();
  if(neu==="Offen")return{Bearbeiter_User_id:null,Bearbeiter_Name:null,Angenommen_von:null,Angenommen_am:null,In_Bearbeitung_am:null,Erledigt_am:null,Abgelehnt_am:null};
  if(neu==="Angenommen")return{Bearbeiter_User_id:Number(USER_ID),Bearbeiter_Name:userName(),Angenommen_von:userName(),Angenommen_am:jetzt,Abgelehnt_am:null};
  if(neu==="In Bearbeitung")return{Bearbeiter_User_id:Number(auftrag.Bearbeiter_User_id||USER_ID),Bearbeiter_Name:auftrag.Bearbeiter_Name||userName(),Angenommen_von:auftrag.Angenommen_von||userName(),Angenommen_am:auftrag.Angenommen_am||jetzt,In_Bearbeitung_am:jetzt,Abgelehnt_am:null};
  if(neu==="Erledigt")return{Erledigt_am:jetzt,Abgelehnt_am:null};
  if(neu==="Abgelehnt")return{Abgelehnt_am:jetzt,Erledigt_am:null};
  return{};
}
function statusKommentar(neu){if(neu==="Angenommen")return"🟡 "+userName()+" hat den Auftrag angenommen.";if(neu==="In Bearbeitung")return"🔵 "+userName()+" hat die Bearbeitung gestartet.";if(neu==="Erledigt")return"✅ "+userName()+" hat den Auftrag erledigt.";if(neu==="Abgelehnt")return"❌ "+userName()+" hat den Auftrag abgelehnt.";return"🟢 "+userName()+" hat den Auftrag wieder geöffnet."}
async function statusSetzen(neu){
  try{
    await patchAuftrag({Status:neu,...statusDaten(neu)});await verlaufEintrag("Status",statusKommentar(neu));
    if(["Angenommen","Erledigt","Abgelehnt"].includes(neu))await wichtigeMeldung(statusIcon(neu)+" Auftrag "+neu.toLowerCase()+": "+auftrag.Titel,statusKommentar(neu));
    await laden();
  }catch(e){alert("Fehler:\n"+e.message)}
}
async function kommentarSenden(){
  const m=document.getElementById("kommentarMsg"),feld=document.getElementById("neuerKommentar"),kommentar=feld.value.trim();m.innerText="";
  if(!kommentar){m.innerText="Bitte Kommentar eingeben.";return}
  try{await verlaufEintrag("Kommentar",kommentar);feld.value="";await laden()}catch(e){m.innerText="Fehler:\n"+e.message}
}
async function auftragLoeschen(){
  if(!confirm("Auftrag wirklich löschen?"))return;
  try{
    await fetch(SUPABASE_URL+"/rest/v1/Auftrag_Kommentare?Auftrag_id=eq."+AUFTRAG_ID,{method:"DELETE",headers:headers()});
    const r=await fetch(SUPABASE_URL+"/rest/v1/Auftraege?id=eq."+AUFTRAG_ID,{method:"DELETE",headers:headers()});if(!r.ok)throw new Error(await r.text());
    location.href="auftraege.html";
  }catch(e){alert("Fehler:\n"+e.message)}
}
laden();
</script>
</body>
</html>
