<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Aufträge</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#000;color:#00ff22;font-family:Arial,sans-serif}.app{max-width:760px;margin:auto;padding:20px 15px 70px}.back{background:#222;color:white;border:1px solid #555;padding:14px 22px;border-radius:12px;margin-bottom:28px;font-size:18px}h1{color:white;text-align:center;font-size:38px;font-family:Georgia,serif}
input,textarea,select{width:100%;padding:13px;margin-top:9px;border-radius:10px;border:1px solid #008000;background:#000;color:white;font-size:16px}textarea{min-height:90px}.card{background:#111;border:1px solid #008000;border-radius:14px;padding:18px;margin-bottom:18px}.card.einsatz{border:2px solid #ff6600}.titel{color:#00ff22;font-size:24px;font-weight:bold}.info{color:white;margin-top:10px;line-height:1.5;font-size:16px;white-space:pre-line}.orangeText{color:#ffaa33}
button{width:100%;margin-top:10px;padding:14px;border:none;border-radius:12px;font-size:17px;font-weight:bold}.green{background:#008800;color:white}.red{background:#aa0000;color:white}.dark{background:#333;color:white}.orange{background:#cc7700;color:white}.blue{background:#004488;color:white}.msg{color:#ffaa33;text-align:center;margin-top:10px;white-space:pre-line}.leer{color:white;text-align:center;margin-top:40px}
.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:14px}.tabs button{font-size:13px;padding:11px;margin:0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:620px){.tabs{grid-template-columns:1fr 1fr}.grid{grid-template-columns:1fr}}
</style></head>
<body><div class="app">
<button class="back" onclick="location.href='admin.html'">← Zurück</button><h1>AUFTRÄGE</h1>
<div class="tabs"><button class="dark" onclick="filter='offen';anzeigen()">Offen</button><button class="dark" onclick="filter='angenommen';anzeigen()">Angenommen</button><button class="dark" onclick="filter='bearbeitung';anzeigen()">Bearbeitung</button><button class="dark" onclick="filter='erledigt';anzeigen()">Erledigt</button><button class="dark" onclick="filter='abgelehnt';anzeigen()">Abgelehnt</button></div>
<input id="suche" placeholder="Auftrag suchen..." oninput="anzeigen()"><div id="liste">Lade...</div></div>
<script>
const SUPABASE_URL="https://iddfyhsxsdjgestwxcei.supabase.co",SUPABASE_KEY="sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR",USER_ID=localStorage.getItem("user_id"),USERNAME=localStorage.getItem("username")||"Admin";
if(!USER_ID)location.href="login.html";
let users=[],auftraege=[],filter="offen";
function headers(){return{apikey:SUPABASE_KEY,Authorization:"Bearer "+SUPABASE_KEY,"Content-Type":"application/json"}}
async function api(t){const r=await fetch(SUPABASE_URL+"/rest/v1/"+t+"?select=*",{headers:headers()});if(!r.ok)throw new Error(await r.text());return await r.json()}
async function post(t,d){const r=await fetch(SUPABASE_URL+"/rest/v1/"+t,{method:"POST",headers:{...headers(),Prefer:"return=minimal"},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text())}
async function patch(t,id,d){const r=await fetch(SUPABASE_URL+"/rest/v1/"+t+"?id=eq."+id,{method:"PATCH",headers:{...headers(),Prefer:"return=minimal"},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text())}
async function del(t,id){const r=await fetch(SUPABASE_URL+"/rest/v1/"+t+"?id=eq."+id,{method:"DELETE",headers:{...headers(),Prefer:"return=minimal"}});if(!r.ok)throw new Error(await r.text())}
function text(v){return v===null||v===undefined||v===""?"-":v}
function statusNormal(s){s=String(s||"Offen").toLowerCase();if(s==="in arbeit"||s==="in bearbeitung")return"In Bearbeitung";if(s==="erledigt"||s==="abgeschlossen")return"Erledigt";if(s==="angenommen")return"Angenommen";if(s==="abgelehnt")return"Abgelehnt";return"Offen"}
function userName(u){return u?(u.Vorname||u["PSN-Username"]||u.Username||"Spieler"):"-"}
function userSelect(id,aktuellId){let h=`<select id="user_${id}"><option value="">Kein Bearbeiter</option>`;users.filter(u=>u.Aktiviert!==false).forEach(u=>h+=`<option value="${u.id}" ${String(u.id)===String(aktuellId)?"selected":""}>${userName(u)}</option>`);return h+"</select>"}
async function verlauf(id,typ,kommentar){await post("Auftrag_Kommentare",{Auftrag_id:Number(id),User_id:Number(USER_ID),Benutzername:USERNAME,Typ:typ,Kommentar:kommentar,Erstellt_am:new Date().toISOString()})}
async function laden(){const box=document.getElementById("liste");try{users=await api("Users");auftraege=await api("Auftraege");const admin=users.find(u=>String(u.id)===String(USER_ID));if(!admin||admin.Admin!==true){box.innerHTML="<div class='leer'>Kein Admin-Zugriff.</div>";return}anzeigen()}catch(e){box.innerHTML="<div class='leer'>Fehler:<br><br>"+e.message+"</div>"}}
function anzeigen(){
 const box=document.getElementById("liste"),suche=document.getElementById("suche").value.toLowerCase().trim();
 let liste=auftraege.filter(a=>{const s=statusNormal(a.Status);if(filter==="offen"&&s!=="Offen")return false;if(filter==="angenommen"&&s!=="Angenommen")return false;if(filter==="bearbeitung"&&s!=="In Bearbeitung")return false;if(filter==="erledigt"&&s!=="Erledigt")return false;if(filter==="abgelehnt"&&s!=="Abgelehnt")return false;return [a.Titel,a.Beschreibung,a.Kategorie,a.Hof,a.Organisation,a.Erstellt_von,a.Bearbeiter_Name,a.Angenommen_von].join(" ").toLowerCase().includes(suche)});
 liste.sort((a,b)=>Number(b.id)-Number(a.id));if(!liste.length){box.innerHTML="<div class='leer'>Keine Aufträge gefunden.</div>";return}
 box.innerHTML="";liste.forEach(a=>{const s=statusNormal(a.Status),div=document.createElement("div");div.className="card "+((a.Typ==="Einsatz"||a.Auftragstyp==="Einsatz")?"einsatz":"");
 div.innerHTML=`<div class="titel">${a.Typ==="Einsatz"||a.Auftragstyp==="Einsatz"?"🚨 ":"📋 "}${text(a.Titel)}</div>
 <div class="info"><span class="orangeText">ID:</span> ${a.id}<br><span class="orangeText">Status:</span> ${s}<br><span class="orangeText">Priorität:</span> ${text(a.Prioritaet||"Mittel")}<br><span class="orangeText">Kategorie:</span> ${text(a.Kategorie||"Sonstiges")}<br><span class="orangeText">Bearbeiter:</span> ${text(a.Bearbeiter_Name||a.Angenommen_von)}<br><span class="orangeText">Hof:</span> ${text(a.Hof)}<br><span class="orangeText">Organisation:</span> ${text(a.Organisation)}<br><br>${text(a.Beschreibung)}</div>
 <input id="titel_${a.id}" value="${String(a.Titel||"").replaceAll('"',"&quot;")}"><textarea id="beschreibung_${a.id}">${a.Beschreibung||""}</textarea>
 <div class="grid"><select id="status_${a.id}"><option ${s==="Offen"?"selected":""}>Offen</option><option ${s==="Angenommen"?"selected":""}>Angenommen</option><option ${s==="In Bearbeitung"?"selected":""}>In Bearbeitung</option><option ${s==="Erledigt"?"selected":""}>Erledigt</option><option ${s==="Abgelehnt"?"selected":""}>Abgelehnt</option></select>
 <select id="prio_${a.id}"><option ${a.Prioritaet==="Hoch"?"selected":""}>Hoch</option><option ${!a.Prioritaet||a.Prioritaet==="Mittel"?"selected":""}>Mittel</option><option ${a.Prioritaet==="Niedrig"?"selected":""}>Niedrig</option></select></div>
 <input id="kategorie_${a.id}" value="${text(a.Kategorie||"Sonstiges")}"><input id="belohnung_${a.id}" type="number" value="${a.Belohnung||0}">${userSelect(a.id,a.Bearbeiter_User_id)}
 <button class="green" onclick="speichern(${a.id})">Speichern</button><button class="dark" onclick="location.href='auftrag.html?id=${a.id}'">Öffnen</button><button class="red" onclick="loeschen(${a.id})">Löschen</button><div id="msg_${a.id}" class="msg"></div>`;
 box.appendChild(div)})}
async function speichern(id){
 const a=auftraege.find(x=>Number(x.id)===Number(id)),m=document.getElementById("msg_"+id),neu=document.getElementById("status_"+id).value,bearbeiterId=document.getElementById("user_"+id).value,bearbeiter=users.find(u=>String(u.id)===String(bearbeiterId)),jetzt=new Date().toISOString();
 const d={Titel:document.getElementById("titel_"+id).value.trim(),Beschreibung:document.getElementById("beschreibung_"+id).value.trim(),Status:neu,Prioritaet:document.getElementById("prio_"+id).value,Kategorie:document.getElementById("kategorie_"+id).value.trim(),Belohnung:Number(document.getElementById("belohnung_"+id).value||0),Bearbeiter_User_id:bearbeiterId?Number(bearbeiterId):null,Bearbeiter_Name:bearbeiter?userName(bearbeiter):null,Angenommen_von:bearbeiter?userName(bearbeiter):null};
 if(neu==="Angenommen")d.Angenommen_am=a.Angenommen_am||jetzt;if(neu==="In Bearbeitung"){d.Angenommen_am=a.Angenommen_am||jetzt;d.In_Bearbeitung_am=jetzt}if(neu==="Erledigt")d.Erledigt_am=jetzt;if(neu==="Abgelehnt")d.Abgelehnt_am=jetzt;
 try{await patch("Auftraege",id,d);if(statusNormal(a.Status)!==neu)await verlauf(id,"Status","Admin "+USERNAME+" änderte den Status auf "+neu+".");m.innerText="Gespeichert.";await laden()}catch(e){m.innerText="Fehler:\n"+e.message}}
async function loeschen(id){if(!confirm("Auftrag wirklich löschen?"))return;try{await fetch(SUPABASE_URL+"/rest/v1/Auftrag_Kommentare?Auftrag_id=eq."+id,{method:"DELETE",headers:headers()});await del("Auftraege",id);await laden()}catch(e){alert("Fehler:\n"+e.message)}}
laden();
</script></body></html>
