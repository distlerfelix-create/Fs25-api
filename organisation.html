<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organisation</title>
<style>
*{box-sizing:border-box;}body{margin:0;overflow-x:hidden;background:#000;color:#00ff22;font-family:Arial,sans-serif}.app{width:100%;max-width:700px;margin:auto;padding:20px}.back{background:#222;color:white;border:1px solid #555;padding:14px 22px;border-radius:12px;margin-bottom:35px;font-size:18px}h1{color:white;text-align:center;font-family:Georgia,serif;font-size:38px;margin:25px 0 35px}.card{background:#111;border:1px solid #008000;border-radius:14px;padding:20px;margin-bottom:18px;box-shadow:0 0 10px rgba(0,255,0,0.18)}h2{color:#00ff22;margin-top:0}.label{color:#ffaa33;font-size:15px;margin-top:10px}.value{color:white;font-size:20px;margin-top:4px}.item{background:#000;border:1px solid #006600;border-radius:10px;padding:12px;margin-top:10px;color:white}.item span{color:#ffaa33}.wichtig{border-color:red;box-shadow:0 0 12px rgba(255,0,0,0.6)}input,textarea{width:100%;padding:14px;margin-top:12px;border-radius:10px;border:1px solid #008000;background:#000;color:white;font-size:17px}textarea{min-height:100px}button{width:100%;margin-top:12px;padding:15px;border:none;border-radius:12px;font-size:18px;font-weight:bold}.green{background:#008800;color:white}.red{background:#aa0000;color:white}.msg{color:#ffaa33;text-align:center;margin-top:12px;font-weight:bold;white-space:pre-line}.leer{color:white;text-align:center;margin-top:40px;font-size:18px}.steuer-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.steuer-summe{font-size:24px;color:#00ff22;font-weight:bold}.steuer-tabelle{width:100%;border-collapse:collapse;margin-top:12px;color:white}.steuer-tabelle th,.steuer-tabelle td{border-bottom:1px solid #333;padding:10px 5px;text-align:left}.steuer-tabelle th{color:#ffaa33}.mini{font-size:14px;color:#aaa}.blue{background:#004488;color:white}select{width:100%;padding:14px;margin-top:12px;border-radius:10px;border:1px solid #008000;background:#000;color:white;font-size:17px}
.gemeinde-finanz-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gemeinde-finanz-stat{background:#000;border:1px solid #006600;border-radius:12px;padding:12px}
.gemeinde-finanz-label{color:#ffaa33;font-size:14px;margin-bottom:5px}
.gemeinde-finanz-wert{color:#00ff22;font-size:22px;font-weight:bold;overflow-wrap:anywhere}
.gemeinde-finanz-wert.rot{color:#ff5555}
.gemeinde-finanz-wert.weiss{color:white}
.gemeinde-aufklapp-kopf{display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer}
.gemeinde-aufklapp-inhalt{display:none;margin-top:12px}
.gemeinde-aufklapp-inhalt.offen{display:block}
.gemeinde-finanz-zeile{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.gemeinde-betrag{font-weight:bold;font-size:18px;white-space:nowrap}
.gemeinde-betrag.einnahme{color:#00ff22}
.gemeinde-betrag.ausgabe{color:#ff5555}
.gemeinde-hinweis{background:#000;border:1px solid #665500;border-radius:10px;padding:12px;color:#ffaa33;line-height:1.45;margin-top:10px}
.gemeinde-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.gemeinde-tabs button{margin:0;background:#333;font-size:15px;padding:11px}
.gemeinde-tabs button.active{background:#008800}
.gemeinde-section{display:none}
.gemeinde-section.active{display:block}
.klein{font-size:13px;color:#aaa;line-height:1.45;margin-top:6px}
.positiv{color:#00ff22}
.negativ{color:#ff5555}

@media(max-width:560px){.steuer-grid,.gemeinde-finanz-grid{grid-template-columns:1fr}.gemeinde-tabs{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="app">
<button class="back" onclick="location.href='organisationen.html'">← Zurück</button>
<h1 id="titel">ORGANISATION</h1>
<div id="inhalt">Lade...</div>
</div>
<script>
const SUPABASE_URL="https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY="sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";
const USER_ID=localStorage.getItem("user_id");
if(!USER_ID){location.href="login.html";}
const params=new URLSearchParams(location.search);
const ORG_ID=params.get("id");
let aktuellerUser=null,aktuelleOrganisation=null,darfVerwalten=false,alleUsers=[],alleUserOrgs=[],alleFelder=[],alleHoefe=[],serverStatus=null,grundsteuerEinstellung=null,grundsteuerLaeufe=[];
let gemeindeFinanzUebersicht=null;
let gemeindeHofStaende=[];
let gemeindeKredite=[];
let gemeindeKassenbuch=[];
let gemeindeFoerderungen=[];
let gemeindeSnapshot=null;
let gemeindeImport=null;
let gemeindeUeberweisungen=[];
function headers(){return {"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json"};}
async function api(tabelle){const res=await fetch(SUPABASE_URL+"/rest/v1/"+tabelle+"?select=*",{headers:headers()});if(!res.ok)throw new Error(await res.text());return await res.json();}
async function apiOptional(tabelle){try{return await api(tabelle);}catch(e){return [];}}
async function apiQuery(tabelle,query){
  const res=await fetch(SUPABASE_URL+"/rest/v1/"+tabelle+"?"+query,{headers:headers(),cache:"no-store"});
  if(!res.ok)throw new Error(await res.text());
  return await res.json();
}
async function apiQueryOptional(tabelle,query){try{return await apiQuery(tabelle,query);}catch(e){console.warn(tabelle,e);return [];}}
async function post(tabelle,daten){const res=await fetch(SUPABASE_URL+"/rest/v1/"+tabelle,{method:"POST",headers:{...headers(),"Prefer":"return=minimal"},body:JSON.stringify(daten)});if(!res.ok)throw new Error(await res.text());}
async function patch(tabelle,id,daten){const res=await fetch(SUPABASE_URL+"/rest/v1/"+tabelle+"?id=eq."+id,{method:"PATCH",headers:{...headers(),"Prefer":"return=minimal"},body:JSON.stringify(daten)});if(!res.ok)throw new Error(await res.text());}
function istLeitung(rolle){const r=(rolle||"").toLowerCase();return r.includes("chef")||r.includes("kommandant")||r.includes("bürgermeister")||r.includes("leiter")||r.includes("leitung");}
function istAktiv(user){return user&&user.Aktiviert!==false;}
function chatIdVonUser(user){return user.Telegram_id||user.Telegram_chat_id||user.Chat_id||null;}
function eindeutigeEmpfaenger(liste){const map=new Map();liste.forEach(user=>{const chatId=chatIdVonUser(user);if(!user||!user.id||!chatId)return;map.set(String(user.id),user);});return Array.from(map.values());}
function empfaengerOrganisation(orgId){const orgUserIds=alleUserOrgs.filter(e=>String(e.Organisation_id)===String(orgId)&&e.Aktiv!==false).map(e=>String(e.User_id));return eindeutigeEmpfaenger(alleUsers.filter(u=>istAktiv(u)&&orgUserIds.includes(String(u.id))&&chatIdVonUser(u)));}
async function telegramQueueFuerOrganisation(titel,nachricht,orgId){const empfaenger=empfaengerOrganisation(orgId);for(const user of empfaenger){await post("Telegram_queue",{Titel:titel,Nachricht:nachricht,Typ:"Organisation",User_id:Number(user.id),Hof_id:user.Hof_id?Number(user.Hof_id):null,Organisation_id:Number(orgId),Chat_id:Number(chatIdVonUser(user)),Gesendet:false,Erstellt_am:new Date().toISOString(),Status:"Offen",Fehler:null});}return empfaenger.length;}
function formatDatum(datum){if(!datum)return"";const d=new Date(datum);return d.toLocaleDateString("de-DE")+" • "+d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})+" Uhr";}

function istGemeinde(){
  return aktuelleOrganisation &&
    String(aktuelleOrganisation.Name||"").toLowerCase().includes("gemeinde");
}
function zahl(v){
  const n=Number(String(v||"0").replace(",","."));
  return Number.isFinite(n)?n:0;
}
function formatZahl(v){
  return Number(v||0).toLocaleString("de-DE",{maximumFractionDigits:2});
}

function formatEuro(v){
  return Number(v||0).toLocaleString("de-DE",{minimumFractionDigits:0,maximumFractionDigits:2})+" €";
}
function htmlSicher(v){
  return String(v??"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function gemeindeToggle(id){
  const inhalt=document.getElementById(id);
  const icon=document.getElementById(id+"_icon");
  if(!inhalt)return;
  const offen=inhalt.classList.toggle("offen");
  if(icon)icon.textContent=offen?"▲":"▼";
}
function gemeindeTab(name){
  document.querySelectorAll(".gemeinde-section").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".gemeinde-tabs button").forEach(x=>x.classList.remove("active"));
  document.getElementById("gemeindeSection"+name).classList.add("active");
  document.getElementById("gemeindeTab"+name).classList.add("active");
}
function finanzMonate(){
  return ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
}
function monatZurueck(monat,anzahl){
  const monate=finanzMonate();
  const idx=monate.findIndex(m=>m.toLowerCase()===String(monat||"").toLowerCase());
  if(idx<0)return "Unbekannt";
  return monate[(idx-anzahl+120)%12];
}
function gruppenSumme(obj,felder){
  return felder.reduce((sum,f)=>sum+Number(obj?.[f]||0),0);
}
function gemeindeFinanzBereiche(werte){
  return [
    {titel:"🚜 Fahrzeuge und Geräte",ein:gruppenSumme(werte,["soldVehicles","soldHandtools"]),aus:gruppenSumme(werte,["newVehiclesCost","newHandtoolsCost","vehicleRunningCost","vehicleLeasingCost"])},
    {titel:"🏭 Produktion und Grundstücke",ein:gruppenSumme(werte,["soldProducts","propertyIncome","incomeBga"]),aus:gruppenSumme(werte,["productionCosts","propertyMaintenance"])},
    {titel:"🌾 Ernte und Betriebsmittel",ein:gruppenSumme(werte,["harvestIncome","soldWood","soldBales","soldWool","soldMilk"]),aus:gruppenSumme(werte,["purchaseSeeds","purchaseFertilizer","purchaseFuel","purchaseWater","purchaseBales","purchasePallets","purchaseSaplings"])},
    {titel:"🌱 Felder",ein:gruppenSumme(werte,["fieldSelling"]),aus:gruppenSumme(werte,["fieldPurchase"])},
    {titel:"🏗️ Gebäude und Bau",ein:gruppenSumme(werte,["soldBuildings"]),aus:gruppenSumme(werte,["constructionCost"])},
    {titel:"🐄 Tiere",ein:gruppenSumme(werte,["soldAnimals"]),aus:gruppenSumme(werte,["newAnimalsCost"])},
    {titel:"👷 Aufträge und Löhne",ein:gruppenSumme(werte,["missionIncome"]),aus:gruppenSumme(werte,["wagePayment"])},
    {titel:"💸 Sonstiges",ein:Number(werte?.other||0)>0?Number(werte.other):0,aus:Number(werte?.other||0)<0?Number(werte.other):0},
    {titel:"🏦 Ingame-Kreditzinsen",ein:0,aus:gruppenSumme(werte,["loanInterest"])}
  ];
}
function rundeAuf100(v){
  return Math.round(Number(v||0)/100)*100;
}
function flaechenNachHof(){
  const map=new Map();
  alleFelder.forEach(f=>{
    const hofId=Number(f.Hof_id||0);
    const ha=zahl(f.Feldgroesse);
    if(!hofId||ha<=0)return;
    const eintrag=map.get(hofId)||{hofId:hofId,flaeche:0,felder:[]};
    eintrag.flaeche+=ha;
    eintrag.felder.push(f.Feldnummer||f.id);
    map.set(hofId,eintrag);
  });
  return Array.from(map.values()).sort((a,b)=>b.flaeche-a.flaeche);
}
function hofName(id){
  const h=alleHoefe.find(x=>String(x.id)===String(id));
  return h?h.Name:"Hof "+id;
}

async function ladeGemeindeFinanzen(){
  const ergebnisse=await Promise.all([
    apiQueryOptional("Gemeinde_Finanz_Uebersicht","select=*&Organisation_id=eq."+ORG_ID+"&limit=1"),
    apiQueryOptional("Finanz_Hof_Gesamtuebersicht","select=*&order=Farm_id.asc"),
    apiQueryOptional("Gemeinde_Kredit_Uebersicht","select=*&Organisation_id=eq."+ORG_ID+"&order=Aktualisiert_am.desc"),
    apiQueryOptional("Gemeinde_Kassenbuch","select=*&Organisation_id=eq."+ORG_ID+"&order=Buchungszeit.desc&limit=100"),
    apiQueryOptional("Gemeinde_Foerderungen","select=*&Organisation_id=eq."+ORG_ID+"&order=Erstellt_am.desc&limit=100"),
    apiQueryOptional("Finanz_Snapshots","select=*&Ist_Gemeinde=eq.true&order=Erstellt_am.desc&limit=1"),
    apiQueryOptional("Finanz_Importe","select=*&order=Importiert_am.desc&limit=1"),
    apiQueryOptional("Finanz_Ueberweisungen","select=*&or=(Sender_Name.ilike.*Gemeinde*,Empfaenger_Name.ilike.*Gemeinde*)&order=Erkannt_am.desc&limit=50")
  ]);
  gemeindeFinanzUebersicht=ergebnisse[0]?.[0]||null;
  gemeindeHofStaende=ergebnisse[1]||[];
  gemeindeKredite=ergebnisse[2]||[];
  gemeindeKassenbuch=ergebnisse[3]||[];
  gemeindeFoerderungen=ergebnisse[4]||[];
  gemeindeSnapshot=ergebnisse[5]?.[0]||null;
  gemeindeImport=ergebnisse[6]?.[0]||null;
  gemeindeUeberweisungen=ergebnisse[7]||[];
}
function gemeindeFinanzHtml(){
  const g=gemeindeFinanzUebersicht||{};
  const konto=Number(g.Kontostand_XML||gemeindeSnapshot?.Kontostand||0);
  const ingameKredit=Number(g.Ingame_Kredit_XML||gemeindeSnapshot?.Ingame_Kredit||0);
  const aktiveKredite=gemeindeKredite.filter(k=>!["Abgeschlossen","Storniert"].includes(String(k.Status)));
  const offeneKredite=aktiveKredite.reduce((s,k)=>s+Number(k.Restschuld||0),0);
  const offeneZinsen=aktiveKredite.reduce((s,k)=>s+Number(k.Offene_Zinsen||0),0);

  let h=`<div class="card"><div class="gemeinde-aufklapp-kopf" onclick="gemeindeToggle('gemeindeFinanzen')">
    <h2 style="margin:0">💰 Gemeinde-Finanzen</h2><b id="gemeindeFinanzen_icon">▲</b>
  </div><div id="gemeindeFinanzen" class="gemeinde-aufklapp-inhalt offen">
    <div class="gemeinde-finanz-grid">
      <div class="gemeinde-finanz-stat"><div class="gemeinde-finanz-label">Gemeindekonto</div><div class="gemeinde-finanz-wert">${formatEuro(konto)}</div></div>
      <div class="gemeinde-finanz-stat"><div class="gemeinde-finanz-label">Ingame-Kredit</div><div class="gemeinde-finanz-wert rot">${formatEuro(ingameKredit)}</div></div>
      <div class="gemeinde-finanz-stat"><div class="gemeinde-finanz-label">Offene Gemeindekredite</div><div class="gemeinde-finanz-wert weiss">${formatEuro(offeneKredite)}</div></div>
      <div class="gemeinde-finanz-stat"><div class="gemeinde-finanz-label">Offene Zinsen</div><div class="gemeinde-finanz-wert rot">${formatEuro(offeneZinsen)}</div></div>
    </div>
    <div class="gemeinde-hinweis">Alle tatsächlichen Auszahlungen, Rückzahlungen und Überweisungen erfolgen ausschließlich ingame. Die Web-App verwaltet und dokumentiert diese Vorgänge.</div>

    <div class="gemeinde-tabs" style="margin-top:14px">
      <button id="gemeindeTabUebersicht" class="active" onclick="gemeindeTab('Uebersicht')">Übersicht</button>
      <button id="gemeindeTabKredite" onclick="gemeindeTab('Kredite')">Kredite</button>
      <button id="gemeindeTabKasse" onclick="gemeindeTab('Kasse')">Kassenbuch</button>
    </div>

    <div id="gemeindeSectionUebersicht" class="gemeinde-section active">
      ${gemeindeHofUebersichtHtml()}
      ${gemeindeMonateHtml()}
      ${gemeindeImportHtml()}
    </div>

    <div id="gemeindeSectionKredite" class="gemeinde-section">
      ${gemeindeKrediteHtml()}
      ${darfVerwalten?gemeindeKreditFormHtml():""}
    </div>

    <div id="gemeindeSectionKasse" class="gemeinde-section">
      ${gemeindeKassenbuchHtml()}
      ${gemeindeUeberweisungenHtml()}
    </div>
  </div></div>`;
  return h;
}
function gemeindeHofUebersichtHtml(){
  let h=`<div class="item"><b>🏡 Finanzübersicht aller Höfe</b>`;
  if(!gemeindeHofStaende.length)return h+"<div class='leer'>Keine Hofdaten vorhanden.</div></div>";
  gemeindeHofStaende.forEach(x=>{
    h+=`<div class="item">
      <div class="gemeinde-finanz-zeile"><b>${htmlSicher(x.Farm_Name||"-")}</b><b class="${Number(x.Kontostand||0)>=0?"positiv":"negativ"}">${formatEuro(x.Kontostand)}</b></div>
      <div class="klein">Ingame-Kredit: ${formatEuro(x.Ingame_Kredit)} · Gemeindekredit: ${formatEuro(x.Gemeindekredit||0)} · Zinsen: ${formatEuro(x.Offene_Zinsen||0)}</div>
    </div>`;
  });
  return h+"</div>";
}
function gemeindeMonateHtml(){
  const days=gemeindeSnapshot?.Finanzdaten?.days||{};
  const aktuell=gemeindeSnapshot?.Server_Monat||serverStatus?.monat||"-";
  let h=`<div class="item"><b>📊 Gemeinde-Finanzen nach Monaten</b>
    <div class="klein">Die Monatsnamen werden mit dem aktuellen Servermonat verbunden.</div>`;
  for(let offset=0;offset<=4;offset++){
    const monat=monatZurueck(aktuell,offset);
    const titel=offset===0?monat+" – aktueller Monat":offset===1?monat+" – Vormonat":monat+" – vor "+offset+" Monaten";
    const bereiche=gemeindeFinanzBereiche(days[String(offset)]||{});
    h+=`<div class="item">
      <div class="gemeinde-aufklapp-kopf" onclick="gemeindeToggle('gMonat${offset}')"><b>${titel}</b><b id="gMonat${offset}_icon">${offset===0?"▲":"▼"}</b></div>
      <div id="gMonat${offset}" class="gemeinde-aufklapp-inhalt ${offset===0?"offen":""}">`;
    bereiche.forEach(b=>{
      h+=`<div class="item"><b>${b.titel}</b>
        <div class="gemeinde-finanz-grid" style="margin-top:8px">
          <div class="gemeinde-finanz-stat"><div class="gemeinde-finanz-label">Einnahmen</div><div class="gemeinde-finanz-wert">${formatEuro(Math.max(0,Number(b.ein||0)))}</div></div>
          <div class="gemeinde-finanz-stat"><div class="gemeinde-finanz-label">Ausgaben</div><div class="gemeinde-finanz-wert rot">${formatEuro(Math.abs(Number(b.aus||0)))}</div></div>
        </div></div>`;
    });
    h+=`</div></div>`;
  }
  return h+"</div>";
}
function gemeindeImportHtml(){
  if(!gemeindeImport)return `<div class="item"><b>📥 Letzter Import</b><div class="leer">Kein Import vorhanden.</div></div>`;
  return `<div class="item"><b>📥 Letzter Savegame-Import</b>
    <div class="gemeinde-finanz-grid" style="margin-top:10px">
      <div class="gemeinde-finanz-stat"><div class="gemeinde-finanz-label">Status</div><div class="gemeinde-finanz-wert weiss">${htmlSicher(gemeindeImport.Status||"-")}</div></div>
      <div class="gemeinde-finanz-stat"><div class="gemeinde-finanz-label">Importiert</div><div class="gemeinde-finanz-wert weiss" style="font-size:16px">${formatDatum(gemeindeImport.Importiert_am)}</div></div>
      <div class="gemeinde-finanz-stat"><div class="gemeinde-finanz-label">Höfe</div><div class="gemeinde-finanz-wert">${formatZahl(gemeindeImport.Farm_Anzahl||0)}</div></div>
      <div class="gemeinde-finanz-stat"><div class="gemeinde-finanz-label">Dateigröße</div><div class="gemeinde-finanz-wert weiss" style="font-size:16px">${formatZahl(gemeindeImport.Dateigroesse_Bytes||0)} Bytes</div></div>
    </div></div>`;
}
function gemeindeKrediteHtml(){
  if(!gemeindeKredite.length)return `<div class="item"><b>🏦 Gemeindekredite</b><div class="leer">Noch keine Gemeindekredite.</div></div>`;
  let h=`<div class="item"><b>🏦 Gemeindekredite</b>`;
  gemeindeKredite.forEach(k=>{
    h+=`<div class="item"><div class="gemeinde-finanz-zeile"><b>${htmlSicher(k.Kreditnummer||"Kredit")}</b><span>${htmlSicher(k.Status||"-")}</span></div>
      <div class="klein">${htmlSicher(k.Kreditnehmer_Name||hofName(k.Kreditnehmer_Hof_id))}</div>
      <div class="gemeinde-finanz-grid" style="margin-top:8px">
        <div class="gemeinde-finanz-stat"><div class="gemeinde-finanz-label">Restschuld</div><div class="gemeinde-finanz-wert rot">${formatEuro(k.Restschuld)}</div></div>
        <div class="gemeinde-finanz-stat"><div class="gemeinde-finanz-label">Zinssatz</div><div class="gemeinde-finanz-wert weiss">${formatZahl(k.Zinssatz)} %</div></div>
        <div class="gemeinde-finanz-stat"><div class="gemeinde-finanz-label">Offene Zinsen</div><div class="gemeinde-finanz-wert rot">${formatEuro(k.Offene_Zinsen)}</div></div>
        <div class="gemeinde-finanz-stat"><div class="gemeinde-finanz-label">Gesamt offen</div><div class="gemeinde-finanz-wert weiss">${formatEuro(Number(k.Restschuld||0)+Number(k.Offene_Zinsen||0))}</div></div>
      </div>
      <div class="klein">Zweck: ${htmlSicher(k.Verwendungszweck||"-")}</div>
    </div>`;
  });
  return h+"</div>";
}
function gemeindeKreditFormHtml(){
  let opts='<option value="">Hof auswählen</option>';
  alleHoefe.forEach(h=>opts+=`<option value="${h.id}">${htmlSicher(h.Name)}</option>`);
  return `<div class="item"><b>➕ Gemeindekredit anlegen</b>
    <div class="gemeinde-hinweis">Das Anlegen dokumentiert den Kredit nur. Die Auszahlung muss anschließend ingame erfolgen.</div>
    <label class="label">Kreditnehmer</label><select id="gkHof">${opts}</select>
    <div class="steuer-grid">
      <div><label class="label">Kreditbetrag</label><input id="gkBetrag" type="number" min="100" step="100"></div>
      <div><label class="label">Zinssatz in %</label><input id="gkZins" type="number" min="0" step="0.01" value="2"></div>
    </div>
    <div class="steuer-grid">
      <div><label class="label">Laufzeit in Game-Jahren</label><input id="gkLaufzeit" type="number" min="1" step="1" value="1"></div>
      <div><label class="label">Zinsart</label><select id="gkZinsart"><option>Einfach</option><option>Zinseszins</option></select></div>
    </div>
    <label class="label">Verwendungszweck</label><input id="gkZweck" placeholder="z. B. Fahrzeugkauf">
    <label class="label">Bemerkung</label><textarea id="gkBemerkung" placeholder="Optional"></textarea>
    <button class="green" onclick="gemeindeKreditAnlegen()">Kredit vormerken</button>
    <div id="gkMsg" class="msg"></div>
  </div>`;
}
async function gemeindeKreditAnlegen(){
  const msg=document.getElementById("gkMsg");msg.innerText="";
  const hofId=Number(document.getElementById("gkHof").value||0);
  const betrag=Number(document.getElementById("gkBetrag").value||0);
  const zins=Number(document.getElementById("gkZins").value||0);
  const laufzeit=Number(document.getElementById("gkLaufzeit").value||0);
  const zweck=document.getElementById("gkZweck").value.trim();
  const bemerkung=document.getElementById("gkBemerkung").value.trim();
  const h=alleHoefe.find(x=>Number(x.id)===hofId);
  if(!hofId||!h){msg.innerText="Bitte Hof auswählen.";return;}
  if(betrag<=0){msg.innerText="Bitte Kreditbetrag eintragen.";return;}
  if(zins<0){msg.innerText="Zinssatz darf nicht negativ sein.";return;}
  try{
    await post("Gemeinde_Kredite",{
      Kreditnummer:"GK-"+Date.now(),
      Organisation_id:Number(ORG_ID),
      Kreditnehmer_Hof_id:hofId,
      Kreditnehmer_Name:h.Name,
      Kreditbetrag:betrag,
      Restschuld:betrag,
      Zinssatz:zins,
      Zinsart:document.getElementById("gkZinsart").value,
      Laufzeit_Ingame_Jahre:laufzeit||null,
      Verwendungszweck:zweck||null,
      Bemerkung:bemerkung||null,
      Status:"Auszahlung offen",
      Ingame_Auszahlung_bestaetigt:false,
      Erstellt_von:Number(USER_ID)
    });
    msg.innerText="Kredit wurde vorgemerkt. Auszahlung bitte ingame durchführen.";
    setTimeout(ladeOrganisation,700);
  }catch(e){msg.innerText="Fehler:\\n"+e.message;}
}
function gemeindeKassenbuchHtml(){
  if(!gemeindeKassenbuch.length)return `<div class="item"><b>📒 Gemeinde-Kassenbuch</b><div class="leer">Noch keine Buchungen.</div></div>`;
  let h=`<div class="item"><b>📒 Gemeinde-Kassenbuch</b>`;
  gemeindeKassenbuch.slice(0,30).forEach(k=>{
    const aus=String(k.Richtung)==="Ausgabe";
    h+=`<div class="item"><div class="gemeinde-finanz-zeile"><b>${htmlSicher(k.Kategorie||"Buchung")}</b><b class="gemeinde-betrag ${aus?"ausgabe":"einnahme"}">${aus?"−":"+"}${formatEuro(k.Betrag)}</b></div>
      <div class="klein">${htmlSicher(k.Beschreibung||"-")}<br>${formatDatum(k.Buchungszeit)} · ${htmlSicher(k.Status||"-")}</div></div>`;
  });
  return h+"</div>";
}
function gemeindeUeberweisungenHtml(){
  if(!gemeindeUeberweisungen.length)return `<div class="item"><b>💸 Erkannte Ingame-Überweisungen</b><div class="leer">Noch keine Überweisungen erkannt.</div></div>`;
  let h=`<div class="item"><b>💸 Erkannte Ingame-Überweisungen</b>`;
  gemeindeUeberweisungen.forEach(u=>{
    const eingang=String(u.Empfaenger_Name||"").toLowerCase().includes("gemeinde");
    h+=`<div class="item"><div class="gemeinde-finanz-zeile"><b>${eingang?"Erhalten von":"Gesendet an"} ${htmlSicher(eingang?u.Sender_Name:u.Empfaenger_Name)}</b><b class="gemeinde-betrag ${eingang?"einnahme":"ausgabe"}">${eingang?"+":"−"}${formatEuro(u.Betrag)}</b></div>
      <div class="klein">${formatDatum(u.Erkannt_am)} · ${htmlSicher(u.Status||"-")} · ${htmlSicher(u.Sicherheitsstufe||"-")}</div></div>`;
  });
  return h+"</div>";
}

function grundsteuerHtml(){
  const daten=flaechenNachHof();
  const gesamt=daten.reduce((s,x)=>s+x.flaeche,0);
  const preis=zahl(grundsteuerEinstellung?.Preis_pro_ha);
  let h=`<div class="card"><h2>🏛️ Grundsteuer und Hof-Flächen</h2>
    <div class="label">Gesamtfläche aller Höfe</div>
    <div class="steuer-summe">${formatZahl(gesamt)} ha</div>
    <table class="steuer-tabelle"><thead><tr><th>Hof</th><th>Felder</th><th>Fläche</th><th>Steuer</th></tr></thead><tbody>`;
  daten.forEach(x=>{
    h+=`<tr><td>${hofName(x.hofId)}</td><td>${x.felder.join(", ")}</td><td>${formatZahl(x.flaeche)} ha</td><td>${formatZahl(rundeAuf100(x.flaeche*preis))} €</td></tr>`;
  });
  h+=`</tbody></table></div>`;

  if(darfVerwalten){
    let hofOpt='<option value="">Gemeinde-Hof auswählen</option>';
    alleHoefe.forEach(hof=>{
      hofOpt+=`<option value="${hof.id}" ${String(hof.id)===String(grundsteuerEinstellung?.Gemeinde_Hof_id||"")?"selected":""}>${hof.Name}</option>`;
    });
    const monate=["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
    let monatOpt="";
    monate.forEach(m=>monatOpt+=`<option ${m===(grundsteuerEinstellung?.Rechnungsmonat||"Januar")?"selected":""}>${m}</option>`);
    h+=`<div class="card"><h2>Grundsteuer-Automatik</h2>
      <div class="info">Einmal pro Game-Jahr wird für jeden Hof eine Rechnung anhand seiner gesamten Feldfläche erstellt.</div>
      <label class="label">Rechnungsaussteller / Gemeinde-Hof</label><select id="gstHof">${hofOpt}</select>
      <div class="steuer-grid">
        <div><label class="label">Preis pro ha</label><input id="gstPreis" type="number" min="0" step="0.01" value="${grundsteuerEinstellung?.Preis_pro_ha||0}"></div>
        <div><label class="label">Rechnungstag</label><select id="gstTag"><option ${Number(grundsteuerEinstellung?.Rechnungstag||1)===1?"selected":""}>1</option><option ${Number(grundsteuerEinstellung?.Rechnungstag||1)===2?"selected":""}>2</option><option ${Number(grundsteuerEinstellung?.Rechnungstag||1)===3?"selected":""}>3</option></select></div>
      </div>
      <label class="label">Rechnungsmonat</label><select id="gstMonat">${monatOpt}</select>
      <label class="row" style="display:flex;justify-content:space-between;align-items:center;color:white;margin-top:14px">Automatik aktiv <input id="gstAktiv" type="checkbox" style="width:28px;height:28px" ${grundsteuerEinstellung?.Aktiv===true?"checked":""}></label>
      <div class="info">Letztes Rechnungsjahr: ${grundsteuerEinstellung?.Letztes_Rechnungsjahr||"-"}</div>
      <button class="green" onclick="grundsteuerSpeichern()">Einstellungen speichern</button>
      <div id="gstMsg" class="msg"></div>
    </div>`;

    h+=`<div class="card"><h2>Grundsteuer-Läufe</h2>`;
    if(!grundsteuerLaeufe.length)h+=`<div class="value">Noch keine automatische Grundsteuer erstellt.</div>`;
    grundsteuerLaeufe.sort((a,b)=>Number(b.Serverjahr)-Number(a.Serverjahr)).forEach(l=>{
      h+=`<div class="item"><b>Game-Jahr ${l.Serverjahr}</b><br>Rechnungen: ${l.Rechnungen_erstellt}<br>Fläche: ${formatZahl(l.Gesamtflaeche_ha)} ha<br>Gesamtbetrag: ${formatZahl(l.Gesamtbetrag)} €<br><span>${formatDatum(l.Ausgefuehrt_am)}</span></div>`;
    });
    h+=`</div>`;
  }
  return h;
}
async function grundsteuerSpeichern(){
  const msg=document.getElementById("gstMsg");
  msg.innerText="";
  const daten={
    Organisation_id:Number(ORG_ID),
    Gemeinde_Hof_id:document.getElementById("gstHof").value?Number(document.getElementById("gstHof").value):null,
    Preis_pro_ha:Number(document.getElementById("gstPreis").value||0),
    Rechnungsmonat:document.getElementById("gstMonat").value,
    Rechnungstag:Number(document.getElementById("gstTag").value||1),
    Aktiv:document.getElementById("gstAktiv").checked,
    Aktualisiert_am:new Date().toISOString()
  };
  if(daten.Aktiv&&!daten.Gemeinde_Hof_id){msg.innerText="Bitte Gemeinde-Hof auswählen.";return;}
  if(daten.Aktiv&&daten.Preis_pro_ha<=0){msg.innerText="Bitte einen Preis pro ha eintragen.";return;}
  try{
    if(grundsteuerEinstellung)await patch("Grundsteuer_Einstellungen",grundsteuerEinstellung.id,daten);
    else await post("Grundsteuer_Einstellungen",daten);
    msg.innerText="Grundsteuer-Einstellungen gespeichert.";
    setTimeout(ladeOrganisation,500);
  }catch(e){msg.innerText="Fehler:\\n"+e.message;}
}

async function ladeOrganisation(){const box=document.getElementById("inhalt");try{alleUsers=await api("Users");const organisationen=await api("Organisationen");alleUserOrgs=await apiOptional("User_organisationen");if(alleUserOrgs.length===0){alleUserOrgs=await apiOptional("User_Organisationen");}const nachrichten=await api("Organisation_nachrichten");const auftraege=await api("Auftraege");alleFelder=await apiOptional("Felder");alleHoefe=await apiOptional("Hoefe");const statusListe=await apiOptional("Serverstatus");serverStatus=statusListe.find(s=>Number(s.id)===1)||statusListe[0]||null;const steuerEinstellungen=await apiOptional("Grundsteuer_Einstellungen");grundsteuerEinstellung=steuerEinstellungen.find(e=>String(e.Organisation_id)===String(ORG_ID))||null;grundsteuerLaeufe=(await apiOptional("Grundsteuer_Laeufe")).filter(l=>String(l.Organisation_id)===String(ORG_ID));aktuellerUser=alleUsers.find(u=>String(u.id)===String(USER_ID));aktuelleOrganisation=organisationen.find(o=>String(o.id)===String(ORG_ID));if(!aktuelleOrganisation){box.innerHTML="<div class='leer'>Organisation nicht gefunden.</div>";return;}document.getElementById("titel").innerText=aktuelleOrganisation.Name.toUpperCase();const meinEintrag=alleUserOrgs.find(e=>String(e.User_id)===String(USER_ID)&&String(e.Organisation_id)===String(ORG_ID)&&e.Aktiv===true);darfVerwalten=(aktuellerUser&&aktuellerUser.Admin===true)||(meinEintrag&&istLeitung(meinEintrag.Rolle));if(istGemeinde()){await ladeGemeindeFinanzen();}const mitglieder=alleUserOrgs.filter(e=>String(e.Organisation_id)===String(ORG_ID)&&e.Aktiv===true);const orgNachrichten=nachrichten.filter(n=>String(n.Organisation_id)===String(ORG_ID)&&n.Aktiv!==false);const orgAuftraege=auftraege.filter(a=>(String(a.Ziel_id)===String(ORG_ID)&&(String(a.Sichtbarkeit).toLowerCase()==="organisation"||String(a.Sichtbarkeit).toLowerCase()==="organisationen"))||String(a.Organisation_id)===String(ORG_ID));let html="";html+=`<div class="card"><h2>Informationen</h2><div class="label">Name</div><div class="value">${aktuelleOrganisation.Name||"-"}</div><div class="label">Farbe</div><div class="value">${aktuelleOrganisation.Farbe||"-"}</div><div class="label">Deine Rechte</div><div class="value">${darfVerwalten?"Verwaltung erlaubt":"Nur Ansicht"}</div></div>`;if(istGemeinde()){html+=gemeindeFinanzHtml();html+=grundsteuerHtml();}html+=`<div class="card"><h2>Mitglieder</h2>`;if(mitglieder.length===0){html+="<div class='value'>Keine Mitglieder.</div>";}else{mitglieder.forEach(m=>{const user=alleUsers.find(u=>String(u.id)===String(m.User_id));html+=`<div class="item"><b>${user?user.Vorname:"Unbekannt"}</b><br><span>${user?user["PSN-Username"]:""}</span><br>Rolle: ${m.Rolle||"-"}</div>`;});}html+="</div>";html+=`<div class="card"><h2>Nachrichten</h2>`;if(orgNachrichten.length===0){html+="<div class='value'>Keine Nachrichten.</div>";}else{orgNachrichten.sort((a,b)=>new Date(b.Erstellt_am||0)-new Date(a.Erstellt_am||0)).forEach(n=>{html+=`<div class="item ${n.Wichtig===true?"wichtig":""}"><b>${n.Titel||"Nachricht"}</b><br><br>${n.Nachricht||""}<br><br><span>Von: ${n.Erstellt_von||"-"} | ${formatDatum(n.Erstellt_am)}</span></div>`;});}html+="</div>";if(darfVerwalten){html+=`<div class="card"><h2>Nachricht erstellen</h2><input id="neuTitel" placeholder="Titel"><textarea id="neuNachricht" placeholder="Nachricht"></textarea><button class="green" onclick="nachrichtErstellen(false)">Normale Nachricht speichern</button><button class="red" onclick="nachrichtErstellen(true)">Wichtige Nachricht speichern</button><div id="meldung" class="msg"></div></div>`;}html+=`<div class="card"><h2>Organisations-Aufträge</h2>`;if(orgAuftraege.length===0){html+="<div class='value'>Keine Aufträge.</div>";}else{orgAuftraege.forEach(a=>{html+=`<div class="item" onclick="location.href='auftrag.html?id=${a.id}'"><b>${a.Titel||"Auftrag"}</b><br><br>${a.Beschreibung||""}<br><br><span>Status: ${a.Status||"-"} | Von: ${a.Erstellt_von||"-"}</span></div>`;});}html+="</div>";box.innerHTML=html;}catch(err){box.innerHTML="<div class='leer'>Organisation konnte nicht geladen werden.<br><br>"+err.message+"</div>";}}
async function nachrichtErstellen(wichtig){const titel=document.getElementById("neuTitel").value.trim();const nachricht=document.getElementById("neuNachricht").value.trim();const meldung=document.getElementById("meldung");meldung.innerText="";if(!titel||!nachricht){meldung.innerText="Bitte Titel und Nachricht ausfüllen.";return;}try{await post("Organisation_nachrichten",{Organisation_id:Number(ORG_ID),Titel:titel,Nachricht:nachricht,Erstellt_von:aktuellerUser?aktuellerUser["PSN-Username"]:"Unbekannt",Erstellt_am:new Date().toISOString(),Wichtig:wichtig,Aktiv:true});const telegramTitel=(wichtig?"❗ Wichtige Organisationsnachricht":"📢 Organisationsnachricht")+": "+titel;const telegramNachricht=(wichtig?"❗ Wichtige Organisationsnachricht":"📢 Organisationsnachricht")+"\n\nOrganisation: "+(aktuelleOrganisation?aktuelleOrganisation.Name:"-")+"\nTitel: "+titel+"\n\n"+nachricht+"\n\nVon: "+(aktuellerUser?aktuellerUser["PSN-Username"]:"Unbekannt");await post("Benachrichtigungen",{Titel:telegramTitel,Nachricht:telegramNachricht,Typ:"Organisation",User_id:null,Hof_id:null,Organisation_id:Number(ORG_ID),Gelesen:false,Erledigt:false,Archiviert:false,Telegram_gesendet:false,Erstellt_am:new Date().toISOString()});const anzahlTelegram=await telegramQueueFuerOrganisation(telegramTitel,telegramNachricht,Number(ORG_ID));meldung.innerText="Nachricht wurde gespeichert.\nTelegram-Empfänger: "+anzahlTelegram;document.getElementById("neuTitel").value="";document.getElementById("neuNachricht").value="";setTimeout(async()=>{await ladeOrganisation();},800);}catch(err){meldung.innerText="Nachricht konnte nicht gespeichert werden.\n"+err.message;}}
ladeOrganisation();
</script>
