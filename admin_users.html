<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Benutzer</title>
<style>
*{box-sizing:border-box;}body{margin:0;background:#000;color:#00ff22;font-family:Arial,sans-serif;}.app{max-width:760px;margin:auto;padding:20px;}.back{background:#222;color:white;border:1px solid #555;padding:14px 22px;border-radius:12px;margin-bottom:30px;font-size:18px;}h1{color:white;text-align:center;font-size:38px;font-family:Georgia,serif;}.search,input,select,textarea{width:100%;padding:14px;margin-top:12px;border-radius:10px;border:1px solid #008000;background:#000;color:white;font-size:17px;}textarea{min-height:80px;resize:vertical;}.card{background:#111;border:1px solid #008000;border-radius:14px;padding:20px;margin-bottom:18px;box-shadow:0 0 10px rgba(0,255,0,.18);}.card.warn{border:2px solid #ffaa00;box-shadow:0 0 14px rgba(255,170,0,.35);}.card.orangeWarn{border:2px solid #cc7700;box-shadow:0 0 14px rgba(255,120,0,.35);}.card.rotWarn{border:2px solid #ff2222;box-shadow:0 0 16px rgba(255,0,0,.45);}.titel{color:#00ff22;font-size:24px;font-weight:bold;}.info{color:white;margin-top:10px;line-height:1.5;font-size:18px;}.orange{color:#ffaa33;}button{width:100%;margin-top:10px;padding:15px;border:none;border-radius:12px;font-size:18px;font-weight:bold;}.green{background:#008800;color:white;}.red{background:#aa0000;color:white;}.dark{background:#333;color:white;}.blue{background:#004488;color:white;}.orangeBtn{background:#cc7700;color:white;}.msg{color:#ffaa33;text-align:center;margin-top:10px;white-space:pre-line;}.leer{color:white;text-align:center;margin-top:40px;}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}.stat{background:#090909;border:1px solid #006600;border-radius:12px;padding:12px;text-align:center;color:white;}.stat b{display:block;color:#00ff22;font-size:26px;margin-bottom:4px;}.badge{display:inline-block;color:white;border-radius:20px;padding:4px 10px;font-size:13px;margin:5px 5px 5px 0;font-weight:bold;}.badge-green{background:#008800;}.badge-yellow{background:#b59b00;}.badge-orange{background:#cc7700;}.badge-red{background:#aa0000;}.badge-gray{background:#555;}.popup-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);align-items:center;justify-content:center;padding:16px;z-index:20;}.popup{background:#111;border:2px solid #00aa22;border-radius:18px;padding:22px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;color:white;box-shadow:0 0 25px #003300;}@media(max-width:560px){.grid{grid-template-columns:1fr;}h1{font-size:34px;}}
</style>
</head>
<body>
<div class="app"><button class="back" onclick="location.href='admin.html'">← Zurück</button><h1>BENUTZER</h1><input id="suche" class="search" placeholder="Benutzer suchen..." oninput="anzeigen()"><div id="liste">Lade...</div></div>
<div id="fsBg" class="popup-bg"><div class="popup"><div class="titel" id="fsTitel">Führerschein</div><div class="info" id="fsInfo">...</div><label class="orange">Bemerkung</label><textarea id="fsBemerkung" placeholder="Grund / Bemerkung"></textarea><button class="red" id="fsEntziehenBtn" onclick="fuehrerscheinEntziehen()">Führerschein entziehen</button><button class="green" id="fsZurueckBtn" onclick="fuehrerscheinZurueckgeben()">Führerschein zurückgeben</button><button class="dark" onclick="schliesseFuehrerscheinPopup()">Schließen</button><div id="fsMsg" class="msg"></div></div></div>
<script>
const SUPABASE_URL="https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY="sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";
const USER_ID=localStorage.getItem("user_id");
if(!USER_ID){location.href="login.html";}
let users=[],hoefe=[],strafregister=[],serverStatus=null,fuehrerscheinUserId=null;
function headers(){return{apikey:SUPABASE_KEY,Authorization:"Bearer "+SUPABASE_KEY,"Content-Type":"application/json"};}
async function api(tabelle){const res=await fetch(SUPABASE_URL+"/rest/v1/"+tabelle+"?select=*",{headers:headers(),cache:"no-store"});if(!res.ok)throw new Error(await res.text());return await res.json();}
async function apiOptional(tabelle){try{return await api(tabelle);}catch(e){return[];}}
async function patch(tabelle,id,daten){const res=await fetch(SUPABASE_URL+"/rest/v1/"+tabelle+"?id=eq."+id,{method:"PATCH",headers:{...headers(),Prefer:"return=minimal"},body:JSON.stringify(daten)});if(!res.ok)throw new Error(await res.text());}
async function loeschen(tabelle,id){const res=await fetch(SUPABASE_URL+"/rest/v1/"+tabelle+"?id=eq."+id,{method:"DELETE",headers:{apikey:SUPABASE_KEY,Authorization:"Bearer "+SUPABASE_KEY,Prefer:"return=minimal"}});if(!res.ok)throw new Error(await res.text());}
async function ladeServerstatus(){try{const res=await fetch(SUPABASE_URL+"/rest/v1/Serverstatus?id=eq.1&select=*",{headers:headers(),cache:"no-store"});if(!res.ok)throw new Error(await res.text());const data=await res.json();serverStatus=data&&data.length?data[0]:{jahr:1,monat:"März",tag:1};}catch(e){serverStatus={jahr:1,monat:"März",tag:1};}}
function text(wert){return wert===null||wert===undefined||wert===""?"-":wert;}
function hofSelect(id,hofId){let html=`<select id="hof_${id}"><option value="">Kein Hof</option>`;hoefe.forEach(h=>{html+=`<option value="${h.id}" ${String(h.id)===String(hofId)?"selected":""}>${h.Name}</option>`;});html+=`</select>`;return html;}
function monatsIndex(monat){const m=String(monat||"").toLowerCase().trim();const map={"märz":0,"maerz":0,"mrz":0,"april":1,"apr":1,"mai":2,"juni":3,"jun":3,"juli":4,"jul":4,"august":5,"aug":5,"september":6,"sept":6,"sep":6,"oktober":7,"okt":7,"november":8,"nov":8,"dezember":9,"dez":9,"januar":10,"jan":10,"februar":11,"feb":11};return map[m]??0;}
function zeitwert(jahr,monat,tag){const j=Number(jahr||1);const mi=monatsIndex(monat);const t=Number(tag||1);return((j-1)*36)+(mi*3)+(t-1);}
function aktuellerZeitwert(){return zeitwert(serverStatus?.jahr||1,serverStatus?.monat||"März",serverStatus?.tag||1);}
function eintragZeitwert(e){const j=e.serverjahr??e.Serverjahr;const m=e.servermonat??e.Servermonat;const t=e.servertag??e.Servertag;if(j&&m&&t)return zeitwert(j,m,t);return-999999;}
function verfallZeitwert(e){const j=e.punkteverfalljahr??e.PunkteVerfallJahr;const m=e.punkteverfallmonat??e.PunkteVerfallMonat;const t=e.punkteverfalltag??e.PunkteVerfallTag;if(j&&m&&t)return zeitwert(j,m,t);return eintragZeitwert(e)+24;}
function statusWert(e){return e.bearbeitungsstatus||"Offen";}
function istAbgelaufenReal(e){if(!e.gueltig_bis)return false;const bis=new Date(e.gueltig_bis);return!isNaN(bis.getTime())&&bis<new Date();}
function istErledigt(e){const s=statusWert(e);return e.erledigt===true||e.aktiv===false||istAbgelaufenReal(e)||s==="Erledigt"||s==="Abgeschlossen";}
function punkteWert(e){return Number(e.verwarnpunkte??e.Punkte??0);}
function punkteAktiv(e){if(istErledigt(e))return false;if(punkteWert(e)<=0)return false;return aktuellerZeitwert()<verfallZeitwert(e);}
function punkteSummary(userId){const arr=strafregister.filter(e=>String(e.user_id)===String(userId));const aktive=arr.filter(e=>punkteAktiv(e));const hist=arr.filter(e=>punkteWert(e)>0);return{aktivePunkte:aktive.reduce((s,e)=>s+punkteWert(e),0),historischePunkte:hist.reduce((s,e)=>s+punkteWert(e),0),anzahl:arr.length};}
function empfehlung(punkte){const p=Number(punkte||0);if(p>=15)return{text:"⛔ Führerscheinentzug empfohlen",klasse:"rotWarn",badge:"badge-red"};if(p>=10)return{text:"🚫 Fahrverbot empfohlen",klasse:"orangeWarn",badge:"badge-orange"};if(p>=5)return{text:"⚠️ Verwarnung empfohlen",klasse:"warn",badge:"badge-yellow"};return{text:"✅ Keine Maßnahme",klasse:"",badge:"badge-green"};}
async function laden(){const box=document.getElementById("liste");try{await ladeServerstatus();users=await api("Users");hoefe=await api("Hoefe");strafregister=await apiOptional("strafregister");const admin=users.find(u=>String(u.id)===String(USER_ID));if(!admin||admin.Admin!==true){box.innerHTML="<div class='leer'>Kein Admin-Zugriff.</div>";return;}anzeigen();}catch(err){box.innerHTML="<div class='leer'>Fehler:<br><br>"+err.message+"</div>";}}
function anzeigen(){const box=document.getElementById("liste");const suche=document.getElementById("suche").value.toLowerCase().trim();const gefiltert=users.filter(u=>{const s=[u.Vorname,u["PSN-Username"],u.Hof,u.Telegram_id,u.Fuehrerschein===false?"führerschein entzogen":"führerschein ja"].join(" ").toLowerCase();return s.includes(suche);});if(gefiltert.length===0){box.innerHTML="<div class='leer'>Keine Benutzer gefunden.</div>";return;}box.innerHTML="";gefiltert.forEach(u=>{const p=punkteSummary(u.id);const emp=empfehlung(p.aktivePunkte);const div=document.createElement("div");div.className="card "+emp.klasse;const fsVorhanden=u.Fuehrerschein!==false;let fuehrerscheinInfo=fsVorhanden?"✅ Ja":"🚫 Nein / entzogen";if(!fsVorhanden){fuehrerscheinInfo+="<br><span class='orange'>Entzogen seit:</span> Jahr "+text(u.Fuehrerschein_Entzogen_Seit_Jahr)+" · "+text(u.Fuehrerschein_Entzogen_Seit_Monat)+" · Tag "+text(u.Fuehrerschein_Entzogen_Seit_Tag);if(u.Fuehrerschein_Bemerkung){fuehrerscheinInfo+="<br><span class='orange'>Bemerkung:</span> "+text(u.Fuehrerschein_Bemerkung);}}div.innerHTML=`<div class="titel">${text(u.Vorname)}</div><span class="badge ${emp.badge}">${emp.text}</span><span class="badge ${fsVorhanden?"badge-green":"badge-red"}">🚗 Führerschein: ${fsVorhanden?"Ja":"Nein"}</span><div class="grid"><div class="stat"><b>${p.aktivePunkte}</b>Aktive Punkte</div><div class="stat"><b>${p.historischePunkte}</b>Historische Punkte</div></div><div class="info"><span class="orange">PSN:</span> ${text(u["PSN-Username"])}<br><span class="orange">Hof:</span> ${text(u.Hof)}<br><span class="orange">Telegram:</span> ${text(u.Telegram_id)}<br><span class="orange">Admin:</span> ${u.Admin===true?"Ja":"Nein"}<br><span class="orange">Aktiviert:</span> ${u.Aktiviert===true?"Ja":"Nein"}<br><span class="orange">Führerschein:</span> ${fuehrerscheinInfo}<br><span class="orange">Strafregister-Einträge:</span> ${p.anzahl}</div><input id="vorname_${u.id}" value="${u.Vorname||""}" placeholder="Vorname"><input id="psn_${u.id}" value="${u["PSN-Username"]||""}" placeholder="PSN-Username"><input id="pass_${u.id}" placeholder="Neues Passwort"><input id="telegram_${u.id}" value="${u.Telegram_id||""}" placeholder="Telegram-ID">${hofSelect(u.id,u.Hof_id)}<button class="green" onclick="speichern(${u.id})">Speichern</button><button class="blue" onclick="location.href='strafregister.html'">📋 Strafregister öffnen</button><button class="${fsVorhanden?"red":"green"}" onclick="oeffneFuehrerscheinPopup(${u.id})">${fsVorhanden?"🚫 Führerschein entziehen":"✅ Führerschein zurückgeben"}</button><button class="dark" onclick="adminUmschalten(${u.id})">${u.Admin===true?"Admin entfernen":"Admin setzen"}</button><button class="orangeBtn" onclick="aktivUmschalten(${u.id})">${u.Aktiviert===true?"Deaktivieren":"Aktivieren"}</button><button class="red" onclick="benutzerLoeschen(${u.id})">Benutzer löschen</button><div id="msg_${u.id}" class="msg"></div>`;box.appendChild(div);});}
async function speichern(id){const msg=document.getElementById("msg_"+id);msg.innerText="Speichere...";const hofId=document.getElementById("hof_"+id).value;const hof=hoefe.find(h=>String(h.id)===String(hofId));const passwort=document.getElementById("pass_"+id).value.trim();let daten={Vorname:document.getElementById("vorname_"+id).value.trim(),"PSN-Username":document.getElementById("psn_"+id).value.trim(),Telegram_id:document.getElementById("telegram_"+id).value.trim(),Hof_id:hofId?Number(hofId):null,Hof:hof?hof.Name:""};if(passwort){daten.Passwort=passwort;}try{await patch("Users",id,daten);msg.innerText="Gespeichert.";await laden();}catch(err){msg.innerText="Fehler:\n"+err.message;}}
function oeffneFuehrerscheinPopup(id){fuehrerscheinUserId=id;const u=users.find(x=>String(x.id)===String(id));const p=punkteSummary(id);if(!u)return;document.getElementById("fsTitel").innerText="Führerschein · "+text(u.Vorname||u["PSN-Username"]);document.getElementById("fsInfo").innerHTML="<span class='orange'>Aktuelle Spielzeit:</span><br>Jahr "+text(serverStatus?.jahr||1)+" · "+text(serverStatus?.monat||"März")+" · Tag "+text(serverStatus?.tag||1)+"<br><br><span class='orange'>Aktive Punkte:</span> "+p.aktivePunkte+"<br><span class='orange'>Historische Punkte:</span> "+p.historischePunkte+"<br><span class='orange'>Aktueller Führerschein:</span> "+(u.Fuehrerschein===false?"🚫 Entzogen":"✅ Vorhanden");document.getElementById("fsBemerkung").value=u.Fuehrerschein_Bemerkung||"";document.getElementById("fsMsg").innerText="";document.getElementById("fsEntziehenBtn").style.display=u.Fuehrerschein===false?"none":"block";document.getElementById("fsZurueckBtn").style.display=u.Fuehrerschein===false?"block":"none";document.getElementById("fsBg").style.display="flex";}
function schliesseFuehrerscheinPopup(){document.getElementById("fsBg").style.display="none";fuehrerscheinUserId=null;}
async function fuehrerscheinEntziehen(){if(!fuehrerscheinUserId)return;const msg=document.getElementById("fsMsg");msg.innerText="Speichere...";try{await patch("Users",fuehrerscheinUserId,{Fuehrerschein:false,Fuehrerschein_Entzogen_Seit_Jahr:Number(serverStatus?.jahr||1),Fuehrerschein_Entzogen_Seit_Monat:String(serverStatus?.monat||"März"),Fuehrerschein_Entzogen_Seit_Tag:Number(serverStatus?.tag||1),Fuehrerschein_Bemerkung:document.getElementById("fsBemerkung").value.trim()});msg.innerText="Führerschein wurde entzogen.";await laden();setTimeout(schliesseFuehrerscheinPopup,800);}catch(err){msg.innerText="Fehler:\n"+err.message;}}
async function fuehrerscheinZurueckgeben(){if(!fuehrerscheinUserId)return;const msg=document.getElementById("fsMsg");msg.innerText="Speichere...";try{await patch("Users",fuehrerscheinUserId,{Fuehrerschein:true,Fuehrerschein_Entzogen_Seit_Jahr:null,Fuehrerschein_Entzogen_Seit_Monat:null,Fuehrerschein_Entzogen_Seit_Tag:null,Fuehrerschein_Bemerkung:document.getElementById("fsBemerkung").value.trim()});msg.innerText="Führerschein wurde zurückgegeben.";await laden();setTimeout(schliesseFuehrerscheinPopup,800);}catch(err){msg.innerText="Fehler:\n"+err.message;}}
async function adminUmschalten(id){if(String(id)===String(USER_ID)){alert("Du kannst deinen eigenen Adminstatus nicht ändern.");return;}const u=users.find(x=>String(x.id)===String(id));await patch("Users",id,{Admin:!(u.Admin===true)});await laden();}
async function aktivUmschalten(id){if(String(id)===String(USER_ID)){alert("Du kannst dich nicht selbst deaktivieren.");return;}const u=users.find(x=>String(x.id)===String(id));await patch("Users",id,{Aktiviert:!(u.Aktiviert===true)});await laden();}
async function benutzerLoeschen(id){if(String(id)===String(USER_ID)){alert("Du kannst dich nicht selbst löschen.");return;}if(!confirm("Benutzer wirklich löschen?"))return;try{await loeschen("Users",id);await laden();}catch(err){alert("Fehler:\n"+err.message);}}
laden();
</script>
</body>
</html>
