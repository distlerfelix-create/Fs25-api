<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Organisationen</title>

<style>
*{box-sizing:border-box;}
body{margin:0;background:#000;color:#00ff22;font-family:Arial,sans-serif;}
.app{max-width:700px;margin:auto;padding:20px;}
.back{background:#222;color:white;border:1px solid #555;padding:14px 22px;border-radius:12px;margin-bottom:30px;font-size:18px;}
h1{color:white;text-align:center;font-size:38px;font-family:Georgia,serif;}
.card{background:#111;border:1px solid #008000;border-radius:14px;padding:20px;margin-bottom:18px;}
.titel{color:#00ff22;font-size:24px;font-weight:bold;}
.info{color:white;margin-top:10px;font-size:18px;line-height:1.5;}
.orange{color:#ffaa33;}
input,select{width:100%;padding:14px;margin-top:12px;border-radius:10px;border:1px solid #008000;background:#000;color:white;font-size:17px;}
button{width:100%;margin-top:10px;padding:15px;border:none;border-radius:12px;font-size:18px;font-weight:bold;}
.green{background:#008800;color:white;}
.red{background:#aa0000;color:white;}
.dark{background:#333;color:white;}
.msg{color:#ffaa33;text-align:center;margin-top:10px;white-space:pre-line;}
.leer{color:white;text-align:center;margin-top:40px;}
</style>
</head>

<body>
<div class="app">

<button class="back" onclick="location.href='admin.html'">← Zurück</button>

<h1>ORGANISATIONEN</h1>

<div id="liste">Lade...</div>

</div>

<script>
const SUPABASE_URL = "https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY = "sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";

const USER_ID = localStorage.getItem("user_id");
if(!USER_ID){ location.href = "login.html"; }

let users = [];
let organisationen = [];
let userOrgs = [];

async function api(tabelle){
  const res = await fetch(SUPABASE_URL + "/rest/v1/" + tabelle + "?select=*", {
    headers:{apikey:SUPABASE_KEY, Authorization:"Bearer " + SUPABASE_KEY}
  });
  if(!res.ok) throw new Error(await res.text());
  return await res.json();
}

async function post(tabelle,daten){
  const res = await fetch(SUPABASE_URL + "/rest/v1/" + tabelle, {
    method:"POST",
    headers:{
      apikey:SUPABASE_KEY,
      Authorization:"Bearer " + SUPABASE_KEY,
      "Content-Type":"application/json",
      Prefer:"return=minimal"
    },
    body:JSON.stringify(daten)
  });
  if(!res.ok) throw new Error(await res.text());
}

async function patch(tabelle,id,daten){
  const res = await fetch(SUPABASE_URL + "/rest/v1/" + tabelle + "?id=eq." + id, {
    method:"PATCH",
    headers:{
      apikey:SUPABASE_KEY,
      Authorization:"Bearer " + SUPABASE_KEY,
      "Content-Type":"application/json",
      Prefer:"return=minimal"
    },
    body:JSON.stringify(daten)
  });
  if(!res.ok) throw new Error(await res.text());
}

async function loeschen(tabelle,id){
  const res = await fetch(SUPABASE_URL + "/rest/v1/" + tabelle + "?id=eq." + id, {
    method:"DELETE",
    headers:{
      apikey:SUPABASE_KEY,
      Authorization:"Bearer " + SUPABASE_KEY,
      Prefer:"return=minimal"
    }
  });
  if(!res.ok) throw new Error(await res.text());
}

function text(wert){
  return wert === null || wert === undefined || wert === "" ? "-" : wert;
}

function userSelect(id){
  let html = `<select id="user_${id}">`;
  html += `<option value="">Benutzer wählen</option>`;
  users.forEach(u=>{
    html += `<option value="${u.id}">${u.Vorname || "-"} (${u["PSN-Username"] || "-"})</option>`;
  });
  html += `</select>`;
  return html;
}

async function laden(){
  const box = document.getElementById("liste");

  try{
    users = await api("Users");
    organisationen = await api("Organisationen");
    userOrgs = await api("User_organisationen");

    const admin = users.find(u => String(u.id) === String(USER_ID));
    if(!admin || admin.Admin !== true){
      box.innerHTML = "<div class='leer'>Kein Admin-Zugriff.</div>";
      return;
    }

    anzeigen();

  }catch(err){
    box.innerHTML = "<div class='leer'>Fehler:<br><br>" + err.message + "</div>";
  }
}

function anzeigen(){
  const box = document.getElementById("liste");

  let html = `
    <div class="card">
      <div class="titel">Neue Organisation erstellen</div>
      <input id="neueOrg" placeholder="Name, z.B. Polizei">
      <input id="neueFarbe" placeholder="Farbe, z.B. Blau">
      <button class="green" onclick="organisationErstellen()">Organisation erstellen</button>
      <div id="msg_neu" class="msg"></div>
    </div>
  `;

  organisationen.forEach(org=>{
    const mitglieder = userOrgs.filter(e =>
      String(e.Organisation_id) === String(org.id) &&
      e.Aktiv === true
    );

    html += `
      <div class="card">
        <div class="titel">${text(org.Name)}</div>

        <div class="info">
          <span class="orange">ID:</span> ${org.id}<br>
          <span class="orange">Farbe:</span> ${text(org.Farbe)}<br>
          <span class="orange">Mitglieder:</span> ${mitglieder.length}
        </div>

        <input id="orgname_${org.id}" value="${org.Name || ""}" placeholder="Organisationsname">
        <input id="orgfarbe_${org.id}" value="${org.Farbe || ""}" placeholder="Farbe">

        <button class="green" onclick="organisationSpeichern(${org.id})">Organisation speichern</button>
        <button class="red" onclick="organisationLoeschen(${org.id})">Organisation löschen</button>

        <div class="info" style="margin-top:18px;">
          <span class="orange">Mitglieder verwalten</span>
        </div>

        ${userSelect(org.id)}
        <input id="rolle_${org.id}" placeholder="Rolle, z.B. Polizeichef">
        <button class="green" onclick="mitgliedHinzufuegen(${org.id})">Mitglied hinzufügen</button>

        <div id="mitglieder_${org.id}">
          ${mitgliederHtml(org.id)}
        </div>

        <div id="msg_${org.id}" class="msg"></div>
      </div>
    `;
  });

  if(organisationen.length === 0){
    html += "<div class='leer'>Keine Organisationen vorhanden.</div>";
  }

  box.innerHTML = html;
}

function mitgliederHtml(orgId){
  const mitglieder = userOrgs.filter(e =>
    String(e.Organisation_id) === String(orgId) &&
    e.Aktiv === true
  );

  if(mitglieder.length === 0){
    return `<div class="info">Keine Mitglieder.</div>`;
  }

  let html = "";

  mitglieder.forEach(e=>{
    const u = users.find(x => String(x.id) === String(e.User_id));

    html += `
      <div class="card" style="box-shadow:none;margin-top:12px;">
        <div class="info">
          <b>${u ? u.Vorname : "Unbekannt"}</b><br>
          <span class="orange">PSN:</span> ${u ? u["PSN-Username"] : "-"}<br>
          <span class="orange">Rolle:</span> ${text(e.Rolle)}
        </div>

        <input id="rolle_edit_${e.id}" value="${e.Rolle || ""}" placeholder="Rolle">
        <button class="green" onclick="rolleSpeichern(${e.id})">Rolle speichern</button>
        <button class="red" onclick="mitgliedEntfernen(${e.id})">Mitglied entfernen</button>
      </div>
    `;
  });

  return html;
}

async function organisationErstellen(){
  const msg = document.getElementById("msg_neu");
  const name = document.getElementById("neueOrg").value.trim();
  const farbe = document.getElementById("neueFarbe").value.trim();

  msg.innerText = "";

  if(!name){
    msg.innerText = "Bitte Namen eingeben.";
    return;
  }

  try{
    await post("Organisationen", {
      Name:name,
      Farbe:farbe
    });

    await laden();

  }catch(err){
    msg.innerText = "Fehler:\n" + err.message;
  }
}

async function organisationSpeichern(id){
  const msg = document.getElementById("msg_" + id);
  const name = document.getElementById("orgname_" + id).value.trim();
  const farbe = document.getElementById("orgfarbe_" + id).value.trim();

  msg.innerText = "";

  if(!name){
    msg.innerText = "Bitte Namen eingeben.";
    return;
  }

  try{
    await patch("Organisationen", id, {
      Name:name,
      Farbe:farbe
    });

    await laden();

  }catch(err){
    msg.innerText = "Fehler:\n" + err.message;
  }
}

async function organisationLoeschen(id){
  const msg = document.getElementById("msg_" + id);
  const mitglieder = userOrgs.filter(e =>
    String(e.Organisation_id) === String(id) &&
    e.Aktiv === true
  );

  if(mitglieder.length > 0){
    msg.innerText = "Löschen nicht möglich. Es gibt noch aktive Mitglieder.";
    return;
  }

  if(!confirm("Organisation wirklich löschen?")){
    return;
  }

  try{
    await loeschen("Organisationen", id);
    await laden();
  }catch(err){
    msg.innerText = "Fehler:\n" + err.message;
  }
}

async function mitgliedHinzufuegen(orgId){
  const msg = document.getElementById("msg_" + orgId);
  const userId = document.getElementById("user_" + orgId).value;
  const rolle = document.getElementById("rolle_" + orgId).value.trim();

  msg.innerText = "";

  if(!userId){
    msg.innerText = "Bitte Benutzer wählen.";
    return;
  }

  const bereits = userOrgs.find(e =>
    String(e.User_id) === String(userId) &&
    String(e.Organisation_id) === String(orgId) &&
    e.Aktiv === true
  );

  if(bereits){
    msg.innerText = "Benutzer ist bereits Mitglied.";
    return;
  }

  try{
    await post("User_organisationen", {
      User_id:Number(userId),
      Organisation_id:Number(orgId),
      Rolle:rolle || "Mitglied",
      Aktiv:true
    });

    await laden();

  }catch(err){
    msg.innerText = "Fehler:\n" + err.message;
  }
}

async function rolleSpeichern(eintragId){
  const rolle = document.getElementById("rolle_edit_" + eintragId).value.trim();

  try{
    await patch("User_organisationen", eintragId, {
      Rolle:rolle
    });

    await laden();

  }catch(err){
    alert("Fehler:\n" + err.message);
  }
}

async function mitgliedEntfernen(eintragId){
  if(!confirm("Mitglied wirklich entfernen?")){
    return;
  }

  try{
    await patch("User_organisationen", eintragId, {
      Aktiv:false
    });

    await laden();

  }catch(err){
    alert("Fehler:\n" + err.message);
  }
}

laden();
</script>

</body>
</html>
