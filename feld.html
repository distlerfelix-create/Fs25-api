<!DOCTYPE html>
<html lang="de">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Feld Detail</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#000;color:#00ff22;font-family:Arial,sans-serif}.app{max-width:700px;margin:auto;padding:20px}.back{background:#222;color:white;border:1px solid #555;padding:14px 22px;border-radius:12px;margin-bottom:25px;font-size:18px}h1{color:white;text-align:center;font-family:Georgia,serif}.card{background:#111;border:1px solid #008000;border-radius:14px;padding:18px;margin-bottom:16px}.card.warn{border:2px solid #ffaa00}.card.ernte{border:2px solid #00cc44}.label{color:#ffaa33;margin-top:12px}.value,.status{color:white;font-size:18px;line-height:1.55;margin-top:4px}select{width:100%;padding:13px;margin-top:8px;border-radius:10px;border:1px solid #008000;background:#000;color:white;font-size:17px}button{width:100%;padding:14px;margin-top:10px;border:0;border-radius:12px;font-size:18px;font-weight:bold}.green{background:#008800;color:white}.orange{background:#cc7700;color:white}.red{background:#aa0000;color:white}.dark{background:#333;color:white}.badge{display:inline-block;padding:5px 10px;border-radius:20px;color:white;font-size:13px;font-weight:bold;margin:4px}.bgreen{background:#008800}.borange{background:#cc7700}.bred{background:#aa0000}.msg{color:#ffaa33;text-align:center;margin-top:10px;white-space:pre-line}.status-eintrag{padding:10px 0;border-bottom:1px solid #2a2a2a}.status-eintrag:last-child{border-bottom:0}.status-datum{color:#ffaa33;font-size:14px;margin:4px 0 0 30px;line-height:1.35}
</style></head>
<body><div class="app"><button class="back" onclick="location.href='felder.html'">← Zurück</button><h1 id="titel">FELD</h1><div id="inhalt">Lade...</div></div>
<script>
const SUPABASE_URL="https://iddfyhsxsdjgestwxcei.supabase.co",SUPABASE_KEY="sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";
const USER_ID=localStorage.getItem("user_id"),USER_HOF_ID=Number(localStorage.getItem("hof_id")||0);
if(!USER_ID)location.href="login.html";
const FELD_ID=new URLSearchParams(location.search).get("id");
let feld=null,felder=[],fruchtarten=[],user=null,status={jahr:1,monat:"März",tag:1},bearbeiten=false,darf=false;

function headers(){return{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json"}}
async function api(t){const r=await fetch(SUPABASE_URL+"/rest/v1/"+t+"?select=*",{headers:headers()});if(!r.ok)throw new Error(await r.text());return r.json()}
async function patch(id,d){const r=await fetch(SUPABASE_URL+"/rest/v1/Felder?id=eq."+id,{method:"PATCH",headers:{...headers(),Prefer:"return=minimal"},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text())}
async function ladeStatus(){const r=await fetch(SUPABASE_URL+"/rest/v1/Serverstatus?id=eq.1&select=jahr,monat,tag,zeit",{headers:headers(),cache:"no-store"});if(r.ok){const d=await r.json();if(d[0])status=d[0]}}

function monatsNr(m){const x=String(m||"").toLowerCase();return{"januar":1,"februar":2,"märz":3,"maerz":3,"april":4,"mai":5,"juni":6,"juli":7,"august":8,"september":9,"oktober":10,"november":11,"dezember":12}[x]||1}
function zeitwert(j,m,t){return(Number(j||1)-1)*36+(monatsNr(m)-1)*3+(Number(t||1)-1)}
function norm(n){return String(n||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim()}
function mehrjaehrig(n){return["ackergras","feldgras","fieldgrass","gras","klee","luzerne","wiese","pappel","pappeln"].includes(norm(n))}
function pfluegenNachErnteNoetig(n){return["mais","kornmais","kornermais","koernermais","grain maize","grainmaize","silagemais","silage maize","silagemaize","kartoffel","kartoffeln","zuckerrube","zuckerruben","zuckerrohr"].includes(norm(n))}
function winter(){const m=monatsNr(status.monat);return mehrjaehrig(feld.Fruchtart)&&(m===12||m===1)}
function frucht(){return fruchtarten.find(x=>String(x.Name).toLowerCase()===String(feld.Fruchtart||"").toLowerCase())}
function wachstumstage(){
 if(!feld.Gesaet_Serverjahr||!feld.Gesaet_Servermonat||!feld.Gesaet_Servertag)return null;
 const von=zeitwert(feld.Gesaet_Serverjahr,feld.Gesaet_Servermonat,feld.Gesaet_Servertag),bis=zeitwert(status.jahr,status.monat,status.tag);
 if(bis<von)return 0;if(!mehrjaehrig(feld.Fruchtart))return bis-von;
 let n=0;for(let i=von;i<bis;i++){const m=Math.floor((i%36)/3)+1;if(m!==12&&m!==1)n++}return n
}
function ernte(){const f=frucht(),d=Number(f&&f.Wachstumsdauer_Tage||0),t=wachstumstage();return feld.Gesaet===true&&d>0&&t!==null&&t>=d}
function duengen(){return feld["Duengen_nötig"]===true||feld.Duengen_noetig===true}
function text(v){return v===null||v===undefined||v===""?"-":v}
function aktionsDatum(jahr,monat,tag,zeit){
 if(!jahr||!monat||!tag)return "";
 return `<div class="status-datum">📅 ${monat} · Jahr ${jahr} · Tag ${tag}${zeit?`<br>🕒 ${zeit} Uhr`:""}</div>`;
}
function statusEintrag(text,ok,jahr,monat,tag,zeit){
 return `<div class="status-eintrag">${ok?"✅":"❌"} ${text}${ok?aktionsDatum(jahr,monat,tag,zeit):""}</div>`;
}
async function patchAlle(d){if(feld.Feldgruppe_id){for(const f of felder.filter(x=>String(x.Feldgruppe_id)===String(feld.Feldgruppe_id)))await patch(f.id,d)}else await patch(feld.id,d)}

async function automatisieren(){
 const d={};let save=false;
 if(
   feld.Gekalkt===true &&
   feld.Gekalkt_Serverjahr &&
   feld.Gekalkt_Servermonat &&
   feld.Gekalkt_Servertag &&
   zeitwert(status.jahr,status.monat,status.tag) >=
     zeitwert(feld.Gekalkt_Serverjahr,feld.Gekalkt_Servermonat,feld.Gekalkt_Servertag) + 36
 ){d.Gekalkt=false;save=true}
 const e=ernte();if(feld.Erntebereit!==e){d.Erntebereit=e;if(!e)d.Ernte_Benachrichtigt=false;save=true}
 if(save){await patchAlle(d);Object.assign(feld,d)}
}
function badges(){let h="";if(winter())h+='<span class="badge borange">❄️ Winterpause</span>';else if(ernte())h+='<span class="badge bgreen">🌾 Erntereif</span>';if(duengen())h+='<span class="badge borange">💩 Düngen nötig</span>';if(feld.Steine_sammeln_noetig)h+='<span class="badge borange">🪨 Steine sammeln</span>';if(feld.Walzen_noetig)h+='<span class="badge borange">🛞 Walzen nötig</span>';return h}
function fruchtSelect(){let h='<select id="frucht">';fruchtarten.filter(f=>f.Aktiv!==false).forEach(f=>h+=`<option ${String(f.Name)===String(feld.Fruchtart)?"selected":""}>${f.Name}</option>`);return h+"</select>"}
function anzeigen(){
 const box=document.getElementById("inhalt"),f=frucht(),dauer=Number(f&&f.Wachstumsdauer_Tage||0),tage=wachstumstage();
 let h=`<div class="card ${ernte()?"ernte":""} ${(duengen()||feld.Steine_sammeln_noetig||feld.Walzen_noetig)?"warn":""}"><h2>Übersicht</h2>${badges()}
 <div class="label">Frucht</div><div class="value">${text(feld.Fruchtart)}</div><div class="label">Serverzeit</div><div class="value">Jahr ${status.jahr} · ${status.monat} · Tag ${status.tag}</div>
 <div class="label">Wachstum</div><div class="value">${text(tage)} / ${dauer||"-"} Wachstumstage</div><div class="label">Erntebereit</div><div class="value">${ernte()?"✅ Ja":"❌ Nein"}</div></div>
 <div class="card"><h2>Feldstatus</h2><div class="status">
 ${statusEintrag(feld.Gekalkt?"Gekalkt":"Kalken notwendig",feld.Gekalkt,feld.Gekalkt_Serverjahr,feld.Gekalkt_Servermonat,feld.Gekalkt_Servertag,feld.Gekalkt_Serverzeit)}
 ${statusEintrag(feld.Gepfluegt?"Gepflügt":"Pflügen notwendig",feld.Gepfluegt,feld.Gepfluegt_Serverjahr,feld.Gepfluegt_Servermonat,feld.Gepfluegt_Servertag,feld.Gepfluegt_Serverzeit)}
 <div class="status-eintrag">${feld.Steine_sammeln_noetig?"❌ Steine sammeln notwendig":"✅ Steine gesammelt"}${!feld.Steine_sammeln_noetig?aktionsDatum(feld.Steine_Serverjahr,feld.Steine_Servermonat,feld.Steine_Servertag,feld.Steine_Serverzeit):""}</div>
 ${statusEintrag(feld.Gesaet?"Gesät":"Säen notwendig",feld.Gesaet,feld.Gesaet_Serverjahr,feld.Gesaet_Servermonat,feld.Gesaet_Servertag,feld.Gesaet_Serverzeit)}
 <div class="status-eintrag">${feld.Walzen_noetig?"❌ Walzen notwendig":feld.Gewalzt?"✅ Gewalzt":"➖ Walzen nicht notwendig"}${feld.Gewalzt&&!feld.Walzen_noetig?aktionsDatum(feld.Gewalzt_Serverjahr,feld.Gewalzt_Servermonat,feld.Gewalzt_Servertag,feld.Gewalzt_Serverzeit):""}</div>
 ${statusEintrag(feld.Geduengt_1x?"1. Düngung erledigt":"1. Düngung notwendig",feld.Geduengt_1x,feld.Geduengt1_Serverjahr,feld.Geduengt1_Servermonat,feld.Geduengt1_Servertag,feld.Geduengt1_Serverzeit)}
 ${statusEintrag(feld.Geduengt_2x?"2. Düngung erledigt":"2. Düngung notwendig",feld.Geduengt_2x,feld.Geduengt2_Serverjahr,feld.Geduengt2_Servermonat,feld.Geduengt2_Servertag,feld.Geduengt2_Serverzeit)}
 ${feld.Ernte_Serverjahr?`<div class="status-eintrag">🌾 Letzte Ernte${aktionsDatum(feld.Ernte_Serverjahr,feld.Ernte_Servermonat,feld.Ernte_Servertag,feld.Ernte_Serverzeit)}</div>`:""}
 </div></div>`;
 if(darf)h+=`<div class="card"><button class="green" onclick="bearbeiten=!bearbeiten;anzeigen()">${bearbeiten?"Bearbeiten schließen":"Feld bearbeiten"}</button></div>`;
 if(darf&&bearbeiten)h+=`<div class="card"><h2>Aktionen</h2><div class="label">Fruchtart</div>${fruchtSelect()}
 <button class="green" onclick="kalken()">Feld kalken</button><button class="green" onclick="pfluegen()">Feld pflügen</button><button class="orange" onclick="steine()">Steine gesammelt</button><button class="green" onclick="saeen()">Säen</button><button class="orange" onclick="walzen()">Walzen</button><button class="green" onclick="dueng1()">1. Düngung</button><button class="green" onclick="dueng2()">2. Düngung</button>${mehrjaehrig(feld.Fruchtart)?'<button class="green" onclick="weiterWachsen()">🌱 Weiter wachsen lassen</button>':''}<button class="red" onclick="ernten()">Ernte abgeschlossen</button><div id="msg" class="msg"></div></div>`;
 box.innerHTML=h
}
async function run(d){const m=document.getElementById("msg");try{await patchAlle(d);bearbeiten=false;await laden()}catch(e){if(m)m.innerText="Fehler:\n"+e.message}}
async function kalken(){await run({Gekalkt:true,Gekalkt_Serverjahr:Number(status.jahr),Gekalkt_Servermonat:status.monat,Gekalkt_Servertag:Number(status.tag),Gekalkt_Serverzeit:status.zeit||null,Letzte_Aktion:"Gekalkt"})}
async function pfluegen(){await run({Gepfluegt:true,Gepfluegt_Serverjahr:Number(status.jahr),Gepfluegt_Servermonat:status.monat,Gepfluegt_Servertag:Number(status.tag),Gepfluegt_Serverzeit:status.zeit||null,Steine_sammeln_noetig:true,Letzte_Aktion:"Gepflügt"})}
async function steine(){await run({Steine_sammeln_noetig:false,Steine_Serverjahr:Number(status.jahr),Steine_Servermonat:status.monat,Steine_Servertag:Number(status.tag),Steine_Serverzeit:status.zeit||null,Letzte_Aktion:"Steine gesammelt"})}
async function saeen(){await run({Fruchtart:document.getElementById("frucht").value,Gesaet:true,Gesaet_Serverjahr:Number(status.jahr),Gesaet_Servermonat:status.monat,Gesaet_Servertag:Number(status.tag),Gesaet_Serverzeit:status.zeit||null,Erntebereit:false,Ernte_Benachrichtigt:false,Gewalzt:false,Walzen_noetig:true,Letzte_Aktion:"Gesät"})}
async function walzen(){await run({Gewalzt:true,Walzen_noetig:false,Gewalzt_Serverjahr:Number(status.jahr),Gewalzt_Servermonat:status.monat,Gewalzt_Servertag:Number(status.tag),Gewalzt_Serverzeit:status.zeit||null,Letzte_Aktion:"Gewalzt"})}
async function dueng1(){await run({Geduengt_1x:true,"Duengen_nötig":false,Geduengt1_Serverjahr:Number(status.jahr),Geduengt1_Servermonat:status.monat,Geduengt1_Servertag:Number(status.tag),Geduengt1_Serverzeit:status.zeit||null,Letzte_Aktion:"1. Düngung"})}
async function dueng2(){await run({Geduengt_2x:true,"Duengen_nötig":false,Geduengt2_Serverjahr:Number(status.jahr),Geduengt2_Servermonat:status.monat,Geduengt2_Servertag:Number(status.tag),Geduengt2_Serverzeit:status.zeit||null,Letzte_Aktion:"2. Düngung"})}
async function weiterWachsen(){
 const d={
   Erntebereit:false,
   Ernte_Benachrichtigt:false,
   Geduengt_1x:false,
   Geduengt_2x:false,
   "Duengen_nötig":true,
   Gesaet:true,
   Gesaet_Serverjahr:Number(status.jahr),
   Gesaet_Servermonat:status.monat,
   Gesaet_Servertag:Number(status.tag),
   Gesaet_Serverzeit:status.zeit||null,
   Ernte_Serverjahr:Number(status.jahr),
   Ernte_Servermonat:status.monat,
   Ernte_Servertag:Number(status.tag),
   Ernte_Serverzeit:status.zeit||null,
   Gewalzt:true,
   Walzen_noetig:false,
   Letzte_Aktion:"Geerntet - wächst weiter"
 };
 await run(d)
}

async function ernten(){
 const d={Erntebereit:false,Ernte_Benachrichtigt:false,Geduengt_1x:false,Geduengt_2x:false,"Duengen_nötig":true,Ernte_Serverjahr:Number(status.jahr),Ernte_Servermonat:status.monat,Ernte_Servertag:Number(status.tag),Ernte_Serverzeit:status.zeit||null,Letzte_Aktion:"Geerntet"};
 if(mehrjaehrig(feld.Fruchtart)){
   d.Gesaet=true;
   d.Gesaet_Serverjahr=Number(status.jahr);
   d.Gesaet_Servermonat=status.monat;
   d.Gesaet_Servertag=Number(status.tag);
   d.Gesaet_Serverzeit=status.zeit||null;
 }else{
   d.Gesaet=false;
   d.Gesaet_Serverjahr=null;
   d.Gesaet_Servermonat=null;
   d.Gesaet_Servertag=null;
   d.Gewalzt=false;
   d.Walzen_noetig=false;
   if(pfluegenNachErnteNoetig(feld.Fruchtart)){
     d.Gepfluegt=false;
   }
 }
 await run(d)
}
async function laden(){const box=document.getElementById("inhalt");try{await ladeStatus();[felder,fruchtarten]=await Promise.all([api("Felder"),api("Fruchtarten")]);const users=await api("Users");feld=felder.find(f=>String(f.id)===String(FELD_ID));user=users.find(u=>String(u.id)===String(USER_ID));if(!feld){box.innerHTML="Feld nicht gefunden.";return}darf=(user&&user.Admin===true)||Number(feld.Hof_id)===USER_HOF_ID;await automatisieren();document.getElementById("titel").innerText="FELD "+text(feld.Feldnummer);anzeigen()}catch(e){box.innerHTML="<div class='msg'>Fehler:<br>"+e.message+"</div>"}}
laden();
</script></body></html>
