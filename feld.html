<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feld Detail</title>
<style>
*{box-sizing:border-box;}body{margin:0;overflow-x:hidden;background:#000;color:#00ff22;font-family:Arial,sans-serif}.app{width:100%;max-width:700px;margin:auto;padding:20px}.back{background:#222;color:white;border:1px solid #555;padding:14px 22px;border-radius:12px;margin-bottom:30px;font-size:18px}h1{color:white;text-align:center;font-family:Georgia,serif;font-size:38px;margin:20px 0 30px}.card{background:#111;border:1px solid #008000;border-radius:14px;padding:20px;margin-bottom:18px;box-shadow:0 0 10px rgba(0,255,0,.18)}.card.erntereif{border:2px solid #00cc44;box-shadow:0 0 18px rgba(0,255,80,.55)}.card.warnung{border:2px solid #ffaa00;box-shadow:0 0 18px rgba(255,170,0,.45)}.card.gruppe{border:2px solid #00aa22;box-shadow:0 0 18px rgba(0,255,0,.35)}h2{color:#00ff22;margin-top:0}.label{color:#ffaa33;font-size:15px;margin-top:12px}.value{color:white;font-size:21px;margin-top:4px}.status{color:white;font-size:18px;line-height:1.6;margin-top:12px}.fruchtbox,.gruppenbox{background:#000;border:1px dashed #ffaa33;border-radius:12px;padding:14px;margin-top:12px;color:white;line-height:1.55;font-size:17px}.gruppenbox{border:1px solid #00aa22}.progress-bg{width:100%;height:18px;background:#000;border:1px solid #008000;border-radius:18px;overflow:hidden;margin-top:8px}.progress-fill{height:100%;background:#00aa22;width:0%}.badge{display:inline-block;padding:6px 12px;border-radius:20px;margin:6px 4px 6px 0;font-weight:bold}.green{background:#008800;color:white}.orange{background:#cc7700;color:white}.red{background:#aa0000;color:white}.gray{background:#333;color:white}input,select{width:100%;padding:14px;margin-top:8px;border-radius:10px;border:1px solid #008000;background:#000;color:white;font-size:18px}.row{display:flex;align-items:center;justify-content:space-between;color:white;font-size:19px;margin-top:14px}.row input{width:28px;height:28px}button{width:100%;margin-top:14px;padding:16px;border:none;border-radius:12px;font-size:19px;font-weight:bold}.btn-green{background:#008800;color:white}.btn-red{background:#aa0000;color:white}.btn-dark{background:#333;color:white}.msg{color:#ffaa33;text-align:center;margin-top:14px;font-weight:bold;white-space:pre-line}.leer{color:white;text-align:center;margin-top:40px;font-size:18px}
</style>
</head>
<body>
<div class="app">
<button class="back" onclick="location.href='felder.html'">← Zurück</button>
<h1 id="seitenTitel">FELD</h1>
<div id="inhalt">Lade...</div>
</div>

<script>
const SUPABASE_URL="https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY="sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";
const USER_ID=localStorage.getItem("user_id");
const USERNAME=localStorage.getItem("username")||"Disti1701";
const USER_HOF_ID=Number(localStorage.getItem("hof_id")||1);

if(!USER_ID){location.href="login.html";}
const params=new URLSearchParams(location.search);
const FELD_ID=params.get("id");

let feld=null,alleFelder=[],users=[],user=null,hof=null,istAdmin=false,darfBearbeiten=false,bearbeitenOffen=false,fruchtarten=[],feldgruppen=[],gruppenFelder=[],serverMonat="März";

function text(w){return w===null||w===undefined||w===""?"-":w}
function checked(w){return w===true?"checked":""}
function jaNein(w){return w===true?"✅ Ja":"❌ Nein"}
function zahl(w){const n=Number(String(w||"0").replace(",","."));return Number.isFinite(n)?n:0}
function datumDeutsch(d){if(!d)return"-";const x=new Date(d);if(isNaN(x.getTime()))return"-";return x.toLocaleDateString("de-DE")}
function fruchtObj(name){return fruchtarten.find(f=>String(f.Name).toLowerCase()===String(name||"").toLowerCase())}
function normalisiereFruchtName(name){return String(name||"").toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"")}
const WINTER_RESET_FRUECHTE=["ackergras","bluhende zwischenfrucht","gras","humusaktiv","klee","luzerne","wiese"];
function istWinterResetFrucht(name){return WINTER_RESET_FRUECHTE.includes(normalisiereFruchtName(name))}
function istWinterMonat(){const m=monatsNummer(serverMonat);return m===12||m===1}
function winterResetAktiv(){return istWinterMonat()&&istWinterResetFrucht(feld.Fruchtart)}
function duengenNoetig(){return feld["Duengen_nötig"]===true||feld.Duengen_noetig===true}
function tageSeit(d){if(!d)return null;const s=new Date(d);const h=new Date();if(isNaN(s.getTime()))return null;return Math.floor((h-s)/(1000*60*60*24))}
function feldgruppeName(){if(!feld||!feld.Feldgruppe_id)return"";const g=feldgruppen.find(x=>String(x.id)===String(feld.Feldgruppe_id));return g?g.Name:"Feldgruppe "+feld.Feldgruppe_id}
function gruppenNummern(){if(!feld||!feld.Feldgruppe_id)return"";return gruppenFelder.sort((a,b)=>Number(a.Feldnummer||0)-Number(b.Feldnummer||0)).map(f=>f.Feldnummer).join(", ")}
function gruppenGroesse(){if(!feld||!feld.Feldgruppe_id)return feld?feld.Feldgroesse:"";const s=gruppenFelder.reduce((sum,f)=>sum+zahl(f.Feldgroesse),0);return s>0?String(s).replace(".",","):feld.Feldgroesse}
function istAktiv(u){return u&&u.Aktiviert!==false}
function chatIdVonUser(u){return u.Telegram_id||u.Telegram_chat_id||u.Chat_id||null}
function eindeutigeEmpfaenger(liste){const map=new Map();liste.forEach(u=>{const chatId=chatIdVonUser(u);if(!u||!u.id||!chatId)return;map.set(String(u.id),u)});return Array.from(map.values())}
function empfaengerHof(hofId){return eindeutigeEmpfaenger(users.filter(u=>istAktiv(u)&&String(u.Hof_id)===String(hofId)&&chatIdVonUser(u)))}
async function telegramQueueFuerHof(titel,nachricht,typ,hofId){const empfaenger=empfaengerHof(hofId);for(const u of empfaenger){await post("Telegram_queue",{Titel:titel,Nachricht:nachricht,Typ:typ,User_id:Number(u.id),Hof_id:u.Hof_id?Number(u.Hof_id):null,Organisation_id:null,Chat_id:Number(chatIdVonUser(u)),Gesendet:false,Erstellt_am:new Date().toISOString(),Status:"Offen",Fehler:null});}return empfaenger.length;}
function monatsNummer(monat){const m=String(monat||"").toLowerCase().trim();const map={"januar":1,"jan":1,"februar":2,"feb":2,"märz":3,"maerz":3,"mrz":3,"april":4,"apr":4,"mai":5,"juni":6,"jun":6,"juli":7,"jul":7,"august":8,"aug":8,"september":9,"sept":9,"sep":9,"oktober":10,"okt":10,"november":11,"nov":11,"dezember":12,"dez":12};return map[m]||null;}
function letzterMonatNameAusText(txt){const s=String(txt||"").toLowerCase();const alle=s.match(/januar|jan|februar|feb|märz|maerz|mrz|april|apr|mai|juni|jun|juli|jul|august|aug|september|sept|sep|oktober|okt|november|nov|dezember|dez/gi);if(!alle||alle.length===0)return null;return alle[alle.length-1];}
function tageVomServerMonatBis(monatsName){const aktuell=monatsNummer(serverMonat);const ziel=monatsNummer(monatsName);if(!aktuell||!ziel)return null;let diff=ziel-aktuell;if(diff<0)diff+=12;return diff;}
function ernteBisDatum(){const fr=fruchtObj(feld.Fruchtart);if(!fr||!fr.Erntezeit)return"-";const letzterMonatName=letzterMonatNameAusText(fr.Erntezeit);const tageBis=tageVomServerMonatBis(letzterMonatName);if(tageBis===null)return"-";const d=new Date();d.setHours(12,0,0,0);d.setDate(d.getDate()+tageBis);return datumDeutsch(d);}
function ernteDatum(){const fr=fruchtObj(feld.Fruchtart);if(!feld.Gesaet_am||!fr||!fr.Wachstumsdauer_Tage)return"-";const d=new Date(feld.Gesaet_am);if(isNaN(d.getTime()))return"-";d.setDate(d.getDate()+Number(fr.Wachstumsdauer_Tage||0));return datumDeutsch(d)}
function erwarteterErtrag(){const fr=fruchtObj(feld.Fruchtart);if(!fr)return"-";const ha=zahl(feld.Feldgruppe_id?gruppenGroesse():feld.Feldgroesse);const ertrag=Number(fr.Ertrag_pro_Hektar||0);if(!ha||!ertrag)return"-";return Math.round(ha*ertrag).toLocaleString("de-DE")}
function erwarteterWert(){const fr=fruchtObj(feld.Fruchtart);if(!fr)return"-";const ha=zahl(feld.Feldgruppe_id?gruppenGroesse():feld.Feldgroesse),ertrag=Number(fr.Ertrag_pro_Hektar||0),preis=Number(fr.Verkaufspreis||0);if(!ha||!ertrag||!preis)return"-";return Math.round(ha*ertrag*preis).toLocaleString("de-DE")}
function wachstumBerechnen(){const fr=fruchtObj(feld.Fruchtart);const tage=tageSeit(feld.Gesaet_am);const max=fr&&fr.Wachstumsdauer_Tage?Number(fr.Wachstumsdauer_Tage):4;if(winterResetAktiv())return{tage:0,max:max,prozent:0,text:"Winterruhe: Wachstumsstufe 0 im "+serverMonat,erntereif:false,rest:max,winterReset:true};if(tage===null)return{tage:0,max:max,prozent:feld.Erntebereit===true?100:0,text:"Kein Aussaatdatum gespeichert",erntereif:feld.Erntebereit===true,rest:null,winterReset:false};const p=Math.min(100,Math.max(0,Math.round((tage/max)*100)));const ern=tage>=max;return{tage:tage,max:max,prozent:p,text:tage+" Tage seit Aussaat",erntereif:ern,rest:Math.max(0,max-tage),winterReset:false}}
function fruchtSelectHtml(){let h=`<select id="fruchtart"><option value="">Keine Fruchtart</option>`;fruchtarten.filter(f=>f.Aktiv!==false).forEach(f=>{h+=`<option value="${f.Name}" ${String(f.Name)===String(feld.Fruchtart)?"selected":""}>${f.Name}</option>`});if(feld.Fruchtart&&!fruchtarten.some(f=>String(f.Name)===String(feld.Fruchtart)))h+=`<option value="${feld.Fruchtart}" selected>${feld.Fruchtart}</option>`;return h+"</select>"}
async function api(t){const r=await fetch(SUPABASE_URL+"/rest/v1/"+t+"?select=*",{headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}});if(!r.ok)throw new Error(await r.text());return await r.json()}
async function apiOptional(t){try{return await api(t)}catch(e){return[]}}
async function patchFeldById(id,daten){const r=await fetch(SUPABASE_URL+"/rest/v1/Felder?id=eq."+id,{method:"PATCH",headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json","Prefer":"return=minimal"},body:JSON.stringify(daten)});if(!r.ok)throw new Error(await r.text())}
async function patchFeld(daten){await patchFeldById(FELD_ID,daten)}
async function patchFeldOderGruppe(daten){if(feld.Feldgruppe_id){const sync={...daten};delete sync.Feldnummer;delete sync.Feldgroesse;delete sync.Besitzer;for(const gf of gruppenFelder){await patchFeldById(gf.id,sync)}if(istAdmin&&(daten.Feldnummer!==undefined||daten.Feldgroesse!==undefined||daten.Besitzer!==undefined)){let adminDaten={};if(daten.Feldnummer!==undefined)adminDaten.Feldnummer=daten.Feldnummer;if(daten.Feldgroesse!==undefined)adminDaten.Feldgroesse=daten.Feldgroesse;if(daten.Besitzer!==undefined)adminDaten.Besitzer=daten.Besitzer;await patchFeldById(FELD_ID,adminDaten)}}else{await patchFeld(daten)}}
async function post(t,d){const r=await fetch(SUPABASE_URL+"/rest/v1/"+t,{method:"POST",headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json","Prefer":"return=minimal"},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text())}
async function erntereifBenachrichtigen(w){if(!w.erntereif)return;if(feld.Ernte_Benachrichtigt===true)return;const titel="🌾 Feld erntereif";const nachricht=feld.Feldgruppe_id?"Feldgruppe "+feldgruppeName()+" ("+gruppenNummern()+") ist erntereif. Frucht: "+text(feld.Fruchtart):"Feld "+text(feld.Feldnummer)+" ("+text(feld.Fruchtart)+") ist erntereif.";await post("Benachrichtigungen",{Titel:titel,Nachricht:nachricht,Typ:"Feld",User_id:null,Hof_id:feld.Hof_id||null,Organisation_id:null,Gelesen:false,Erledigt:false,Archiviert:false,Telegram_gesendet:false,Erstellt_am:new Date().toISOString()});await telegramQueueFuerHof(titel,nachricht,"Feld",feld.Hof_id);await patchFeldOderGruppe({Erntebereit:true,Ernte_Benachrichtigt:true});feld.Erntebereit=true;feld.Ernte_Benachrichtigt=true;}
async function ladeServerMonat(){try{const r=await fetch(SUPABASE_URL+"/rest/v1/Serverstatus?id=eq.1&select=monat",{headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY},cache:"no-store"});if(!r.ok)return;const data=await r.json();if(data&&data.length>0&&data[0].monat)serverMonat=data[0].monat;}catch(e){}}
async function laden(){const box=document.getElementById("inhalt");try{await ladeServerMonat();alleFelder=await api("Felder");users=await api("Users");const hoefe=await api("Hoefe");fruchtarten=await api("Fruchtarten");feldgruppen=await apiOptional("Feldgruppen");feld=alleFelder.find(f=>String(f.id)===String(FELD_ID));user=users.find(u=>String(u.id)===String(USER_ID));if(!feld){box.innerHTML="<div class='leer'>Feld nicht gefunden.</div>";return}gruppenFelder=feld.Feldgruppe_id?alleFelder.filter(f=>String(f.Feldgruppe_id)===String(feld.Feldgruppe_id)):[];hof=hoefe.find(h=>String(h.id)===String(feld.Hof_id));istAdmin=user&&user.Admin===true;darfBearbeiten=istAdmin||Number(feld.Hof_id)===USER_HOF_ID;document.getElementById("seitenTitel").innerText=feld.Feldgruppe_id?"FELDGRUPPE":"FELD "+text(feld.Feldnummer);const w=wachstumBerechnen();await erntereifBenachrichtigen(w);anzeigen(w);}catch(err){box.innerHTML="<div class='leer'>Feld konnte nicht geladen werden.<br><br>"+err.message+"</div>"}}
function fruchtInfoHtml(w){const fr=fruchtObj(feld.Fruchtart);if(!fr)return `<div class="card"><h2>Fruchtinformationen</h2><div class="fruchtbox">Keine Detaildaten zur aktuellen Fruchtart vorhanden.</div></div>`;const rest=w.rest===null?"-":(w.rest===0?"Ernte möglich":w.rest+" Tage");return `<div class="card"><h2>Fruchtinformationen</h2><div class="fruchtbox">Anpflanzzeit: ${text(fr.Anpflanzzeit)}<br>Erntezeit: ${text(fr.Erntezeit)}<br>Wachstumsdauer: ${text(fr.Wachstumsdauer_Tage)} Monate<br>Ertrag pro Hektar: ${text(fr.Ertrag_pro_Hektar)}<br>Verkaufspreis: ${text(fr.Verkaufspreis)}<br>Erwarteter Ertrag: ${erwarteterErtrag()}<br>Erwarteter Verkaufswert: ${erwarteterWert()}<br>Ernte ab ca.: ${ernteDatum()}<br>Ernte bis ca.: ${ernteBisDatum()}<br>Restzeit bis Ernte: ${rest}${w.winterReset?"<br><span class=\"orange\">Winterregel:</span> Wachstumsstufe 0 im Dezember/Januar":""}</div></div>`;}
function gruppenInfoHtml(){if(!feld.Feldgruppe_id)return"";return `<div class="card gruppe"><h2>Feldgruppe</h2><div class="gruppenbox">Name: ${text(feldgruppeName())}<br>Zugehörige Felder: ${text(gruppenNummern())}<br>Hauptfeld: ${feld.Hauptfeld===true?"Ja":"Nein"}<br>Anzahl Felder: ${gruppenFelder.length}<br>Gesamtgröße: ${text(gruppenGroesse())} ha<br><br>Änderungen an Frucht, Aussaat und Feldstatus werden automatisch auf alle Felder dieser Gruppe übertragen.</div></div>`}
function anzeigen(w){const box=document.getElementById("inhalt");let badges="";if(w.winterReset)badges+=`<span class="badge orange">❄️ Winterruhe</span>`;else if(w.erntereif)badges+=`<span class="badge green">🌾 Erntereif</span>`;if(duengenNoetig())badges+=`<span class="badge orange">💩 Düngen nötig</span>`;if(feld.Unkraut===true)badges+=`<span class="badge red">🌿 Unkraut</span>`;if(badges==="")badges=`<span class="badge gray">Keine Warnungen</span>`;let html=`${gruppenInfoHtml()}<div class="card ${w.erntereif?"erntereif":""}"><h2>Übersicht</h2>${badges}<div class="label">${feld.Feldgruppe_id?"Hauptfeld":"Feldnummer"}</div><div class="value">${text(feld.Feldnummer)}</div><div class="label">Besitzer</div><div class="value">${text(feld.Besitzer||(hof?hof.Name:""))}</div><div class="label">Hof</div><div class="value">${hof?hof.Name:"-"}</div><div class="label">${feld.Feldgruppe_id?"Gesamtgröße":"Größe"}</div><div class="value">${text(feld.Feldgruppe_id?gruppenGroesse():feld.Feldgroesse)} ha</div><div class="label">Frucht</div><div class="value">${text(feld.Fruchtart)}</div><div class="label">Aussaatdatum</div><div class="value">${datumDeutsch(feld.Gesaet_am)}</div><div class="label">Ernte ab ca.</div><div class="value">${ernteDatum()}</div><div class="label">Ernte bis ca.</div><div class="value">${ernteBisDatum()}</div><div class="label">Wachstumsfortschritt</div><div class="value">${w.prozent} %</div><div class="progress-bg"><div class="progress-fill" style="width:${w.prozent}%"></div></div><div class="label">Zeit seit Aussaat</div><div class="value">${w.text}</div><div class="label">Deine Rechte</div><div class="value">${darfBearbeiten?"Bearbeiten erlaubt":"Nur Ansicht"}</div></div>${fruchtInfoHtml(w)}<div class="card"><h2>Feldstatus</h2><div class="status">Gekalkt: ${jaNein(feld.Gekalkt)}<br>Gedüngt 1x: ${jaNein(feld.Geduengt_1x)}<br>Gedüngt 2x: ${jaNein(feld.Geduengt_2x)}<br>Gepflügt: ${jaNein(feld.Gepfluegt)}<br>Gegrubbert: ${jaNein(feld.Gegrubbert)}<br>Gesät: ${jaNein(feld.Gesaet)}<br>Gewalzt: ${jaNein(feld.Gewalzt)}<br>Unkraut: ${jaNein(feld.Unkraut)}<br>Düngen nötig: ${jaNein(duengenNoetig())}<br>Erntebereit: ${w.erntereif?"✅ Ja":(w.winterReset?"❌ Nein (Winterruhe)":jaNein(feld.Erntebereit))}</div><div class="label">Letzte Aktion</div><div class="value">${text(feld.Letzte_Aktion)}</div></div>`;if(darfBearbeiten){html+=`<div class="card"><button class="btn-green" onclick="formularUmschalten()">${bearbeitenOffen?"Bearbeiten schließen":"Feld bearbeiten"}</button></div>`}if(darfBearbeiten&&bearbeitenOffen){html+=bearbeitungsFormular()}box.innerHTML=html;}
function bearbeitungsFormular(){return `<div class="card"><h2>Bearbeiten</h2>${feld.Feldgruppe_id?`<div class="fruchtbox">Dieses Feld gehört zu einer Feldgruppe.<br>Speichern ändert Frucht, Status und Aussaat für alle Felder: ${gruppenNummern()}</div>`:""}${istAdmin?`<div class="label">Feldnummer nur Admin</div><input id="feldnummer" value="${text(feld.Feldnummer)}"><div class="label">Feldgröße nur Admin</div><input id="feldgroesse" value="${text(feld.Feldgroesse)}"><div class="label">Besitzer nur Admin</div><input id="besitzer" value="${text(feld.Besitzer)}">`:`<div class="label">Feldnummer</div><div class="value">${text(feld.Feldnummer)}</div><div class="label">Feldgröße</div><div class="value">${text(feld.Feldgroesse)} ha</div><div class="label">Besitzer</div><div class="value">${text(feld.Besitzer||(hof?hof.Name:""))}</div>`}<div class="label">Fruchtart</div>${fruchtSelectHtml()}<div class="label">Aussaatdatum</div><input id="gesaetAm" type="date" value="${feld.Gesaet_am?feld.Gesaet_am.substring(0,10):""}"><div class="label">Letzte Aktion</div><input id="letzteAktion" value="${text(feld.Letzte_Aktion)}"><div class="row">Gekalkt <input id="gekalkt" type="checkbox" ${checked(feld.Gekalkt)}></div><div class="row">Gedüngt 1x <input id="ged1" type="checkbox" ${checked(feld.Geduengt_1x)}></div><div class="row">Gedüngt 2x <input id="ged2" type="checkbox" ${checked(feld.Geduengt_2x)}></div><div class="row">Gepflügt <input id="gepfluegt" type="checkbox" ${checked(feld.Gepfluegt)}></div><div class="row">Gegrubbert <input id="gegrubbert" type="checkbox" ${checked(feld.Gegrubbert)}></div><div class="row">Gesät <input id="gesaet" type="checkbox" ${checked(feld.Gesaet)}></div><div class="row">Gewalzt <input id="gewalzt" type="checkbox" ${checked(feld.Gewalzt)}></div><div class="row">Unkraut <input id="unkraut" type="checkbox" ${checked(feld.Unkraut)}></div><div class="row">Düngen nötig <input id="duengenNoetig" type="checkbox" ${checked(duengenNoetig())}></div><div class="row">Erntebereit <input id="erntebereit" type="checkbox" ${checked(feld.Erntebereit)}></div><button class="btn-green" onclick="speichern()">Speichern</button><button class="btn-green" onclick="aussaatHeute()">Aussaat heute setzen</button><button class="btn-green" onclick="ernteWeiter()">🌱 Nach Ernte – wächst weiter</button><button class="btn-red" onclick="ernteNeu()">🚜 Nach Ernte – neu ansäen</button><div id="meldung" class="msg"></div></div>`;}
function formularUmschalten(){bearbeitenOffen=!bearbeitenOffen;anzeigen(wachstumBerechnen())}
async function speichern(){const meldung=document.getElementById("meldung");meldung.innerText="Speichere...";try{const gesaetDatum=document.getElementById("gesaetAm").value;let daten={Fruchtart:document.getElementById("fruchtart").value,Gesaet_am:gesaetDatum?new Date(gesaetDatum).toISOString():null,Letzte_Aktion:document.getElementById("letzteAktion").value.trim(),Gekalkt:document.getElementById("gekalkt").checked,Geduengt_1x:document.getElementById("ged1").checked,Geduengt_2x:document.getElementById("ged2").checked,Gepfluegt:document.getElementById("gepfluegt").checked,Gegrubbert:document.getElementById("gegrubbert").checked,Gesaet:document.getElementById("gesaet").checked,Gewalzt:document.getElementById("gewalzt").checked,Unkraut:document.getElementById("unkraut").checked,"Duengen_nötig":document.getElementById("duengenNoetig").checked,Erntebereit:document.getElementById("erntebereit").checked};if(istAdmin){daten.Feldnummer=Number(document.getElementById("feldnummer").value||0);daten.Feldgroesse=document.getElementById("feldgroesse").value.trim();daten.Besitzer=document.getElementById("besitzer").value.trim()}if(daten.Erntebereit===false){daten.Ernte_Benachrichtigt=false}await patchFeldOderGruppe(daten);meldung.innerText=feld.Feldgruppe_id?"Gespeichert. Feldgruppe wurde synchronisiert.":"Gespeichert.";bearbeitenOffen=false;await laden();}catch(err){meldung.innerText="Fehler: "+err.message}}
async function aussaatHeute(){const h=new Date();h.setMinutes(h.getMinutes()-h.getTimezoneOffset());const d=h.toISOString().slice(0,10);document.getElementById("gesaetAm").value=d;document.getElementById("gesaet").checked=true;document.getElementById("letzteAktion").value=feld.Feldgruppe_id?"Aussaat für Feldgruppe gesetzt":"Aussaat gesetzt";await speichern()}
async function ernteWeiter(){const c=feld.Feldgruppe_id?"Gesamte Feldgruppe nach der Ernte weiter wachsen lassen?":"Feld nach der Ernte weiter wachsen lassen?";if(!confirm(c))return;try{await patchFeldOderGruppe({Gesaet:true,Gesaet_am:new Date().toISOString(),Erntebereit:false,Ernte_Benachrichtigt:false,Geduengt_1x:false,Geduengt_2x:false,Gewalzt:true,Unkraut:false,Letzte_Aktion:"Geerntet - wächst weiter"});bearbeitenOffen=false;await laden()}catch(err){alert("Fehler: "+err.message)}}
async function ernteNeu(){const c=feld.Feldgruppe_id?"Gesamte Feldgruppe nach der Ernte zurücksetzen und neu ansäen?":"Feld nach der Ernte zurücksetzen und neu ansäen?";if(!confirm(c))return;try{await patchFeldOderGruppe({Fruchtart:"",Gesaet:false,Gesaet_am:null,Erntebereit:false,Ernte_Benachrichtigt:false,Geduengt_1x:false,Geduengt_2x:false,Gewalzt:false,Unkraut:false,Gepfluegt:false,Gegrubbert:false,Letzte_Aktion:"Geerntet - neu ansäen"});bearbeitenOffen=false;await laden()}catch(err){alert("Fehler: "+err.message)}}
laden();
