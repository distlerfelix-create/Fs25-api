<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feld Detail</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  overflow-x:hidden;
  background:#000;
  color:#00ff22;
  font-family:Arial,sans-serif;
}

.app{
  width:100%;
  max-width:700px;
  margin:auto;
  padding:20px;
}

.back{
  background:#222;
  color:white;
  border:1px solid #555;
  padding:14px 22px;
  border-radius:12px;
  margin-bottom:30px;
  font-size:18px;
}

h1{
  color:white;
  text-align:center;
  font-family:Georgia,serif;
  font-size:38px;
  margin:20px 0 30px;
}

.card{
  background:#111;
  border:1px solid #008000;
  border-radius:14px;
  padding:20px;
  margin-bottom:18px;
  box-shadow:0 0 10px rgba(0,255,0,0.18);
}

.card.erntereif{
  border:2px solid #00cc44;
  box-shadow:0 0 18px rgba(0,255,80,0.55);
}

.card.warnung{
  border:2px solid #ffaa00;
  box-shadow:0 0 18px rgba(255,170,0,0.45);
}

h2{
  color:#00ff22;
  margin-top:0;
}

.label{
  color:#ffaa33;
  font-size:15px;
  margin-top:12px;
}

.value{
  color:white;
  font-size:21px;
  margin-top:4px;
}

.status{
  color:white;
  font-size:18px;
  line-height:1.6;
  margin-top:12px;
}

.badge{
  display:inline-block;
  padding:6px 12px;
  border-radius:20px;
  margin:6px 4px 6px 0;
  font-weight:bold;
}

.green{background:#008800;color:white;}
.orange{background:#cc7700;color:white;}
.red{background:#aa0000;color:white;}
.gray{background:#333;color:white;}

input, select{
  width:100%;
  padding:14px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #008000;
  background:#000;
  color:white;
  font-size:18px;
}

.row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  color:white;
  font-size:19px;
  margin-top:14px;
}

.row input{
  width:28px;
  height:28px;
}

button{
  width:100%;
  margin-top:14px;
  padding:16px;
  border:none;
  border-radius:12px;
  font-size:19px;
  font-weight:bold;
}

.btn-green{
  background:#008800;
  color:white;
}

.btn-red{
  background:#aa0000;
  color:white;
}

.btn-dark{
  background:#333;
  color:white;
}

.msg{
  color:#ffaa33;
  text-align:center;
  margin-top:14px;
  font-weight:bold;
}

.leer{
  color:white;
  text-align:center;
  margin-top:40px;
  font-size:18px;
}
</style>
</head>

<body>
<div class="app">

<button class="back" onclick="location.href='felder.html'">← Zurück</button>

<h1 id="seitenTitel">FELD</h1>

<div id="inhalt">Lade...</div>

</div>

<script>
const SUPABASE_URL = "https://iddfyhsxsdjgestwxcei.supabase.co";
const SUPABASE_KEY = "sb_publishable_j0vVUcU3niZMXL4loB6QWQ_bWg0mloR";

const USER_ID = localStorage.getItem("user_id");
const USERNAME = localStorage.getItem("username") || "Disti1701";
const USER_HOF_ID = Number(localStorage.getItem("hof_id") || 1);

if(!USER_ID){
  location.href = "login.html";
}

const params = new URLSearchParams(location.search);
const FELD_ID = params.get("id");

let feld = null;
let user = null;
let hof = null;
let istAdmin = false;
let darfBearbeiten = false;
let bearbeitenOffen = false;

const fruchtStufen = {
  "Gras":4,
  "Weizen":8,
  "Gerste":8,
  "Hafer":8,
  "Raps":8,
  "Sorghum":8,
  "Mais":8,
  "Silomais":8,
  "Silagemais":8,
  "Sonnenblumen":8,
  "Sojabohnen":8,
  "Kartoffeln":6,
  "Zuckerrüben":6,
  "Zuckerrueben":6,
  "Baumwolle":8,
  "Pappel":12,
  "Ölrettich":3,
  "Oelrettich":3,
  "Senf":3,
  "Humusaktiv":3,
  "Klee":4,
  "Luzerne":4
};

function text(wert){
  return wert === null || wert === undefined || wert === "" ? "-" : wert;
}

function checked(wert){
  return wert === true ? "checked" : "";
}

function jaNein(wert){
  return wert === true ? "✅ Ja" : "❌ Nein";
}

function duengenNoetig(){
  return feld["Duengen_nötig"] === true || feld.Duengen_noetig === true;
}

function tageSeit(datum){
  if(!datum) return null;
  const start = new Date(datum);
  const heute = new Date();
  return Math.floor((heute - start) / (1000 * 60 * 60 * 24));
}

function wachstumBerechnen(){
  const frucht = feld.Fruchtart || "";
  const max = fruchtStufen[frucht] || 4;
  const tage = tageSeit(feld.Gesaet_am);

  if(tage === null){
    return {
      stufe: feld.Wachstumsstufe || 0,
      max:max,
      text:"Kein Aussaatdatum gespeichert",
      erntereif: feld.Erntebereit === true
    };
  }

  const stufe = Math.min(max, Math.max(0, tage));
  const erntereif = stufe >= max;

  return {
    stufe:stufe,
    max:max,
    text:tage + " RL-Tage / " + tage + " Ingame-Monate seit Aussaat",
    erntereif:erntereif
  };
}

async function api(tabelle){
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/" + tabelle + "?select=*",
    {
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY
      }
    }
  );

  if(!res.ok){
    throw new Error(await res.text());
  }

  return await res.json();
}

async function patchFeld(daten){
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/Felder?id=eq." + FELD_ID,
    {
      method:"PATCH",
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY,
        "Content-Type":"application/json",
        "Prefer":"return=minimal"
      },
      body:JSON.stringify(daten)
    }
  );

  if(!res.ok){
    throw new Error(await res.text());
  }
}

async function post(tabelle,daten){
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/" + tabelle,
    {
      method:"POST",
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY,
        "Content-Type":"application/json",
        "Prefer":"return=minimal"
      },
      body:JSON.stringify(daten)
    }
  );

  if(!res.ok){
    throw new Error(await res.text());
  }
}

async function erntereifBenachrichtigen(wachstum){
  if(!wachstum.erntereif) return;
  if(feld.Ernte_Benachrichtigt === true) return;

  const titel = "🌾 Feld erntereif";
  const nachricht =
    "Feld " + text(feld.Feldnummer) +
    " (" + text(feld.Fruchtart) + ") ist erntereif.";

  await post("Benachrichtigungen", {
    Titel:titel,
    Nachricht:nachricht,
    Typ:"Feld",
    User_id:null,
    Hof_id:feld.Hof_id || null,
    Organisation_id:null,
    Gelesen:false,
    Erledigt:false,
    Archiviert:false,
    Erstellt_am:new Date().toISOString()
  });

  await post("Telegram_queue", {
    Titel:titel,
    Nachricht:nachricht,
    Typ:"Feld",
    User_id:null,
    Hof_id:feld.Hof_id || null,
    Organisation_id:null,
    Chat_id:null,
    Gesendet:false,
    Erstellt_am:new Date().toISOString()
  });

  await patchFeld({
    Erntebereit:true,
    Ernte_Benachrichtigt:true
  });

  feld.Erntebereit = true;
  feld.Ernte_Benachrichtigt = true;
}

async function laden(){
  const box = document.getElementById("inhalt");

  try{
    const felder = await api("Felder");
    const users = await api("Users");
    const hoefe = await api("Hoefe");

    feld = felder.find(f => String(f.id) === String(FELD_ID));
    user = users.find(u => String(u.id) === String(USER_ID));

    if(!feld){
      box.innerHTML = "<div class='leer'>Feld nicht gefunden.</div>";
      return;
    }

    hof = hoefe.find(h => String(h.id) === String(feld.Hof_id));

    istAdmin = user && user.Admin === true;
    darfBearbeiten = istAdmin || Number(feld.Hof_id) === USER_HOF_ID;

    document.getElementById("seitenTitel").innerText =
      "FELD " + text(feld.Feldnummer);

    const wachstum = wachstumBerechnen();

    await erntereifBenachrichtigen(wachstum);

    anzeigen(wachstum);

  }catch(err){
    box.innerHTML =
      "<div class='leer'>Feld konnte nicht geladen werden.<br><br>" +
      err.message +
      "</div>";
  }
}

function anzeigen(wachstum){
  const box = document.getElementById("inhalt");

  let statusBadges = "";

  if(wachstum.erntereif){
    statusBadges += `<span class="badge green">🌾 Erntereif</span>`;
  }

  if(duengenNoetig()){
    statusBadges += `<span class="badge orange">💩 Düngen nötig</span>`;
  }

  if(feld.Unkraut === true){
    statusBadges += `<span class="badge red">🌿 Unkraut</span>`;
  }

  if(statusBadges === ""){
    statusBadges = `<span class="badge gray">Keine Warnungen</span>`;
  }

  let html = `
    <div class="card ${wachstum.erntereif ? "erntereif" : ""}">
      <h2>Übersicht</h2>

      ${statusBadges}

      <div class="label">Feldnummer</div>
      <div class="value">${text(feld.Feldnummer)}</div>

      <div class="label">Besitzer</div>
      <div class="value">${text(feld.Besitzer || (hof ? hof.Name : ""))}</div>

      <div class="label">Hof</div>
      <div class="value">${hof ? hof.Name : "-"}</div>

      <div class="label">Größe</div>
      <div class="value">${text(feld.Feldgroesse)} ha</div>

      <div class="label">Frucht</div>
      <div class="value">${text(feld.Fruchtart)}</div>

      <div class="label">Wachstum berechnet</div>
      <div class="value">${wachstum.stufe} / ${wachstum.max}</div>

      <div class="label">Zeit seit Aussaat</div>
      <div class="value">${wachstum.text}</div>

      <div class="label">Deine Rechte</div>
      <div class="value">${darfBearbeiten ? "Bearbeiten erlaubt" : "Nur Ansicht"}</div>
    </div>

    <div class="card">
      <h2>Feldstatus</h2>

      <div class="status">
        Gekalkt: ${jaNein(feld.Gekalkt)}<br>
        Gedüngt 1x: ${jaNein(feld.Geduengt_1x)}<br>
        Gedüngt 2x: ${jaNein(feld.Geduengt_2x)}<br>
        Gepflügt: ${jaNein(feld.Gepfluegt)}<br>
        Gegrubbert: ${jaNein(feld.Gegrubbert)}<br>
        Gesät: ${jaNein(feld.Gesaet)}<br>
        Gewalzt: ${jaNein(feld.Gewalzt)}<br>
        Unkraut: ${jaNein(feld.Unkraut)}<br>
        Düngen nötig: ${jaNein(duengenNoetig())}<br>
        Erntebereit: ${wachstum.erntereif ? "✅ Ja" : jaNein(feld.Erntebereit)}
      </div>

      <div class="label">Manuelle Wachstumsstufe</div>
      <div class="value">${text(feld.Wachstumsstufe)}</div>

      <div class="label">Letzte Aktion</div>
      <div class="value">${text(feld.Letzte_Aktion)}</div>
    </div>
  `;

  if(darfBearbeiten){
    html += `
      <div class="card">
        <button class="btn-green" onclick="formularUmschalten()">
          ${bearbeitenOffen ? "Bearbeiten schließen" : "Feld bearbeiten"}
        </button>
      </div>
    `;
  }

  if(darfBearbeiten && bearbeitenOffen){
    html += bearbeitungsFormular();
  }

  box.innerHTML = html;
}

function bearbeitungsFormular(){
  return `
    <div class="card">
      <h2>Bearbeiten</h2>

      ${istAdmin ? `
        <div class="label">Feldnummer nur Admin</div>
        <input id="feldnummer" value="${text(feld.Feldnummer)}">

        <div class="label">Feldgröße nur Admin</div>
        <input id="feldgroesse" value="${text(feld.Feldgroesse)}">

        <div class="label">Besitzer nur Admin</div>
        <input id="besitzer" value="${text(feld.Besitzer)}">
      ` : `
        <div class="label">Feldnummer</div>
        <div class="value">${text(feld.Feldnummer)}</div>

        <div class="label">Feldgröße</div>
        <div class="value">${text(feld.Feldgroesse)} ha</div>

        <div class="label">Besitzer</div>
        <div class="value">${text(feld.Besitzer || (hof ? hof.Name : ""))}</div>
      `}

      <div class="label">Fruchtart</div>
      <input id="fruchtart" value="${text(feld.Fruchtart)}">

      <div class="label">Wachstumsstufe manuell</div>
      <input id="wachstumsstufe" type="number" value="${feld.Wachstumsstufe || 0}">

      <div class="label">Aussaatdatum</div>
      <input id="gesaetAm" type="date" value="${feld.Gesaet_am ? feld.Gesaet_am.substring(0,10) : ""}">

      <div class="label">Letzte Aktion</div>
      <input id="letzteAktion" value="${text(feld.Letzte_Aktion)}">

      <div class="row">Gekalkt <input id="gekalkt" type="checkbox" ${checked(feld.Gekalkt)}></div>
      <div class="row">Gedüngt 1x <input id="ged1" type="checkbox" ${checked(feld.Geduengt_1x)}></div>
      <div class="row">Gedüngt 2x <input id="ged2" type="checkbox" ${checked(feld.Geduengt_2x)}></div>
      <div class="row">Gepflügt <input id="gepfluegt" type="checkbox" ${checked(feld.Gepfluegt)}></div>
      <div class="row">Gegrubbert <input id="gegrubbert" type="checkbox" ${checked(feld.Gegrubbert)}></div>
      <div class="row">Gesät <input id="gesaet" type="checkbox" ${checked(feld.Gesaet)}></div>
      <div class="row">Gewalzt <input id="gewalzt" type="checkbox" ${checked(feld.Gewalzt)}></div>
      <div class="row">Unkraut <input id="unkraut" type="checkbox" ${checked(feld.Unkraut)}></div>
      <div class="row">Düngen nötig <input id="duengenNoetig" type="checkbox" ${checked(duengenNoetig())}></div>
      <div class="row">Erntebereit <input id="erntebereit" type="checkbox" ${checked(feld.Erntebereit)}></div>

      <button class="btn-green" onclick="speichern()">Speichern</button>
      <button class="btn-red" onclick="ernteReset()">Nach Ernte zurücksetzen</button>

      <div id="meldung" class="msg"></div>
    </div>
  `;
}

function formularUmschalten(){
  bearbeitenOffen = !bearbeitenOffen;
  anzeigen(wachstumBerechnen());
}

async function speichern(){
  const meldung = document.getElementById("meldung");
  meldung.innerText = "Speichere...";

  try{
    const gesaetDatum = document.getElementById("gesaetAm").value;

    let daten = {
      Fruchtart:document.getElementById("fruchtart").value.trim(),
      Wachstumsstufe:Number(document.getElementById("wachstumsstufe").value || 0),
      Gesaet_am:gesaetDatum ? new Date(gesaetDatum).toISOString() : null,
      Letzte_Aktion:document.getElementById("letzteAktion").value.trim(),
      Gekalkt:document.getElementById("gekalkt").checked,
      Geduengt_1x:document.getElementById("ged1").checked,
      Geduengt_2x:document.getElementById("ged2").checked,
      Gepfluegt:document.getElementById("gepfluegt").checked,
      Gegrubbert:document.getElementById("gegrubbert").checked,
      Gesaet:document.getElementById("gesaet").checked,
      Gewalzt:document.getElementById("gewalzt").checked,
      Unkraut:document.getElementById("unkraut").checked,
      "Duengen_nötig":document.getElementById("duengenNoetig").checked,
      Erntebereit:document.getElementById("erntebereit").checked
    };

    if(istAdmin){
      daten.Feldnummer = Number(document.getElementById("feldnummer").value || 0);
      daten.Feldgroesse = document.getElementById("feldgroesse").value.trim();
      daten.Besitzer = document.getElementById("besitzer").value.trim();
    }

    if(daten.Erntebereit === false){
      daten.Ernte_Benachrichtigt = false;
    }

    await patchFeld(daten);

    meldung.innerText = "Gespeichert.";
    bearbeitenOffen = false;
    await laden();

  }catch(err){
    meldung.innerText = "Fehler: " + err.message;
  }
}

async function ernteReset(){
  if(!confirm("Feld nach Ernte zurücksetzen?")){
    return;
  }

  try{
    await patchFeld({
      Fruchtart:"",
      Wachstumsstufe:0,
      Gesaet:false,
      Gesaet_am:null,
      Erntebereit:false,
      Ernte_Benachrichtigt:false,
      Geduengt_1x:false,
      Geduengt_2x:false,
      Gewalzt:false,
      Unkraut:false,
      Letzte_Aktion:"Geerntet"
    });

    bearbeitenOffen = false;
    await laden();

  }catch(err){
    alert("Fehler: " + err.message);
  }
}

laden();
</script>

</body>
</html>
